// Returns { dateFrom, dateTo, label, chartMode } for the selected innsikt period
function getInnsiktRange() {
  const p = ST._innsiktPeriod || { mode: 'thisMonth' };
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  if (p.mode === 'thisWeek') {
    const mon = new Date(now); mon.setDate(now.getDate() - (now.getDay()||7) + 1); mon.setHours(0,0,0,0);
    return { dateFrom: ymd(mon), dateTo: today(), label: 'Denne uken', chartMode: 'daily' };
  }
  if (p.mode === 'lastWeek') {
    const mon = new Date(now); mon.setDate(now.getDate() - (now.getDay()||7) - 6); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return { dateFrom: ymd(mon), dateTo: ymd(sun), label: 'Forrige uke', chartMode: 'daily' };
  }
  if (p.mode === 'thisMonth') {
    const from = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
    return { dateFrom: from, dateTo: today(), label: 'Denne måneden', chartMode: 'daily' };
  }
  if (p.mode === 'lastMonth') {
    const d = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const from = `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`;
    const last = new Date(now.getFullYear(), now.getMonth(), 0);
    return { dateFrom: from, dateTo: ymd(last), label: 'Forrige måned', chartMode: 'daily' };
  }
  if (p.mode === 'thisYear') {
    return { dateFrom: `${now.getFullYear()}-01-01`, dateTo: today(), label: `${now.getFullYear()}`, chartMode: 'monthly' };
  }
  if (p.mode === 'all') {
    return { dateFrom: null, dateTo: null, label: 'Totalt (all tid)', chartMode: 'monthly' };
  }
  if (p.mode === 'day' && p.value) {
    return { dateFrom: p.value, dateTo: p.value, label: fmtDate(p.value), chartMode: 'daily' };
  }
  if (p.mode === 'month' && p.value) {
    const [y,m] = p.value.split('-');
    const last = new Date(parseInt(y), parseInt(m), 0);
    return { dateFrom: `${p.value}-01`, dateTo: ymd(last), label: p.value, chartMode: 'daily' };
  }
  if (p.mode === 'week' && p.value) {
    // Parse ISO week e.g. "2026-W15"
    const [yr, wk] = p.value.split('-W');
    const jan4 = new Date(parseInt(yr), 0, 4);
    const mon = new Date(jan4); mon.setDate(jan4.getDate() - (jan4.getDay()||7) + 1 + (parseInt(wk)-1)*7);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return { dateFrom: ymd(mon), dateTo: ymd(sun), label: `Uke ${wk} ${yr}`, chartMode: 'daily' };
  }
  // fallback
  return { dateFrom: ndays(30), dateTo: today(), label: 'Siste 30 dager', chartMode: 'daily' };
}

async function buildInnsikt() {
  const period = ST._innsiktPeriod || { mode: 'thisMonth' };
  const { dateFrom, dateTo, label, chartMode } = getInnsiktRange();
  const subTab = ST._innsiktSubTab || 'oversikt';

  const dateFilter = (col) => {
    let q = '';
    if (dateFrom) q += `&${col}=gte.${dateFrom}`;
    if (dateTo)   q += `&${col}=lte.${dateTo}`;
    return q;
  };

  // Fetch all data in parallel
  let sales = [], purchases = [], waste = [], privateOrders = [], prodLog = [], recipeRows = [];
  [sales, purchases, waste, privateOrders, prodLog, recipeRows] = await Promise.all([
    sbGet(`daily_sales?select=*${dateFilter('sale_date')}`).catch(()=>[]),
    sbGet(`purchase_receipts?select=*,bestillinger_order_id,purchase_items(total_price,unit_price,quantity)${dateFilter('receipt_date')}`).catch(()=>[]),
    sbGet(`waste_log?select=*${dateFilter('log_date')}`).catch(()=>[]),
    sbGet(`private_orders?select=*,private_order_items(*)${dateFilter('order_date')}`).catch(()=>[]),
    sbGet(`production_log?select=*${dateFilter('log_date')}`).catch(()=>[]),
    sbGet(`recipe_items?select=cafe_product_id,quantity,ingredients(id,cost_per_unit,name)`).catch(()=>[])
  ]);

  // Build cost-per-unit map: { cafe_product_id → cost_per_unit (kr) }
  // cost = Σ (recipe quantity × ingredient cost_per_unit)
  const costMap = {};
  recipeRows.forEach(r => {
    const ingCost = Number(r.ingredients?.cost_per_unit || 0);
    const qty     = Number(r.quantity || 0);
    costMap[r.cafe_product_id] = (costMap[r.cafe_product_id] || 0) + qty * ingCost;
  });
  // Which products have at least one ingredient with a cost entered
  const hasAnyCostSet = id => recipeRows.some(r =>
    r.cafe_product_id === id && Number(r.ingredients?.cost_per_unit || 0) > 0
  );

  const cpMap = {};
  ST.cafeProducts.forEach(p => { cpMap[p.id] = p; cpMap[p.name.toLowerCase()] = p; });

  // Shared: period selector
  const modeBtn = (mode, lbl, val='') => {
    const active = period.mode === mode && (!val || period.value === val);
    return `<button class="btn btn-sm${active?' btn-primary':''}" onclick="ST._innsiktPeriod={mode:'${mode}'${val?`,value:'${val}'`:''}};renderTab()">${lbl}</button>`;
  };
  const nowY = new Date().getFullYear();
  const nowM = `${nowY}-${String(new Date().getMonth()+1).padStart(2,'0')}`;

  const periodBar = `
  <div class="card" style="margin-bottom:1rem">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-weight:600;color:var(--text2);font-size:0.85rem;margin-right:4px">Periode:</span>
      ${modeBtn('thisWeek','Denne uken')}
      ${modeBtn('thisMonth','Denne måneden')}
      ${modeBtn('lastMonth','Forrige måned')}
      ${modeBtn('thisYear',String(nowY))}
      ${modeBtn('all','Totalt')}
      <span style="color:var(--border2);margin:0 4px">|</span>
      <input type="month" value="${period.mode==='month'?period.value:nowM}" style="font-size:0.82rem;padding:4px 8px;width:150px"
        onchange="ST._innsiktPeriod={mode:'month',value:this.value};renderTab()">
      <input type="date" value="${period.mode==='day'?period.value:today()}" style="font-size:0.82rem;padding:4px 8px;width:150px"
        title="Velg én bestemt dag"
        onchange="ST._innsiktPeriod={mode:'day',value:this.value};renderTab()">
    </div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text2)">Viser: <strong>${esc(label)}</strong>${dateFrom?` (${dateFrom} → ${dateTo||'i dag'})`:''}${sales.length===0?' — ingen salgsdata i perioden':''}</div>
  </div>`;

  // Shared: sub-tab navigation
  const stBtn = (id, lbl) => `<button class="${subTab===id?'active':''}" onclick="ST._innsiktSubTab='${id}';renderTab()">${lbl}</button>`;
  const subNav = `<div class="sub-nav" style="margin-bottom:1.25rem">
    ${stBtn('oversikt','📊 Oversikt')}
    ${stBtn('svinn','🗑️ Svinn')}
    ${stBtn('produkt','🔍 Produkt')}
  </div>`;

  // ================================================================
  //  OVERSIKT sub-tab
  // ================================================================
  if (subTab === 'oversikt') {
    const posRevenue = sales.reduce((s,r) => {
      const p = (r.cafe_product_id ? cpMap[r.cafe_product_id] : null) || cpMap[r.product_name?.toLowerCase()];
      return s + (p ? p.selling_price * r.units_sold : 0);
    }, 0);
    const privateRevenue = privateOrders.reduce((s,o) =>
      s + (o.private_order_items||[]).reduce((t,i) => t + Number(i.total_price||0), 0), 0);
    const revenue    = posRevenue + privateRevenue;
    const costByType = {};
    purchases.forEach(r => {
      const t = r.supplier_type || 'ekstern';
      // Use total_amount if > 0, otherwise sum actual line items
      // Fallback chain: total_amount → total_price → unit_price*quantity
      const itemsTotal = (r.purchase_items || []).reduce((s, i) => {
        const byTotalPrice = Number(i.total_price || 0);
        const byCalc       = Number(i.unit_price || 0) * Number(i.quantity || 0);
        return s + (byTotalPrice > 0 ? byTotalPrice : byCalc);
      }, 0);
      const amt = Number(r.total_amount) > 0 ? Number(r.total_amount) : itemsTotal;
      costByType[t] = (costByType[t] || 0) + amt;
    });
    const totalCost  = Object.values(costByType).reduce((a,b) => a+b, 0);
    const profit     = revenue - totalCost;
    const margin     = revenue > 0 ? (profit / revenue * 100) : 0;
    const totalUnits = sales.reduce((s,r) => s + r.units_sold, 0);
    const totalWaste = waste.reduce((s,r) => s + Number(r.quantity), 0);

    let chartLabels = [], chartData = [];
    if (chartMode === 'daily' && dateFrom && dateTo) {
      const cur = new Date(dateFrom), end = new Date(dateTo);
      while (cur <= end) {
        const d = cur.toISOString().slice(0,10);
        chartLabels.push(d.slice(5));
        chartData.push(sales.filter(r => r.sale_date === d).reduce((s,r) => s + r.units_sold, 0));
        cur.setDate(cur.getDate()+1);
      }
    } else {
      const monthly = {};
      sales.forEach(r => { const m = r.sale_date.slice(0,7); monthly[m] = (monthly[m]||0) + r.units_sold; });
      const months = Object.keys(monthly).sort();
      chartLabels = months; chartData = months.map(m => monthly[m]);
    }

    const kassertAmt = waste.filter(r=>r.waste_type==='kassert').reduce((s,r)=>s+Number(r.quantity),0);
    const good2goAmt = waste.filter(r=>r.waste_type==='2good2go').reduce((s,r)=>s+Number(r.quantity),0);
    const matAmt     = waste.filter(r=>r.waste_type==='personalmat').reduce((s,r)=>s+Number(r.quantity),0);

    const prodStats = {};
    sales.forEach(r => {
      const p   = (r.cafe_product_id ? cpMap[r.cafe_product_id] : null) || cpMap[r.product_name?.toLowerCase()];
      const pid = r.cafe_product_id || p?.id || null;
      const key = pid || r.product_name?.toLowerCase();
      if (!key) return;
      if (!prodStats[key]) prodStats[key] = { name: p?.name || r.product_name, pid, units: 0, revenue: 0, recipeCost: 0, hasCost: false, matched: !!p };
      prodStats[key].units      += r.units_sold;
      prodStats[key].revenue    += p ? (p.selling_price || 0) * r.units_sold : 0;
      if (!prodStats[key].matched && !!p) prodStats[key].matched = true;
      const effectivePid = pid || p?.id;
      if (effectivePid && costMap[effectivePid] !== undefined) {
        prodStats[key].recipeCost += Number(costMap[effectivePid] || 0) * r.units_sold;
        prodStats[key].hasCost     = hasAnyCostSet(effectivePid);
      }
    });
    // Matched products first (sorted by revenue), then unmatched at the bottom
    const prodStatsArr = Object.values(prodStats).sort((a,b) => {
      if (a.matched !== b.matched) return a.matched ? -1 : 1;
      return b.revenue - a.revenue;
    });

    // Recipe-based cost totals (only for products that have cost data)
    const totalRecipeCost    = prodStatsArr.reduce((s,p) => s + p.recipeCost, 0);
    const totalRecipeRevenue = prodStatsArr.filter(p => p.hasCost).reduce((s,p) => s + p.revenue, 0);
    const recipeProfit       = totalRecipeRevenue - totalRecipeCost;
    const recipeMarginPct    = totalRecipeRevenue > 0 ? (recipeProfit / totalRecipeRevenue * 100) : null;
    const nWithCost          = prodStatsArr.filter(p => p.hasCost).length;
    const nTotal             = prodStatsArr.length;

    // Diagnostic: per-category receipt counts (used for the breakdown table)
    const receiptDiag = {};
    purchases.forEach(r => {
      const t = r.supplier_type || 'ekstern';
      if (!receiptDiag[t]) receiptDiag[t] = { count: 0, amount: 0, zeroAmt: 0 };
      receiptDiag[t].count++;
      const itemsTotal = (r.purchase_items || []).reduce((s, i) => {
        const byTotalPrice = Number(i.total_price || 0);
        const byCalc       = Number(i.unit_price || 0) * Number(i.quantity || 0);
        return s + (byTotalPrice > 0 ? byTotalPrice : byCalc);
      }, 0);
      const amt = Number(r.total_amount) > 0 ? Number(r.total_amount) : itemsTotal;
      receiptDiag[t].amount += amt;
      if (amt === 0) receiptDiag[t].zeroAmt++;
    });

    ST._chartData = { mode: 'oversikt', chartLabels, chartData, kassertAmt, good2goAmt, matAmt, posRevenue, privateRevenue, totalCost, costByType, receiptDiag };

    return `${periodBar}${subNav}
    <div style="font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">📊 Salg og omsetning</div>
    <div class="stat-grid" style="margin-bottom:1rem">
      <div class="stat"><div class="stat-val">${fmt(revenue)}</div><div class="stat-label">Estimert omsetning</div>${privateRevenue>0?`<div style="font-size:0.75rem;color:var(--text2);margin-top:2px">herav ${fmt(privateRevenue)} faktura</div>`:''}</div>
      <div class="stat"><div class="stat-val">${fmt(totalCost)}</div><div class="stat-label">Innkjøp (kvitteringer)</div></div>
      <div class="stat"><div class="stat-val" style="color:${profit>=0?'#3B6D11':'#A32D2D'}">${fmt(profit)}</div><div class="stat-label">Resultat (kvitteringer)</div></div>
      <div class="stat"><div class="stat-val" style="color:${margin>=40?'#3B6D11':margin>=20?'#856404':'#A32D2D'}">${fmtN(margin)}%</div><div class="stat-label">Margin (kvitteringer)</div></div>
      <div class="stat"><div class="stat-val">${fmtN(totalUnits)}</div><div class="stat-label">Solgte enheter</div></div>
      <div class="stat"><div class="stat-val">${fmtN(totalWaste)}</div><div class="stat-label">Svinn totalt</div></div>
    </div>
    ${nWithCost > 0 ? `
    <div style="font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">🧾 Varekost fra oppskrifter (${nWithCost} av ${nTotal} produkter har kostdata)</div>
    <div class="stat-grid" style="margin-bottom:1rem">
      <div class="stat"><div class="stat-val">${fmt(totalRecipeCost)}</div><div class="stat-label">Varekost (oppskrift)</div></div>
      <div class="stat"><div class="stat-val" style="color:${recipeProfit>=0?'#3B6D11':'#A32D2D'}">${fmt(recipeProfit)}</div><div class="stat-label">Dekningsbidrag</div></div>
      <div class="stat"><div class="stat-val" style="color:${recipeMarginPct>=60?'#3B6D11':recipeMarginPct>=40?'#856404':'#A32D2D'}">${recipeMarginPct!=null?fmtN(recipeMarginPct)+'%':'—'}</div><div class="stat-label">Bruttomargin (oppskrift)</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--text2);font-size:0.9rem">${nTotal-nWithCost > 0 ? `⚠️ ${nTotal-nWithCost} produkter mangler kostdata` : '✅ Alle produkter'}</div><div class="stat-label">Kostnadsdekning</div></div>
    </div>` : `
    <div style="background:#fff9ee;border:1px solid #e6d5a0;border-radius:8px;padding:10px 14px;font-size:0.85rem;color:#856404;margin-bottom:1rem">
      ⚠️ Ingen ingredienspriser er lagt inn ennå — gå til <strong>Oppskrifter → Ingredienser</strong> og legg inn kostnad per enhet for å se varekost og margin per produkt.
    </div>`}
    <div class="grid2">
      <div class="card">
        <div class="card-header"><span class="card-title">Salg — ${esc(label)}</span></div>
        ${chartLabels.length===0?'<div class="empty">Ingen salgsdata</div>':'<div class="chart-wrap"><canvas id="chart-sales"></canvas></div>'}
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Inntekter vs. kostnader — ${esc(label)}</span></div>
        ${(posRevenue + privateRevenue + totalCost) === 0
          ? '<div class="empty">Ingen data i denne perioden</div>'
          : '<div class="chart-wrap"><canvas id="chart-income"></canvas></div>'}
      </div>
    </div>
    <div class="card" style="padding:14px 18px">
      <div style="font-size:0.82rem;font-weight:700;color:var(--text2);margin-bottom:8px;letter-spacing:0.03em;text-transform:uppercase">Innkjøp per kategori — ${esc(label)}</div>
      ${Object.keys(receiptDiag).length === 0
        ? '<div style="color:var(--text2);font-size:0.88rem">Ingen innkjøp funnet i denne perioden.</div>'
        : `<table style="width:100%;font-size:0.88rem;border-collapse:collapse">
            <thead><tr style="border-bottom:1px solid var(--border)">
              <th style="text-align:left;padding:4px 8px 6px 0;color:var(--text2);font-weight:600">Kategori</th>
              <th style="text-align:center;padding:4px 8px 6px;color:var(--text2);font-weight:600">Kvitteringer</th>
              <th style="text-align:right;padding:4px 0 6px 8px;color:var(--text2);font-weight:600">Beløp totalt</th>
              <th style="text-align:center;padding:4px 0 6px 8px;color:var(--text2);font-weight:600">⚠️ Uten beløp</th>
            </tr></thead>
            <tbody>
              ${['kantine','supermarked','ekstern'].filter(t => receiptDiag[t]).map(t => {
                const d = receiptDiag[t];
                const icon = t==='kantine'?'🏢':t==='supermarked'?'🛒':'🏪';
                return `<tr style="border-bottom:1px solid var(--border2)">
                  <td style="padding:5px 8px 5px 0"><span class="badge badge-${t}">${icon} ${t}</span></td>
                  <td style="text-align:center;padding:5px 8px">${d.count}</td>
                  <td style="text-align:right;padding:5px 0 5px 8px;font-weight:600">${fmt(d.amount)}</td>
                  <td style="text-align:center;padding:5px 0 5px 8px;color:${d.zeroAmt>0?'#e53935':'#2e7d32'}">${d.zeroAmt > 0 ? d.zeroAmt + ' (ingen pris!)' : '✓'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`}
      <div style="font-size:0.76rem;color:var(--text2);margin-top:8px">💡 Kvitteringer «uten beløp» finnes i databasen for denne perioden, men vises ikke i kakegrafen fordi prisen er 0 kr. Oppdater vareprisene i innkjøpet for å få dem med.</div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Per-produkt — ${esc(label)}</span>
        <div class="spacer"></div>
        <button class="btn btn-sm btn-primary" onclick="exportInsightExcel()">📥 Eksporter til Excel</button>
      </div>
      ${prodStatsArr.length===0?'<div class="empty">Ingen salgsdata i denne perioden</div>':`
      <table>
        <thead><tr>
          <th>Produkt</th>
          <th style="text-align:right">Enheter</th>
          <th style="text-align:right">Omsetning</th>
          <th style="text-align:right">Varekost</th>
          <th style="text-align:right">Dekningsbidrag</th>
          <th style="text-align:right">Margin %</th>
        </tr></thead>
        <tbody>
          ${prodStatsArr.map(p => {
            const db  = p.hasCost ? p.revenue - p.recipeCost : null;
            const pct = p.hasCost && p.revenue > 0 ? (db / p.revenue * 100) : null;
            const col = pct == null ? 'var(--text2)' : pct >= 60 ? '#3B6D11' : pct >= 40 ? '#856404' : '#A32D2D';
            const unmatchedBg = !p.matched ? 'background:#fff8e1' : '';
            const nameCell = p.matched
              ? esc(p.name)
              : `${esc(p.name)} <span title="Produktet er ikke koblet til et salgsproduktnavn — gå til Salg → Produktmapping og importer på nytt" style="background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:4px;padding:1px 5px;font-size:0.72rem;font-weight:600;cursor:help">⚠️ Ikke koblet</span>`;
            return `<tr style="${unmatchedBg}">
              <td>${nameCell}</td>
              <td style="text-align:right">${fmtN(p.units)}</td>
              <td style="text-align:right">${p.matched ? fmt(p.revenue) : '<span style="color:#856404">—</span>'}</td>
              <td style="text-align:right;color:var(--text2)">${p.hasCost ? fmt(p.recipeCost) : '—'}</td>
              <td style="text-align:right;font-weight:${db!=null?'600':'400'};color:${db!=null?(db>=0?'#3B6D11':'#A32D2D'):'var(--text2)'}">${db!=null?fmt(db):'—'}</td>
              <td style="text-align:right;font-weight:600;color:${col}">${pct!=null?fmtN(pct)+'%':'—'}</td>
            </tr>`;
          }).join('')}
          <tr style="font-weight:700;border-top:2px solid var(--border)">
            <td>Totalt</td>
            <td style="text-align:right">${fmtN(prodStatsArr.reduce((s,p)=>s+p.units,0))}</td>
            <td style="text-align:right">${fmt(revenue)}</td>
            <td style="text-align:right">${nWithCost>0?fmt(totalRecipeCost):'—'}</td>
            <td style="text-align:right">${nWithCost>0?fmt(recipeProfit):'—'}</td>
            <td style="text-align:right">${recipeMarginPct!=null?fmtN(recipeMarginPct)+'%':'—'}</td>
          </tr>
        </tbody>
      </table>
      ${prodStatsArr.some(p => !p.matched) ? `<div style="font-size:0.78rem;color:#856404;background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:7px 10px;margin-top:10px">⚠️ Noen produkter er ikke koblet til et salgsprodukt og vises uten omsetning. Gå til <strong>Salg → Produktmapping</strong> og importer POS-filen på nytt for å koble dem.</div>` : ''}
      ${nWithCost < nTotal ? `<div style="font-size:0.78rem;color:#856404;margin-top:8px">⚠️ Varekost og margin vises kun for produkter med oppskrift og ingredienspriser. Legg inn priser under Oppskrifter → Ingredienser.</div>` : ''}`}
    </div>`;
  }

  // ================================================================
  //  SVINN sub-tab
  // ================================================================
  if (subTab === 'svinn') {
    // Aggregate waste by product
    const wasteByProd = {};
    waste.forEach(r => {
      const key = r.cafe_product_id || r.product_name;
      if (!wasteByProd[key]) wasteByProd[key] = { name: r.product_name, kassert:0, g2g:0, personalmat:0, noWaste: false };
      if (r.waste_type==='kassert')     wasteByProd[key].kassert     += Number(r.quantity);
      if (r.waste_type==='2good2go')    wasteByProd[key].g2g         += Number(r.quantity);
      if (r.waste_type==='personalmat') wasteByProd[key].personalmat += Number(r.quantity);
    });

    // Also include daglig-tracked products that were sold but have no waste entry
    // (excludes made-to-order and untracked POS products)
    const dagligProductIds = new Set(ST.cafeProducts.filter(p => !p.made_to_order).map(p => p.id));
    const seenWasteKeys = new Set(Object.keys(wasteByProd).map(k => String(k)));
    const soldByKey = {};
    sales.forEach(r => {
      const skey = String(r.cafe_product_id || r.product_name);
      soldByKey[skey] = (soldByKey[skey] || 0) + r.units_sold;
      if (!seenWasteKeys.has(skey) && r.cafe_product_id && dagligProductIds.has(r.cafe_product_id)) {
        const p = cpMap[r.cafe_product_id];
        wasteByProd[skey] = { name: p?.name || r.product_name, kassert:0, g2g:0, personalmat:0, noWaste: true };
        seenWasteKeys.add(skey);
      } else if (!seenWasteKeys.has(skey)) {
        soldByKey[skey] = (soldByKey[skey] || 0); // still track for sold count fallback
      }
    });

    // Aggregate production + sales by product
    const prodByProd = {}, salesByProd = {};
    prodLog.forEach(r => { if(r.cafe_product_id) prodByProd[r.cafe_product_id]  = (prodByProd[r.cafe_product_id]||0)  + Number(r.quantity_produced); });
    sales.forEach(r   => { if(r.cafe_product_id) salesByProd[r.cafe_product_id] = (salesByProd[r.cafe_product_id]||0) + r.units_sold; });
    // For auto_canteen_produce products: also derive production from delivered kantine orders
    try {
      const autoCanteenProds = ST.cafeProducts.filter(p => p.auto_canteen_produce);
      const autoCanteenIds = new Set(autoCanteenProds.map(p => p.id));

      if (autoCanteenIds.size > 0) {
        // Build map: kantine product id → ingredient_id (canteen_product_id first, then name fallback)
        const kantineIngMap = {};
        (ST.ingredients || []).forEach(i => { if (i.canteen_product_id) kantineIngMap[i.canteen_product_id] = i.id; });
        (ST.kantineProducts || []).forEach(kp => {
          if (kantineIngMap[kp.id] != null) return;
          const match = (ST.ingredients || []).find(i => i.name.toLowerCase() === kp.name.toLowerCase());
          if (match) kantineIngMap[kp.id] = match.id;
        });

        // Find kantine product named "sjokolade cookies" specifically
        const cookieKp = (ST.kantineProducts||[]).find(kp => kp.name.toLowerCase().includes('sjokolade'));

        // Build map: ingredient_id → cafe_product_id (auto_canteen_produce only)
        const ingToCp = {};
        recipeRows.forEach(r => { if (autoCanteenIds.has(r.cafe_product_id) && r.ingredients?.id) ingToCp[r.ingredients.id] = r.cafe_product_id; });

        // Check recipe rows for auto_canteen products
        const autoRecipes = recipeRows.filter(r => autoCanteenIds.has(r.cafe_product_id));

        if (Object.keys(ingToCp).length > 0) {
          // Products that already have production_log data in this period — don't double-count from kantine orders
          const hasProductionLog = new Set(Object.keys(prodByProd).map(Number));
          const kantineOrders = await sbGet(`orders?status=in.(delivered,accepted)&select=id,items,week`).catch(() => []);

          let inRangeCount = 0;
          kantineOrders.forEach(order => {
            if (order.week && (dateFrom || dateTo)) {
              const [wy, wn] = order.week.split('-W').map(Number);
              const approxDate = new Date(wy, 0, 1 + (wn - 1) * 7);
              const approxStr = approxDate.toISOString().slice(0, 10);
              if (dateFrom && approxStr < dateFrom) return;
              if (dateTo   && approxStr > dateTo)   return;
            }
            inRangeCount++;
            (Array.isArray(order.items) ? order.items : []).forEach(item => {
              const ingId = kantineIngMap[item.pid];
              if (!ingId) return;
              const cpId = ingToCp[ingId];
              if (!cpId) return;
              if (hasProductionLog.has(cpId)) return; // already covered by production_log, skip to avoid double-count
              const qty = (item.splits && item.splits.length > 0)
                ? item.splits.reduce((s, sp) => s + (sp.qty || 0), 0)
                : (item.qty || 0);
              if (qty > 0) prodByProd[cpId] = (prodByProd[cpId] || 0) + qty;
            });
          });
        } else {
        }
      }
    } catch(e) { /* best-effort */ }

    const wasteArr = Object.entries(wasteByProd).map(([key, w]) => {
      const total     = w.kassert + w.g2g + w.personalmat;
      const prod      = prodByProd[key]  || 0;
      const sold      = salesByProd[key] || soldByKey[key] || 0;
      const wasteRate = prod > 0 ? (total / prod * 100) : null;
      return { key, ...w, total, prod, sold, wasteRate };
    }).sort((a,b) => {
      if (a.noWaste !== b.noWaste) return a.noWaste ? 1 : -1;
      return b.total - a.total;
    });

    // Waste-by-product chart data (horizontal bar)
    const wpLabels   = wasteArr.map(w => w.name);
    const wpKassert  = wasteArr.map(w => w.kassert);
    const wpG2G      = wasteArr.map(w => w.g2g);
    const wpMat      = wasteArr.map(w => w.personalmat);

    // Waste-over-time chart data (stacked bar)
    let wtLabels = [], wtKassert = [], wtG2G = [], wtMat = [];
    if (chartMode === 'daily' && dateFrom && dateTo) {
      const cur = new Date(dateFrom), end = new Date(dateTo);
      while (cur <= end) {
        const d = cur.toISOString().slice(0,10);
        wtLabels.push(d.slice(5));
        wtKassert.push(waste.filter(r=>r.log_date===d&&r.waste_type==='kassert').reduce((s,r)=>s+Number(r.quantity),0));
        wtG2G.push(waste.filter(r=>r.log_date===d&&r.waste_type==='2good2go').reduce((s,r)=>s+Number(r.quantity),0));
        wtMat.push(waste.filter(r=>r.log_date===d&&r.waste_type==='personalmat').reduce((s,r)=>s+Number(r.quantity),0));
        cur.setDate(cur.getDate()+1);
      }
    } else {
      const monthly = {};
      waste.forEach(r => {
        const m = r.log_date.slice(0,7);
        if (!monthly[m]) monthly[m] = { kassert:0, g2g:0, personalmat:0 };
        if (r.waste_type==='kassert')     monthly[m].kassert     += Number(r.quantity);
        if (r.waste_type==='2good2go')    monthly[m].g2g         += Number(r.quantity);
        if (r.waste_type==='personalmat') monthly[m].personalmat += Number(r.quantity);
      });
      const months = Object.keys(monthly).sort();
      wtLabels = months; wtKassert = months.map(m=>monthly[m].kassert);
      wtG2G = months.map(m=>monthly[m].g2g); wtMat = months.map(m=>monthly[m].personalmat);
    }

    ST._chartData = { mode: 'svinn', wpLabels, wpKassert, wpG2G, wpMat, wtLabels, wtKassert, wtG2G, wtMat };

    const totKassert = wasteArr.reduce((s,w)=>s+w.kassert,0);
    const totG2G     = wasteArr.reduce((s,w)=>s+w.g2g,0);
    const totMat     = wasteArr.reduce((s,w)=>s+w.personalmat,0);
    const totAll     = totKassert + totG2G + totMat;

    const tableRows = wasteArr.length === 0
      ? `<tr><td colspan="8" style="text-align:center;color:#aaa;padding:16px">Ingen svinndata i denne perioden</td></tr>`
      : wasteArr.map(w => {
          const rateCol = w.wasteRate==null?'#aaa':w.wasteRate>30?'#e53935':w.wasteRate>15?'#e6a817':'#43a047';
          return `<tr style="border-bottom:1px solid var(--bg3)">
            <td style="padding:8px 6px;font-weight:500">${esc(w.name)}${w.noWaste ? ' <span style="font-size:0.72rem;color:#aaa;font-weight:400;font-style:italic">(ingen svinn registrert)</span>' : ''}</td>
            <td style="padding:8px 6px;text-align:center;color:#555">${w.prod>0?fmtN(w.prod):'—'}</td>
            <td style="padding:8px 6px;text-align:center;color:#555">${w.sold>0?fmtN(w.sold):'—'}</td>
            <td style="padding:8px 6px;text-align:center;color:#e53935">${w.kassert>0?fmtN(w.kassert):'—'}</td>
            <td style="padding:8px 6px;text-align:center;color:#27ae60">${w.g2g>0?fmtN(w.g2g):'—'}</td>
            <td style="padding:8px 6px;text-align:center;color:#e6a817">${w.personalmat>0?fmtN(w.personalmat):'—'}</td>
            <td style="padding:8px 6px;text-align:center;font-weight:600">${fmtN(w.total)}</td>
            <td style="padding:8px 6px;text-align:center;font-weight:600;color:${rateCol}">${w.wasteRate!=null?fmtN(w.wasteRate)+'%':'—'}</td>
          </tr>`;
        }).join('');

    return `${periodBar}${subNav}
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat"><div class="stat-val">${fmtN(totAll)}</div><div class="stat-label">Total svinn</div></div>
      <div class="stat"><div class="stat-val" style="color:#e53935">${fmtN(totKassert)}</div><div class="stat-label">🗑️ Kassert</div></div>
      <div class="stat"><div class="stat-val" style="color:#27ae60">${fmtN(totG2G)}</div><div class="stat-label">🟢 2Good2Go</div></div>
      <div class="stat"><div class="stat-val" style="color:#e6a817">${fmtN(totMat)}</div><div class="stat-label">🍽️ Personalmat</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-header"><span class="card-title">Svinn per produkt</span></div>
        ${wasteArr.length===0?'<div class="empty">Ingen svinndata</div>':'<div class="chart-wrap" style="height:260px"><canvas id="chart-waste-prod"></canvas></div>'}
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Svinn over tid</span></div>
        ${wtLabels.filter((_,i)=>wtKassert[i]+wtG2G[i]+wtMat[i]>0).length===0?'<div class="empty">Ingen svinndata</div>':'<div class="chart-wrap"><canvas id="chart-waste-time"></canvas></div>'}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Detaljer — ${esc(label)}</span></div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.88rem;min-width:560px">
          <thead>
            <tr style="background:var(--bg2);color:#666;font-size:0.78rem;text-transform:uppercase">
              <th style="padding:8px 6px;text-align:left">Produkt</th>
              <th style="padding:8px 6px;text-align:center">Produsert</th>
              <th style="padding:8px 6px;text-align:center">Solgt</th>
              <th style="padding:8px 6px;text-align:center;color:#e53935">🗑️ Kassert</th>
              <th style="padding:8px 6px;text-align:center;color:#27ae60">🟢 2G2G</th>
              <th style="padding:8px 6px;text-align:center;color:#e6a817">🍽️ Personalmat</th>
              <th style="padding:8px 6px;text-align:center">Total svinn</th>
              <th style="padding:8px 6px;text-align:center">Svinn %</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <p style="margin-top:8px;font-size:0.78rem;color:#aaa">Svinn % = total svinn ÷ produsert. 🔴 over 30% · 🟡 15–30% · 🟢 under 15%</p>
    </div>`;
  }

  // ================================================================
  //  PRODUKT sub-tab
  // ================================================================
  if (subTab === 'produkt') {
    const selectedId = ST._innsiktProductId ? Number(ST._innsiktProductId) : null;

    const prodOptions = ST.cafeProducts
      .slice().sort((a,b) => a.name.localeCompare(b.name, 'nb'))
      .map(p => `<option value="${p.id}" ${selectedId===p.id?'selected':''}>${esc(p.name)}</option>`)
      .join('');

    const prodSelector = `
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label style="font-weight:600;white-space:nowrap">Velg produkt:</label>
        <select style="flex:1;min-width:200px;max-width:380px" onchange="ST._innsiktProductId=this.value;renderTab()">
          <option value="">— Velg et produkt —</option>
          ${prodOptions}
        </select>
      </div>
    </div>`;

    if (!selectedId) {
      ST._chartData = { mode: 'produkt', ptLabels:[], ptProd:[], ptSold:[], ptWaste:[] };
      return `${periodBar}${subNav}${prodSelector}
      <div class="empty">Velg et produkt ovenfor for å se detaljert statistikk.</div>`;
    }

    const prod = ST.cafeProducts.find(p => p.id === selectedId);
    if (!prod) { ST._chartData = { mode:'produkt', ptLabels:[], ptProd:[], ptSold:[], ptWaste:[] }; return `${periodBar}${subNav}${prodSelector}<div class="empty">Produkt ikke funnet.</div>`; }

    const pSales  = sales.filter(r => r.cafe_product_id===selectedId || r.product_name?.toLowerCase()===prod.name.toLowerCase());
    const pWaste  = waste.filter(r => r.cafe_product_id===selectedId);
    const pProdL  = prodLog.filter(r => r.cafe_product_id===selectedId);

    const totalSold     = pSales.reduce((s,r) => s + r.units_sold, 0);
    const totalProduced = pProdL.reduce((s,r) => s + Number(r.quantity_produced), 0);
    const totalWasteU   = pWaste.reduce((s,r) => s + Number(r.quantity), 0);
    const wasteRate     = totalProduced > 0 ? (totalWasteU / totalProduced * 100) : null;
    const revenue       = totalSold * (prod.selling_price || 0);
    const kassertU      = pWaste.filter(r=>r.waste_type==='kassert').reduce((s,r)=>s+Number(r.quantity),0);
    const g2gU          = pWaste.filter(r=>r.waste_type==='2good2go').reduce((s,r)=>s+Number(r.quantity),0);
    const matU          = pWaste.filter(r=>r.waste_type==='personalmat').reduce((s,r)=>s+Number(r.quantity),0);

    // Time series
    let ptLabels = [], ptProd = [], ptSold = [], ptWaste = [];
    if (chartMode === 'daily' && dateFrom && dateTo) {
      const cur = new Date(dateFrom), end = new Date(dateTo);
      while (cur <= end) {
        const d = cur.toISOString().slice(0,10);
        ptLabels.push(d.slice(5));
        ptProd.push(pProdL.filter(r=>r.log_date===d).reduce((s,r)=>s+Number(r.quantity_produced),0));
        ptSold.push(pSales.filter(r=>r.sale_date===d).reduce((s,r)=>s+r.units_sold,0));
        ptWaste.push(pWaste.filter(r=>r.log_date===d).reduce((s,r)=>s+Number(r.quantity),0));
        cur.setDate(cur.getDate()+1);
      }
    } else {
      const monthly = {};
      const addM = (date, key, val) => { const m=date.slice(0,7); if(!monthly[m]) monthly[m]={prod:0,sold:0,waste:0}; monthly[m][key]+=val; };
      pProdL.forEach(r => addM(r.log_date, 'prod', Number(r.quantity_produced)));
      pSales.forEach(r => addM(r.sale_date, 'sold', r.units_sold));
      pWaste.forEach(r => addM(r.log_date,  'waste', Number(r.quantity)));
      const months = Object.keys(monthly).sort();
      ptLabels = months; ptProd = months.map(m=>monthly[m].prod);
      ptSold = months.map(m=>monthly[m].sold); ptWaste = months.map(m=>monthly[m].waste);
    }

    ST._chartData = { mode: 'produkt', ptLabels, ptProd, ptSold, ptWaste, _pKassert: kassertU, _pG2G: g2gU, _pMat: matU };

    const costPerUnit  = costMap[selectedId] || 0;
    const hasCost      = hasAnyCostSet(selectedId);
    const marginPerUnit = hasCost ? (prod.selling_price||0) - costPerUnit : null;
    const marginPct     = hasCost && (prod.selling_price||0) > 0 ? (marginPerUnit / (prod.selling_price||0) * 100) : null;
    const totalContrib  = hasCost ? totalSold * marginPerUnit : null;
    const totalCostProd = hasCost ? totalSold * costPerUnit : null;

    const rateCol   = wasteRate==null?'#aaa':wasteRate>30?'#e53935':wasteRate>15?'#e6a817':'#43a047';
    const marginCol = marginPct==null?'#aaa':marginPct>=60?'#3B6D11':marginPct>=40?'#856404':'#A32D2D';
    const hasChart  = ptLabels.some((_,i) => ptProd[i]+ptSold[i]+ptWaste[i] > 0);

    return `${periodBar}${subNav}${prodSelector}
    <div style="font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Salg — ${esc(label)}</div>
    <div class="stat-grid" style="margin-bottom:1rem">
      <div class="stat"><div class="stat-val">${fmtN(totalSold)}</div><div class="stat-label">Solgte enheter</div></div>
      <div class="stat"><div class="stat-val">${fmt(revenue)}</div><div class="stat-label">Omsetning</div></div>
      <div class="stat"><div class="stat-val">${totalProduced>0?fmtN(totalProduced):'—'}</div><div class="stat-label">Produsert</div></div>
      <div class="stat"><div class="stat-val" style="color:#e53935">${fmtN(totalWasteU)}</div><div class="stat-label">Svinn totalt</div></div>
      <div class="stat"><div class="stat-val" style="color:${rateCol}">${wasteRate!=null?fmtN(wasteRate)+'%':'—'}</div><div class="stat-label">Svinn %</div></div>
    </div>
    <div style="font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Pris og margin per enhet</div>
    <div class="stat-grid" style="margin-bottom:1rem">
      <div class="stat"><div class="stat-val">${fmt(prod.selling_price||0)}</div><div class="stat-label">Salgspris</div></div>
      <div class="stat"><div class="stat-val" style="color:${hasCost?'var(--text)':'#aaa'}">${hasCost?fmt(costPerUnit):'Mangler oppskrift'}</div><div class="stat-label">Varekost per enhet</div></div>
      <div class="stat"><div class="stat-val" style="color:${hasCost?(marginPerUnit>=0?'#3B6D11':'#A32D2D'):'#aaa'}">${hasCost?fmt(marginPerUnit):'—'}</div><div class="stat-label">Dekningsbidrag per enhet</div></div>
      <div class="stat"><div class="stat-val" style="color:${marginCol}">${marginPct!=null?fmtN(marginPct)+'%':'—'}</div><div class="stat-label">Bruttomargin %</div></div>
      <div class="stat"><div class="stat-val" style="color:${hasCost?(totalContrib>=0?'#3B6D11':'#A32D2D'):'#aaa'}">${hasCost?fmt(totalContrib):'—'}</div><div class="stat-label">Dekningsbidrag totalt</div></div>
      <div class="stat"><div class="stat-val" style="color:${hasCost?'var(--text2)':'#aaa'}">${hasCost?fmt(totalCostProd):'—'}</div><div class="stat-label">Varekost totalt</div></div>
    </div>
    ${!hasCost ? `<div style="background:#fff9ee;border:1px solid #e6d5a0;border-radius:8px;padding:10px 14px;font-size:0.85rem;color:#856404;margin-bottom:1rem">
      ⚠️ Ingen ingredienspriser er registrert for dette produktet. Gå til <strong>Oppskrifter → Ingredienser</strong> og legg inn kostnad per enhet.
    </div>` : ''}
    <div class="grid2">
      <div class="card">
        <div class="card-header"><span class="card-title">${esc(prod.name)} — produsert / solgt / svinn</span></div>
        ${!hasChart?'<div class="empty">Ingen data i denne perioden</div>':'<div class="chart-wrap" style="height:280px"><canvas id="chart-produkt"></canvas></div>'}
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Svinnfordeling</span></div>
        ${totalWasteU===0?'<div class="empty">Ingen svinndata</div>':'<div class="chart-wrap"><canvas id="chart-produkt-waste"></canvas></div>'}
      </div>
    </div>`;
  }

  return `${periodBar}${subNav}<div class="empty">Ukjent visning</div>`;
}

function initCharts() {
  if (!ST._chartData) return;
  const cd = ST._chartData;

  // Destroy all existing charts cleanly
  ['sales','waste','wasteProd','wasteTime','produkt','produktWaste','priceHistory'].forEach(k => {
    if (ST.charts[k]) { try { ST.charts[k].destroy(); } catch(e) {} delete ST.charts[k]; }
  });

  // ── OVERSIKT ──
  if (cd.mode === 'oversikt') {
    const salesCtx = el('chart-sales');
    if (salesCtx && cd.chartLabels.length > 0) {
      ST.charts.sales = new Chart(salesCtx, {
        type: 'bar',
        data: { labels: cd.chartLabels, datasets: [{ label: 'Enheter solgt', data: cd.chartData, backgroundColor: '#6F4E37cc', borderColor: '#6F4E37', borderWidth: 1, borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision:0 } } } }
      });
    }
    const incomeCtx = el('chart-income');
    if (incomeCtx) {
      const posAmt = cd.posRevenue     || 0;
      const priAmt = cd.privateRevenue || 0;

      // Income slices (greens)
      const labels      = ['💰 Kassasalg', '📄 Faktura'];
      const vals        = [posAmt, priAmt];
      const bgColors    = ['#2e7d32cc', '#66bb6acc'];
      const borderColors = ['#2e7d32',  '#66bb6a'];

      // Cost slices — one per supplier_type, different shades of blue
      const costMeta = {
        supermarked: { label: '🛒 Supermarked',  bg: '#1a3a6bcc', border: '#1a3a6b' },
        kantine:     { label: '🏢 Kantine',       bg: '#2563ebcc', border: '#2563eb' },
        ekstern:     { label: '🏪 Ekstern',        bg: '#60a5facc', border: '#60a5fa' },
      };
      const byType = cd.costByType || {};
      // Render in a fixed order so colours are consistent across periods
      ['supermarked', 'kantine', 'ekstern'].forEach(type => {
        const amt = byType[type] || 0;
        if (amt > 0) {
          const meta = costMeta[type] || { label: type, bg: '#93c5fdcc', border: '#93c5fd' };
          labels.push(meta.label);
          vals.push(amt);
          bgColors.push(meta.bg);
          borderColors.push(meta.border);
        }
      });
      // Any unexpected types (future-proof)
      Object.entries(byType).forEach(([type, amt]) => {
        if (!costMeta[type] && amt > 0) {
          labels.push('🛍️ ' + type);
          vals.push(amt);
          bgColors.push('#bfdbfecc');
          borderColors.push('#bfdbfe');
        }
      });

      ST.charts.waste = new Chart(incomeCtx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: vals,
            backgroundColor: bgColors,
            borderColor:     borderColors,
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom' },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const v = ctx.parsed;
                  const total = vals.reduce((a,b)=>a+b,0);
                  const pct   = total > 0 ? ' (' + (v/total*100).toFixed(1) + '%)' : '';
                  return ' ' + new Intl.NumberFormat('nb-NO',{style:'currency',currency:'NOK',maximumFractionDigits:0}).format(v) + pct;
                }
              }
            }
          }
        }
      });
    }
  }

  // ── SVINN ──
  if (cd.mode === 'svinn') {
    const wpCtx = el('chart-waste-prod');
    if (wpCtx && cd.wpLabels.length > 0) {
      ST.charts.wasteProd = new Chart(wpCtx, {
        type: 'bar',
        data: { labels: cd.wpLabels, datasets: [
          { label: '🗑️ Kassert',    data: cd.wpKassert, backgroundColor: '#e74c3c99', borderColor: '#e74c3c', borderWidth: 1 },
          { label: '🟢 2Good2Go',   data: cd.wpG2G,     backgroundColor: '#27ae6099', borderColor: '#27ae60', borderWidth: 1 },
          { label: '🍽️ Personalmat',data: cd.wpMat,     backgroundColor: '#f39c1299', borderColor: '#f39c12', borderWidth: 1 }
        ]},
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } },
          scales: { x: { stacked: true, beginAtZero: true, ticks: { precision:0 } }, y: { stacked: true } } }
      });
    }
    const wtCtx = el('chart-waste-time');
    if (wtCtx) {
      ST.charts.wasteTime = new Chart(wtCtx, {
        type: 'bar',
        data: { labels: cd.wtLabels, datasets: [
          { label: '🗑️ Kassert',    data: cd.wtKassert, backgroundColor: '#e74c3c99', borderColor: '#e74c3c', borderWidth: 1 },
          { label: '🟢 2Good2Go',   data: cd.wtG2G,     backgroundColor: '#27ae6099', borderColor: '#27ae60', borderWidth: 1 },
          { label: '🍽️ Personalmat',data: cd.wtMat,     backgroundColor: '#f39c1299', borderColor: '#f39c12', borderWidth: 1 }
        ]},
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } },
          scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { precision:0 } } } }
      });
    }
  }

  // ── PRISHISTORIKK ──
  if (cd.mode === 'prishistorikk') {
    const ctx = el('chart-pricehistory');
    if (ctx && cd.prices.length > 1) {
      ST.charts.priceHistory = new Chart(ctx, {
        type: 'line',
        data: {
          labels: cd.labels,
          datasets: [{
            label: cd.itemName,
            data: cd.prices,
            borderColor: '#2e7d32',
            backgroundColor: '#2e7d3218',
            borderWidth: 2.5,
            pointBackgroundColor: '#2e7d32',
            pointRadius: 5,
            pointHoverRadius: 7,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ' ' + new Intl.NumberFormat('nb-NO',{style:'currency',currency:'NOK',maximumFractionDigits:2}).format(ctx.parsed.y)
              }
            }
          },
          scales: {
            y: {
              beginAtZero: false,
              ticks: { callback: v => 'kr ' + fmtN(v) }
            }
          }
        }
      });
    }
  }

  // ── PRODUKT ──
  if (cd.mode === 'produkt') {
    const pCtx = el('chart-produkt');
    if (pCtx && cd.ptLabels.length > 0) {
      ST.charts.produkt = new Chart(pCtx, {
        type: 'bar',
        data: { labels: cd.ptLabels, datasets: [
          { label: '🔵 Produsert', data: cd.ptProd,  backgroundColor: '#4a90d966', borderColor: '#4a90d9', borderWidth: 1, borderRadius: 3 },
          { label: '✅ Solgt',     data: cd.ptSold,  backgroundColor: '#6F4E37cc', borderColor: '#6F4E37', borderWidth: 1, borderRadius: 3 },
          { label: '🗑️ Svinn',    data: cd.ptWaste, backgroundColor: '#e74c3c99', borderColor: '#e74c3c', borderWidth: 1, borderRadius: 3 }
        ]},
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } },
          scales: { y: { beginAtZero: true, ticks: { precision:0 } } } }
      });
    }
    const pwCtx = el('chart-produkt-waste');
    if (pwCtx) {
      const k = cd.ptWaste.reduce((s,v)=>s+v,0);
      if (k === 0) {
        pwCtx.parentElement.innerHTML = '<div class="empty">Ingen svinndata</div>';
      } else {
        // rebuild waste breakdown from raw data via filter — use totals stored in ST._chartData
        const kassertSum  = (ST._chartData._pKassert  || 0);
        const g2gSum      = (ST._chartData._pG2G      || 0);
        const matSum      = (ST._chartData._pMat      || 0);
        ST.charts.produktWaste = new Chart(pwCtx, {
          type: 'pie',
          data: { labels: ['🗑️ Kassert', '🟢 2Good2Go', '🍽️ Personalmat'],
            datasets: [{ data: [kassertSum, g2gSum, matSum], backgroundColor: ['#e74c3c99','#27ae6099','#f39c1299'], borderColor: ['#e74c3c','#27ae60','#f39c12'], borderWidth: 2 }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
      }
    }
  }
}

async function exportInsightExcel() {
  const d30 = ndays(30);
  let sales = [], purchases = [], waste = [];
  try { sales      = await sbGet(`daily_sales?sale_date=gte.${d30}&order=sale_date`); } catch(e) {}
  try { purchases  = await sbGet(`purchase_receipts?receipt_date=gte.${d30}&select=*,purchase_items(*)&order=receipt_date`); } catch(e) {}
  try { waste      = await sbGet(`waste_log?log_date=gte.${d30}&order=log_date`); } catch(e) {}

  const wb = XLSX.utils.book_new();

  const salgData = [['Dato','Produktnavn','Enheter solgt']].concat(sales.map(r=>[r.sale_date,r.product_name,r.units_sold]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(salgData), 'Salg');

  const innkjopData = [['Dato','Leverandør','Vare','Antall','Enhet','Kostpris']];
  purchases.forEach(r => {
    if (r.purchase_items && r.purchase_items.length > 0) {
      r.purchase_items.forEach(i => innkjopData.push([r.receipt_date, r.supplier_name||r.supplier_type, i.item_name, i.quantity, i.unit, i.total_price]));
    } else {
      innkjopData.push([r.receipt_date, r.supplier_name||r.supplier_type, '', '', '', r.total_amount]);
    }
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(innkjopData), 'Innkjøp');

  const avfallData = [['Dato','Produkt','Antall','Type']].concat(waste.map(r=>[r.log_date,r.product_name,r.quantity,r.waste_type]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(avfallData), 'Avfall');

  XLSX.writeFile(wb, `smia-oversikt-${today()}.xlsx`);
  showAlert('Excel-fil lastet ned!');
}

async function buildLager() {
  const lagerProds = ST.cafeProducts.filter(p => p.min_stock != null);

  if (lagerProds.length === 0) {
    return `<div style="padding:24px">
      <h2 style="margin:0 0 12px;font-size:1.2rem">📦 Lagerstatus</h2>
      <div class="empty">Ingen produkter har minimumsbeholdning satt ennå.<br>
        Åpne et produkt i Oppskrifter → Salgsprodukter, rediger det og fyll inn
        "Min. lager" — da dukker det opp her.</div>
    </div>`;
  }

  const cpIds = lagerProds.map(p => p.id);
  const idList = cpIds.join(',');
  const canteenProdIds = new Set(lagerProds.filter(p => p.auto_canteen_produce).map(p => p.id));

  let prodLogs = [], salesData = [], wasteData = [], adjustments = [], recipeRows = [];
  try {
    [prodLogs, salesData, wasteData, adjustments, recipeRows] = await Promise.all([
      sbGet(`production_log?cafe_product_id=in.(${idList})&select=cafe_product_id,quantity_produced`),
      sbGet(`daily_sales?cafe_product_id=in.(${idList})&select=cafe_product_id,units_sold`),
      sbGet(`waste_log?cafe_product_id=in.(${idList})&select=cafe_product_id,quantity`),
      sbGet(`stock_adjustments?cafe_product_id=in.(${idList})&select=*&order=adjustment_date.desc`),
      sbGet(`recipe_items?select=cafe_product_id,ingredient_id`)
    ]);
  } catch(e) { console.warn('Lager fetch error:', e); }

  // For auto_canteen_produce products: derive received quantities from kantine orders
  // Stock = Mottatt fra kantine − Solgt − Svinn + Justeringer
  const receivedMap = {};
  if (canteenProdIds.size > 0) {
    try {
      const kantineIngMap = {};
      (ST.ingredients || []).forEach(i => { if (i.canteen_product_id) kantineIngMap[i.canteen_product_id] = i.id; });
      (ST.kantineProducts || []).forEach(kp => {
        if (kantineIngMap[kp.id] != null) return;
        const match = (ST.ingredients || []).find(i => i.name.toLowerCase() === kp.name.toLowerCase());
        if (match) kantineIngMap[kp.id] = match.id;
      });
      const ingToCp = {};
      recipeRows.forEach(r => { if (canteenProdIds.has(r.cafe_product_id) && r.ingredient_id) ingToCp[r.ingredient_id] = r.cafe_product_id; });

      if (Object.keys(ingToCp).length > 0) {
        const kantineOrders = await sbGet('orders?status=in.(delivered,accepted)&select=id,items').catch(() => []);
        kantineOrders.forEach(order => {
          (Array.isArray(order.items) ? order.items : []).forEach(item => {
            const ingId = kantineIngMap[item.pid];
            if (!ingId) return;
            const cpId = ingToCp[ingId];
            if (!cpId) return;
            const qty = (item.splits && item.splits.length > 0)
              ? item.splits.reduce((s, sp) => s + (sp.qty || 0), 0)
              : (item.qty || 0);
            if (qty > 0) receivedMap[cpId] = (receivedMap[cpId] || 0) + qty;
          });
        });
      }
    } catch(e) { console.warn('Lager kantine fetch error:', e); }
  }

  // Build totals maps
  const prodMap = {}, salesMap = {}, wasteMap = {}, adjMap = {};
  prodLogs.forEach(r  => { prodMap[r.cafe_product_id]  = (prodMap[r.cafe_product_id]  || 0) + Number(r.quantity_produced || 0); });
  salesData.forEach(r => { salesMap[r.cafe_product_id] = (salesMap[r.cafe_product_id] || 0) + Number(r.units_sold        || 0); });
  wasteData.forEach(r => { wasteMap[r.cafe_product_id] = (wasteMap[r.cafe_product_id] || 0) + Number(r.quantity          || 0); });
  adjustments.forEach(r => { adjMap[r.cafe_product_id] = (adjMap[r.cafe_product_id]   || 0) + Number(r.quantity          || 0); });

  // "inn" = received from canteen (canteen products) or produced in-house (other products)
  const innMap = {};
  lagerProds.forEach(p => {
    innMap[p.id] = canteenProdIds.has(p.id) ? (receivedMap[p.id] || 0) : (prodMap[p.id] || 0);
  });

  // Calculate stock and alert counts
  let alertCount = 0;
  const stockByProd = {};
  lagerProds.forEach(p => {
    const inn    = innMap[p.id];
    const sold   = salesMap[p.id] || 0;
    const wasted = wasteMap[p.id] || 0;
    const adj    = adjMap[p.id]   || 0;
    const stock  = inn - sold - wasted + adj;
    stockByProd[p.id] = stock;
    if (p.min_stock != null && stock < Number(p.min_stock)) alertCount++;
  });

  const rows = lagerProds.map(p => {
    const isCanteen = canteenProdIds.has(p.id);
    const inn    = innMap[p.id];
    const sold   = salesMap[p.id] || 0;
    const wasted = wasteMap[p.id] || 0;
    const adj    = adjMap[p.id]   || 0;
    const stock  = stockByProd[p.id];
    const minStock = p.min_stock != null ? Number(p.min_stock) : null;

    let statusHtml = '<span style="color:#aaa;font-size:0.85rem">—</span>';
    let rowBg = '';
    if (minStock != null) {
      if (stock <= 0) {
        statusHtml = '<span style="background:#e53935;color:#fff;border-radius:4px;padding:2px 9px;font-size:0.8rem;font-weight:600">🔴 Tomt</span>';
        rowBg = 'background:#fff5f5;';
      } else if (stock < minStock) {
        statusHtml = '<span style="background:#e6a817;color:#fff;border-radius:4px;padding:2px 9px;font-size:0.8rem;font-weight:600">🟡 Lavt</span>';
        rowBg = 'background:#fffbef;';
      } else {
        statusHtml = '<span style="background:#43a047;color:#fff;border-radius:4px;padding:2px 9px;font-size:0.8rem;font-weight:600">🟢 OK</span>';
      }
    }

    const stockDisplay = stock <= 0
      ? `<strong style="color:#e53935;font-size:1.1rem">${stock}</strong>`
      : `<strong style="font-size:1.1rem">${stock}</strong>`;
    const adjDisplay = adj !== 0 ? `<span style="color:#888;font-size:0.8rem">(${adj > 0 ? '+' : ''}${adj} just.)</span>` : '';
    const icon = isCanteen ? '🚚' : '🏭';

    return `<tr style="border-bottom:1px solid var(--bg3);${rowBg}">
      <td style="padding:10px 8px;font-weight:500">${icon} ${esc(p.name)}</td>
      <td style="padding:10px 8px;text-align:center;color:#555">${inn}</td>
      <td style="padding:10px 8px;text-align:center;color:#555">${sold}</td>
      <td style="padding:10px 8px;text-align:center;color:#555">${wasted}</td>
      <td style="padding:10px 8px;text-align:center">${stockDisplay} ${adjDisplay}</td>
      <td style="padding:10px 8px;text-align:center;color:#555">${minStock != null ? minStock : '—'}</td>
      <td style="padding:10px 8px;text-align:center">${statusHtml}</td>
      <td style="padding:10px 8px;text-align:center">
        <button class="btn" style="font-size:0.8rem;padding:3px 10px"
          onclick="openStockCount(${p.id}, ${stock})">Tell opp</button>
      </td>
    </tr>`;
  });

  // Recent adjustments log
  const recentAdj = adjustments.slice(0, 8);
  const adjLogHtml = recentAdj.length > 0 ? `
    <div style="margin-top:28px">
      <h3 style="margin:0 0 10px;font-size:1rem;color:#555">Siste lagerjusteringer</h3>
      <table style="width:100%;border-collapse:collapse;font-size:0.88rem;max-width:640px">
        <thead>
          <tr style="background:var(--bg2);color:#666;font-size:0.78rem;text-transform:uppercase">
            <th style="padding:6px 8px;text-align:left">Dato</th>
            <th style="padding:6px 8px;text-align:left">Produkt</th>
            <th style="padding:6px 8px;text-align:center">Justering</th>
            <th style="padding:6px 8px;text-align:left">Notat</th>
          </tr>
        </thead>
        <tbody>
          ${recentAdj.map(a => {
            const prod = lagerProds.find(p => p.id === a.cafe_product_id);
            const qty  = Number(a.quantity);
            const col  = qty >= 0 ? '#43a047' : '#e53935';
            return `<tr style="border-bottom:1px solid var(--bg3)">
              <td style="padding:6px 8px">${a.adjustment_date}</td>
              <td style="padding:6px 8px">${prod ? esc(prod.name) : '?'}</td>
              <td style="padding:6px 8px;text-align:center;font-weight:600;color:${col}">${qty >= 0 ? '+' : ''}${qty}</td>
              <td style="padding:6px 8px;color:#888">${esc(a.note || '')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : '';

  const alertBanner = alertCount > 0 ? `
    <div style="background:#fff3cd;border:1px solid #e6a817;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:0.9rem">
      ⚠️ <strong>${alertCount} produkt${alertCount > 1 ? 'er' : ''}</strong> er under minimumsbeholdning — sjekk tabellen under.
    </div>` : '';

  const innColLabel = canteenProdIds.size > 0 ? 'Mottatt' : 'Produsert';

  return `
    <div style="padding:16px;max-width:960px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="margin:0;font-size:1.2rem">📦 Lagerstatus</h2>
        <span style="font-size:0.82rem;color:#999">Beregnet per ${today()}</span>
      </div>
      ${alertBanner}
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.9rem;min-width:600px">
          <thead>
            <tr style="background:var(--bg2);color:#666;font-size:0.78rem;text-transform:uppercase">
              <th style="padding:8px;text-align:left">Produkt</th>
              <th style="padding:8px;text-align:center">${innColLabel}</th>
              <th style="padding:8px;text-align:center">Solgt</th>
              <th style="padding:8px;text-align:center">Svinn</th>
              <th style="padding:8px;text-align:center">På lager</th>
              <th style="padding:8px;text-align:center">Min. lager</th>
              <th style="padding:8px;text-align:center">Status</th>
              <th style="padding:8px"></th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>
      ${adjLogHtml}
      <p style="margin-top:20px;font-size:0.82rem;color:#aaa">
        💡 🚚 = mottatt fra kantine · 🏭 = produsert internt · Bruk "Tell opp" for å korrigere ved fysisk opptelling.
        Min. lager settes i produktinnstillingene (Oppskrifter → Salgsprodukter → rediger produkt).
      </p>
    </div>
    ${await buildIngLager()}
    ${buildStockCountModal()}`;
}
async function buildIngLager() {
  const lagerIngs = ST.ingredients.filter(i => i.min_stock != null && i.canteen_product_id != null);
  if (lagerIngs.length === 0) return '';

  const ingIds    = lagerIngs.map(i => i.id);
  const ingIdList = ingIds.join(',');

  let purchaseItems = [], ingRecipeItems = [];
  try {
    [purchaseItems, ingRecipeItems] = await Promise.all([
      sbGet(`purchase_items?ingredient_id=in.(${ingIdList})&select=ingredient_id,quantity`),
      sbGet(`recipe_items?ingredient_id=in.(${ingIdList})&select=cafe_product_id,ingredient_id,quantity`)
    ]);
  } catch(e) { console.warn('Ingredient lager fetch error:', e); }

  const receivedIngMap = {};
  purchaseItems.forEach(r => { receivedIngMap[r.ingredient_id] = (receivedIngMap[r.ingredient_id] || 0) + Number(r.quantity || 0); });

  const usedIngMap = {};
  if (ingRecipeItems.length > 0) {
    const relatedCpIds = [...new Set(ingRecipeItems.map(r => r.cafe_product_id))];
    let prodLogs = [];
    try { prodLogs = await sbGet(`production_log?cafe_product_id=in.(${relatedCpIds.join(',')})&select=cafe_product_id,quantity_produced`); } catch(e) {}
    const prodMap = {};
    prodLogs.forEach(r => { prodMap[r.cafe_product_id] = (prodMap[r.cafe_product_id] || 0) + Number(r.quantity_produced || 0); });
    ingRecipeItems.forEach(r => {
      const used = (prodMap[r.cafe_product_id] || 0) * Number(r.quantity || 0);
      usedIngMap[r.ingredient_id] = (usedIngMap[r.ingredient_id] || 0) + used;
    });
  }

  let alertCount = 0;
  const rows = lagerIngs.map(i => {
    const unit     = i.recipe_unit || i.unit || 'stk';
    const received = Math.round((receivedIngMap[i.id] || 0) * 100) / 100;
    const used     = Math.round((usedIngMap[i.id]     || 0) * 100) / 100;
    const stock    = Math.round((received - used)      * 100) / 100;
    const minStock = Number(i.min_stock);

    let statusHtml, rowBg = '';
    if (stock <= 0) {
      statusHtml = '<span style="background:#e53935;color:#fff;border-radius:4px;padding:2px 9px;font-size:0.8rem;font-weight:600">🔴 Tomt</span>';
      rowBg = 'background:#fff5f5;'; alertCount++;
    } else if (stock < minStock) {
      statusHtml = '<span style="background:#e6a817;color:#fff;border-radius:4px;padding:2px 9px;font-size:0.8rem;font-weight:600">🟡 Lavt</span>';
      rowBg = 'background:#fffbef;'; alertCount++;
    } else {
      statusHtml = '<span style="background:#43a047;color:#fff;border-radius:4px;padding:2px 9px;font-size:0.8rem;font-weight:600">🟢 OK</span>';
    }

    const stockDisplay = stock <= 0
      ? `<strong style="color:#e53935;font-size:1.1rem">${stock}</strong>`
      : `<strong style="font-size:1.1rem">${stock}</strong>`;

    return `<tr style="border-bottom:1px solid var(--bg3);${rowBg}">
      <td style="padding:10px 8px;font-weight:500">🧂 ${esc(i.name)}</td>
      <td style="padding:10px 8px;text-align:center;color:#555">${received} ${esc(unit)}</td>
      <td style="padding:10px 8px;text-align:center;color:#555">${used} ${esc(unit)}</td>
      <td style="padding:10px 8px;text-align:center">${stockDisplay} ${esc(unit)}</td>
      <td style="padding:10px 8px;text-align:center;color:#555">${minStock} ${esc(unit)}</td>
      <td style="padding:10px 8px;text-align:center">${statusHtml}</td>
    </tr>`;
  });

  const alertBanner = alertCount > 0 ? `
    <div style="background:#fff3cd;border:1px solid #e6a817;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:0.9rem">
      ⚠️ <strong>${alertCount} ingrediens${alertCount > 1 ? 'er' : ''}</strong> er under minimumsbeholdning.
    </div>` : '';

  return `
    <div style="padding:0 16px 16px;max-width:960px;margin-top:32px">
      <h2 style="margin:0 0 12px;font-size:1.2rem">🧂 Ingredienser (kantine)</h2>
      ${alertBanner}
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.9rem;min-width:480px">
          <thead>
            <tr style="background:var(--bg2);color:#666;font-size:0.78rem;text-transform:uppercase">
              <th style="padding:8px;text-align:left">Ingrediens</th>
              <th style="padding:8px;text-align:center">Mottatt</th>
              <th style="padding:8px;text-align:center">Brukt</th>
              <th style="padding:8px;text-align:center">På lager</th>
              <th style="padding:8px;text-align:center">Min. lager</th>
              <th style="padding:8px;text-align:center">Status</th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>
      <p style="margin-top:12px;font-size:0.82rem;color:#aaa">
        💡 Mottatt = innkjøp registrert fra kantine · Brukt = beregnet fra produksjonslogg og oppskrift ·
        Min. lager settes i Oppskrifter → Ingredienser → rediger.
      </p>
    </div>`;
}

function openStockCount(productId, currentStock) {
  ST._stockCountModal = { productId, currentStock };
  renderTab();
}

function buildStockCountModal() {
  if (!ST._stockCountModal) return '';
  const { productId, currentStock } = ST._stockCountModal;
  const prod = ST.cafeProducts.find(p => p.id === productId);
  return `
  <div class="modal-bg" onclick="if(event.target===this){ST._stockCountModal=null;renderTab()}">
    <div class="modal">
      <h3>📦 Lagertelling — ${esc(prod?.name || '')}</h3>
      <p style="font-size:0.88rem;color:var(--text2);margin-bottom:1rem">
        Beregnet beholdning: <strong>${currentStock}</strong>.
        Tast inn faktisk antall etter opptelling.
      </p>
      <div class="form-row">
        <label for="sc-actual">Faktisk antall på lager</label>
        <input type="number" id="sc-actual" min="0" step="1" placeholder="0" style="width:140px" autofocus>
      </div>
      <div class="form-row">
        <label for="sc-note">Notat (valgfritt)</label>
        <input type="text" id="sc-note" placeholder="f.eks. Opptelling etter helg">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveStockCount(${productId}, ${currentStock})">💾 Lagre justering</button>
        <button class="btn" onclick="ST._stockCountModal=null;renderTab()">Avbryt</button>
      </div>
    </div>
  </div>`;
}

async function saveStockCount(productId, currentStock) {
  const actualStr = el('sc-actual')?.value?.trim();
  const actual    = parseFloat(actualStr);
  if (actualStr === '' || isNaN(actual) || actual < 0) {
    showAlert('Skriv inn et gyldig antall (0 eller mer)', 'error'); return;
  }
  const note  = el('sc-note')?.value?.trim() || 'Manuell opptelling';
  const delta = actual - currentStock;
  try {
    await sbPost('stock_adjustments', [{
      cafe_product_id: productId,
      adjustment_date: today(),
      quantity:        delta,
      note
    }]);
    ST._stockCountModal = null;
    showAlert(`Lagertelling lagret! (${delta >= 0 ? '+' : ''}${delta} justering)`);
    refreshLagerStatus();
    await renderTab();
  } catch(e) {
    showAlert('Feil: ' + e.message, 'error');
  }
}

async function refreshLagerStatus() {
  try {
    const lagerProds = ST.cafeProducts.filter(p => p.min_stock != null);
    if (lagerProds.length === 0) { ST._lagerLow = 0; renderNav(); return; }
    const idList = lagerProds.map(p => p.id).join(',');
    const [prodLogs, salesData, wasteData, adjustments] = await Promise.all([
      sbGet(`production_log?cafe_product_id=in.(${idList})&select=cafe_product_id,quantity_produced`),
      sbGet(`daily_sales?cafe_product_id=in.(${idList})&select=cafe_product_id,units_sold`),
      sbGet(`waste_log?cafe_product_id=in.(${idList})&select=cafe_product_id,quantity`),
      sbGet(`stock_adjustments?cafe_product_id=in.(${idList})&select=cafe_product_id,quantity`)
    ]);
    const prodMap = {}, salesMap = {}, wasteMap = {}, adjMap = {};
    prodLogs.forEach(r   => { prodMap[r.cafe_product_id]  = (prodMap[r.cafe_product_id]  || 0) + Number(r.quantity_produced || 0); });
    salesData.forEach(r  => { salesMap[r.cafe_product_id] = (salesMap[r.cafe_product_id] || 0) + Number(r.units_sold        || 0); });
    wasteData.forEach(r  => { wasteMap[r.cafe_product_id] = (wasteMap[r.cafe_product_id] || 0) + Number(r.quantity          || 0); });
    adjustments.forEach(r => { adjMap[r.cafe_product_id]  = (adjMap[r.cafe_product_id]   || 0) + Number(r.quantity          || 0); });
    let low = 0;
    lagerProds.forEach(p => {
      const stock = (prodMap[p.id]||0) - (salesMap[p.id]||0) - (wasteMap[p.id]||0) + (adjMap[p.id]||0);
      if (stock < Number(p.min_stock)) low++;
    });
    ST._lagerLow = low;
    renderNav();
  } catch(e) { ST._lagerLow = 0; }
}

// =============================================================
//  BIND TAB EVENTS
// =============================================================
function bindTabEvents() {
  // Scroll to rapport form when a calendar date is clicked
  if (ST._scrollToRapport) {
    ST._scrollToRapport = false;
    requestAnimationFrame(() => {
      const form = document.getElementById('daglig-rapport-form');
      if (form) form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }
}

// =============================================================
//  BOOTSTRAP
// =============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const savedRole = sessionStorage.getItem('smia_role');
  if (savedRole === 'admin' || savedRole === 'staff') {
    startApp(savedRole);
  }
});
</script>
