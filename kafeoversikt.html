function setSalgPending(name, val) {
  if (!ST._salgPending) ST._salgPending = {};
  ST._salgPending[name] = val || undefined;
  // Re-render just the preview without full tab reload
  const previewEl = document.querySelector('#tab-content .card > div[style*="margin-top:1rem"]');
  if (previewEl) previewEl.outerHTML = buildSalgPreview();
  else renderTab();
}

function setSalgPendingHusk(name, checked) {
  if (!ST._salgPendingHusk) ST._salgPendingHusk = {};
  ST._salgPendingHusk[name] = checked;
}

function handleFileDrop(event) {
  event.preventDefault();
  el('file-drop-zone').classList.remove('drag-over');
  const file = event.dataTransfer.files[0];
  if (file) handleSalgFile(file);
}

function handleSalgFile(file) {
  if (!file) return;

  // Auto-detect date from filename, e.g. "Salg per produkt_05032026-05032026.xlsx"
  const dateMatch = file.name.match(/_(\d{2})(\d{2})(\d{4})/);
  if (dateMatch) {
    const [, dd, mm, yyyy] = dateMatch;
    ST._salgDate         = `${yyyy}-${mm}-${dd}`;
    ST._salgDateFromFile = true;
  } else {
    ST._salgDateFromFile = false;
  }

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb    = XLSX.read(e.target.result, { type: 'array' });
      const ws    = wb.Sheets[wb.SheetNames[0]];
      const json  = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (json.length < 2) { showAlert('Filen har ingen data', 'error'); return; }

      const headers  = json[0].map(h => String(h||'').toLowerCase().trim());
      const nameIdx  = headers.findIndex(h => h.includes('produktnavn') || h.includes('product') || h.includes('navn'));
      const unitsIdx = headers.findIndex(h => h.includes('solgte enheter') || h.includes('antall') || h.includes('units') || h.includes('qty') || h.includes('solgt'));

      if (nameIdx === -1 || unitsIdx === -1) {
        showAlert('Fant ikke kolonnene "produktnavn" og "solgte enheter". Sjekk filformatet.', 'error');
        return;
      }

      ST._salgPending    = {};
      ST._salgPendingHusk = {};
      ST._salgPreviewData = json.slice(1)
        .filter(row => row[nameIdx])
        .map(row => {
          const name  = String(row[nameIdx]||'').trim();
          const units = parseInt(row[unitsIdx]) || 0;
          return { productName: name, unitsSold: units, autoMatch: matchPosName(name) };
        });

      renderTab();
    } catch(err) {
      showAlert('Feil ved lesing av fil: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

async function importSalg() {
  if (!ST._salgPreviewData?.length) return;
  const saleDate = el('salg-date')?.value || ST._salgDate || today();

  // Save new aliases first
  const aliasesToSave = [];
  for (const r of ST._salgPreviewData) {
    if (r.autoMatch) continue; // already matched, no alias needed
    const pending = ST._salgPending?.[r.productName];
    const husk    = ST._salgPendingHusk?.[r.productName];
    if (!pending) continue;
    if (husk) {
      // Check not already saved
      const exists = ST.aliases.find(a => a.pos_name.toLowerCase() === r.productName.toLowerCase());
      if (!exists) {
        aliasesToSave.push({
          pos_name: r.productName,
          cafe_product_id: pending === '__ignore__' ? null : parseInt(pending),
          action: pending === '__ignore__' ? 'ignore' : 'map'
        });
      }
    }
  }

  try {
    if (aliasesToSave.length > 0) {
      const saved = await sbPost('product_aliases', aliasesToSave);
      ST.aliases.push(...saved);
    }

    // Build rows to insert
    const rows = [];
    for (const r of ST._salgPreviewData) {
      const match   = r.autoMatch;
      const pending = ST._salgPending?.[r.productName];

      // Skip ignored items
      if (match?.via === 'ignore') continue;
      if (!match && pending === '__ignore__') continue;

      const cafeProdId = match?.product?.id || (pending && pending !== '__ignore__' ? parseInt(pending) : null);
      rows.push({ sale_date: saleDate, product_name: r.productName, units_sold: r.unitsSold, cafe_product_id: cafeProdId || null });
    }

    // Delete any existing rows for this date first to prevent duplicates
    await sbDelete(`daily_sales?sale_date=eq.${saleDate}`);
    await sbPost('daily_sales', rows);
    const newAliasCount = aliasesToSave.length;
    ST._salgPreviewData     = null;
    ST._salgPending         = {};
    ST._salgPendingHusk     = {};
    ST._posDatesMonthCache  = null; // refresh calendar POS dots after import
    ST._salgDateFromFile = false;
    showAlert(`${rows.length} salgslinjer importert${newAliasCount > 0 ? ` · ${newAliasCount} ny(e) mappinger lagret` : ''}!`);
    await renderTab();
  } catch(e) {
    showAlert('Feil ved import: ' + e.message, 'error');
  }
}

async function buildSalgHistorikk() {
  // Lightweight fetch — just dates and unit totals, no row limit
  let allSales = [];
  try { allSales = await sbGet('daily_sales?select=sale_date,units_sold,cafe_product_id&order=sale_date'); } catch(e) {}

  // Aggregate by date: { 'YYYY-MM-DD': { units, matched, unmatched } }
  const byDate = {};
  allSales.forEach(s => {
    if (!byDate[s.sale_date]) byDate[s.sale_date] = { units: 0, matched: 0, unmatched: 0 };
    byDate[s.sale_date].units += s.units_sold;
    if (s.cafe_product_id) byDate[s.sale_date].matched++;
    else byDate[s.sale_date].unmatched++;
  });

  // Calendar month
  const todayStr  = today();
  const curMonth  = ST._salgHistMonth || todayStr.slice(0, 7);
  const [cy, cm]  = curMonth.split('-').map(Number);
  const prevMonth = cm === 1  ? `${cy-1}-12`                           : `${cy}-${String(cm-1).padStart(2,'0')}`;
  const nextMonth = cm === 12 ? `${cy+1}-01`                           : `${cy}-${String(cm+1).padStart(2,'0')}`;
  const monthNames = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
  const monthLabel = `${monthNames[cm-1]} ${cy}`;

  const daysInMonth = new Date(cy, cm, 0).getDate();
  let startDow = new Date(cy, cm - 1, 1).getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1;    // Mon=0 … Sun=6

  // Build calendar cells
  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
  let rows = '', day = 1;
  for (let cell = 0; cell < totalCells; cell++) {
    if (cell % 7 === 0) rows += '<tr>';
    if (cell < startDow || day > daysInMonth) {
      rows += '<td style="padding:4px"></td>';
    } else {
      const ds       = `${cy}-${String(cm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const d        = byDate[ds];
      const hasData  = !!d;
      const isSel    = ST._salgHistDate === ds;
      const isToday  = ds === todayStr;
      const hasWarn  = hasData && d.unmatched > 0;
      const bg       = isSel   ? '#2e7d32'
                     : hasData ? (hasWarn ? '#fff3cd' : '#e8f5e9')
                     : 'transparent';
      const col      = isSel   ? 'white'
                     : hasData ? (hasWarn ? '#856404' : '#1b5e20')
                     : '#bbb';
      rows += `<td onclick="${hasData ? `ST._salgHistDate='${ds}';renderTab()` : ''}"
        style="text-align:center;padding:5px 2px;border-radius:7px;cursor:${hasData?'pointer':'default'};
               background:${bg};color:${col};font-weight:${hasData||isToday?'700':'400'};
               border:2px solid ${isToday&&!isSel?'#2e7d32':'transparent'};transition:opacity 0.1s"
        title="${hasData ? fmtDate(ds)+': '+d.units+' enheter'+(hasWarn?' — ⚠️ umatchede linjer':'') : ''}">
        <div style="font-size:0.9rem">${day}</div>
        ${hasData ? `<div style="font-size:0.62rem;margin-top:1px;opacity:0.85">${d.units}${hasWarn?'⚠':''}</div>` : '<div style="font-size:0.62rem">&nbsp;</div>'}
      </td>`;
      day++;
    }
    if (cell % 7 === 6) rows += '</tr>';
  }

  // Day detail panel
  let detailHtml = '';
  if (ST._salgHistDate) {
    const selDate = ST._salgHistDate;
    let dayRows = [];
    try { dayRows = await sbGet(`daily_sales?sale_date=eq.${selDate}&order=units_sold.desc`); } catch(e) {}

    const isEditing = ST._salgDateEdit === selDate;
    detailHtml = `
    <div class="card" style="margin-top:14px">
      <div class="card-header" style="flex-wrap:wrap;gap:8px">
        <span class="card-title">📅 ${fmtDate(selDate)}</span>
        <div class="spacer"></div>
        ${isEditing ? `
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${mkDatePicker('salg-newdate', selDate, "document.getElementById('salg-newdate-preview').textContent=fmtDate(this.value);", 'padding:4px 8px;font-size:0.88rem')}
            <strong id="salg-newdate-preview" style="font-size:0.88rem;min-width:80px">${fmtDate(selDate)}</strong>
            <button class="btn btn-sm btn-primary" onclick="confirmChangeSalgDate('${selDate}')">✓ Bekreft</button>
            <button class="btn btn-sm" onclick="ST._salgDateEdit=null;renderTab()">Avbryt</button>
          </div>
        ` : `
          <button class="btn btn-sm" onclick="ST._salgDateEdit='${selDate}';renderTab()">📅 Endre dato</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSalgDate('${selDate}')">🗑️ Slett</button>
        `}
      </div>
      ${dayRows.length === 0 ? '<div class="empty">Ingen data for denne datoen</div>' : `
      <table>
        <thead><tr>
          <th>Produkt</th>
          <th style="text-align:right">Enheter</th>
          <th>Status</th>
        </tr></thead>
        <tbody>
          ${dayRows.map(r => `<tr>
            <td>${esc(r.product_name)}</td>
            <td style="text-align:right;font-weight:600">${r.units_sold}</td>
            <td>${r.cafe_product_id
              ? '<span style="color:#3B6D11;font-size:0.8rem">✓ Matchet</span>'
              : '<span style="color:#A32D2D;font-size:0.8rem">⚠️ Umatchet</span>'}</td>
          </tr>`).join('')}
          <tr style="font-weight:700;border-top:2px solid var(--border)">
            <td>Totalt</td>
            <td style="text-align:right">${dayRows.reduce((s,r)=>s+r.units_sold,0)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>`}
    </div>`;
  }

  const totalDates = Object.keys(byDate).length;

  return `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Salgshistorikk</span>
      <div class="spacer"></div>
      <span style="font-size:0.82rem;color:var(--text2)">${totalDates} dager med data totalt</span>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button class="btn btn-sm" onclick="ST._salgHistMonth='${prevMonth}';renderTab()">◀</button>
      <span style="font-weight:700;font-size:1rem">${monthLabel}</span>
      <button class="btn btn-sm" onclick="ST._salgHistMonth='${nextMonth}';renderTab()">▶</button>
    </div>

    <table style="width:100%;border-collapse:separate;border-spacing:3px;margin-bottom:10px">
      <thead><tr>
        ${['Ma','Ti','On','To','Fr','Lø','Sø'].map(d =>
          `<th style="text-align:center;font-size:0.75rem;color:var(--text2);padding:2px;font-weight:600;width:14.28%">${d}</th>`
        ).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <div style="display:flex;gap:16px;font-size:0.76rem;color:var(--text2);margin-top:4px;flex-wrap:wrap">
      <span><span style="display:inline-block;width:10px;height:10px;background:#e8f5e9;border-radius:3px;margin-right:3px;vertical-align:middle"></span>Data lastet opp</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#fff3cd;border-radius:3px;margin-right:3px;vertical-align:middle"></span>Inneholder umatchede linjer</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#2e7d32;border-radius:3px;margin-right:3px;vertical-align:middle"></span>Valgt dato</span>
    </div>
  </div>
  ${detailHtml}`;
}

async function deleteSalgDate(date) {
  if (!confirm(`Slette alle salgslinjer for ${date}? Dette kan ikke angres.`)) return;
  try {
    await sbDelete(`daily_sales?sale_date=eq.${date}`);
    showAlert(`Salgsdata for ${date} slettet`);
    await renderTab();
  } catch(e) {
    showAlert('Feil: ' + e.message, 'error');
  }
}

async function confirmChangeSalgDate(oldDate) {
  const newDate = document.getElementById('salg-newdate')?.value;
  if (!newDate) { showAlert('Velg en ny dato', 'error'); return; }
  if (newDate === oldDate) { ST._salgDateEdit = null; renderTab(); return; }
  try {
    await sbPatch(`daily_sales?sale_date=eq.${oldDate}`, { sale_date: newDate });
    ST._salgDateEdit   = null;
    ST._salgHistDate   = newDate; // follow the date to its new position
    ST._salgHistMonth  = newDate.slice(0, 7); // jump calendar to the new month
    showAlert(`Dato endret til ${fmtDate(newDate)}`);
    await renderTab();
  } catch(e) {
    showAlert('Feil: ' + e.message, 'error');
  }
}

function ingNeedsInfo(i) {
  // Needs info if: no purchase price set, OR units differ but conversion is still at default (1)
  // Note: values other than exactly 1 (e.g. 0.655, 18, 4.5) mean the user deliberately set it
  const upp = parseFloat(i.units_per_purchase) || 1;
  const pu  = (i.purchase_unit || i.unit || '').toLowerCase();
  const ru  = (i.recipe_unit  || i.unit || '').toLowerCase();
  const hasPrice        = (parseFloat(i.purchase_price) > 0) || (parseFloat(i.cost_per_unit) > 0);
  const needsConversion = pu !== ru && Math.abs(upp - 1) < 0.0001;
  return !hasPrice || needsConversion;
}

function ingCatChanged() {
  const cat = document.getElementById('ing-cat')?.value;
  const kantineRow = document.getElementById('ing-kantine-row');
  if (kantineRow) kantineRow.style.display = cat === 'kantine' ? '' : 'none';
  const minStockRow = document.getElementById('ing-min-stock-row');
  if (minStockRow) minStockRow.style.display = cat === 'kantine' ? '' : 'none';
  if (cat !== 'kantine') {
    const kantineSelect = document.getElementById('ing-kantine-id');
    if (kantineSelect) kantineSelect.value = '';
  }
}

function ingKantineChanged() {
  const sel = document.getElementById('ing-kantine-id');
  if (!sel || !sel.value) return;
  const opt   = sel.options[sel.selectedIndex];
  const price = opt.dataset.price || '0';
  const unit  = opt.dataset.unit  || 'stk';
  const name  = opt.text.replace(/\s*\(.*\)\s*$/, '').trim(); // strip "(unit — price)" suffix
  const nameInput  = document.getElementById('ing-name');
  const priceInput = document.getElementById('ing-purchase-price');
  const puSelect   = document.getElementById('ing-purchase-unit');
  const ruSelect   = document.getElementById('ing-recipe-unit');
  if (nameInput) nameInput.value = name;
  if (priceInput) priceInput.value = String(price).replace('.',',');
  // Set recipe unit to match canteen product unit
  if (ruSelect) { for(let o of ruSelect.options) if(o.value===unit) o.selected=true; }
  // Default units_per_purchase to 1 for canteen items (price is already per unit)
  const uppInput = document.getElementById('ing-units-per-purchase');
  if (uppInput && (!uppInput.value || uppInput.value === '1')) uppInput.value = '1';
  ingUpdateCalc();
}

function ingUpdateCalc() {
  const pp  = parseFloat((document.getElementById('ing-purchase-price')?.value||'0').replace(',','.')) || 0;
  const upp = parseFloat((document.getElementById('ing-units-per-purchase')?.value||'1').replace(',','.')) || 1;
  const cpp = upp > 0 ? pp / upp : 0;
  const resultEl = document.getElementById('ing-calc-result');
  if (resultEl) resultEl.textContent = fmt(cpp);
  const ru = document.getElementById('ing-recipe-unit')?.value || 'stk';
  // Keep hidden purchase-unit in sync with recipe-unit
  const puHidden = document.getElementById('ing-purchase-unit');
  if (puHidden) puHidden.value = ru;
  // Update unit label in the cost result row
  const ruLabel = document.getElementById('ing-recipe-unit-label');
  if (ruLabel) ruLabel.textContent = ru;
}

function ingCalcConversion() {
  const pieces = parseFloat((document.getElementById('ing-helper-pieces')?.value||'').replace(',','.'));
  const weight = parseFloat((document.getElementById('ing-helper-weight')?.value||'').replace(',','.'));
  const resultEl = document.getElementById('ing-helper-result');
  if (!resultEl) return;
  if (pieces > 0 && weight > 0) {
    const conv = pieces / weight;
    const ru = document.getElementById('ing-recipe-unit')?.value || 'stk';
    const pu = document.getElementById('ing-purchase-unit')?.value || 'kg';
    resultEl.textContent = `= ${fmtN(conv)} ${ru} per ${pu}`;
    resultEl.style.color = 'var(--primary)';
  } else {
    resultEl.textContent = '';
  }
}

function ingApplyConversion() {
  const pieces = parseFloat((document.getElementById('ing-helper-pieces')?.value||'').replace(',','.'));
  const weight = parseFloat((document.getElementById('ing-helper-weight')?.value||'').replace(',','.'));
  if (!pieces || !weight || weight === 0) { return; }
  const conv = pieces / weight;
  const uppInput = document.getElementById('ing-units-per-purchase');
  if (uppInput) {
    uppInput.value = fmtN(conv);
    ingUpdateCalc();
  }
}

function fillIngFromPurchase(val) {
  if (!val) return;
  const [name, unit, price] = val.split('|');
  const nameEl  = document.getElementById('ing-name');
  const priceEl = document.getElementById('ing-purchase-price');
  const puSel   = document.getElementById('ing-purchase-unit');
  const ruSel   = document.getElementById('ing-recipe-unit');
  if (nameEl)  nameEl.value  = name;
  if (priceEl) priceEl.value = String(price).replace('.', ',');
  // Set purchase unit dropdown
  if (puSel) { for (let o of puSel.options) if (o.value === unit) { o.selected = true; break; } }
  // Default recipe unit to same as purchase unit
  if (ruSel) { for (let o of ruSel.options) if (o.value === unit) { o.selected = true; break; } }
  ingUpdateCalc();
}

async function saveIngredient(id) {
  const name         = el('ing-name')?.value?.trim();
  const cat          = el('ing-cat')?.value;
  const purchaseUnit = el('ing-purchase-unit')?.value || 'stk';
  const recipeUnit   = el('ing-recipe-unit')?.value   || 'stk';
  const purchasePrice   = parseFloat((el('ing-purchase-price')?.value||'0').replace(/\s/g,'').replace(',','.')) || 0;
  const unitsPerPurchase = parseFloat((el('ing-units-per-purchase')?.value||'1').replace(/\s/g,'').replace(',','.')) || 1;
  const costPerUnit  = unitsPerPurchase > 0 ? purchasePrice / unitsPerPurchase : 0;
  const kantineId    = el('ing-kantine-id')?.value ? parseInt(el('ing-kantine-id').value) : null;
  const minStockVal  = el('ing-min-stock')?.value?.trim();
  const min_stock    = minStockVal !== '' && minStockVal != null ? parseFloat(minStockVal) : null;

  const modalErr = document.getElementById('ing-modal-error');
  if (!name) { if(modalErr) modalErr.textContent = 'Navn er påkrevd'; return; }

  const payload = {
    name,
    unit: recipeUnit,
    category: cat,
    purchase_unit: purchaseUnit,
    recipe_unit: recipeUnit,
    purchase_price: purchasePrice,
    units_per_purchase: unitsPerPurchase,
    cost_per_unit: costPerUnit,
    canteen_product_id: kantineId,
    min_stock
  };

  try {
    if (id) {
      await sbPatch(`ingredients?id=eq.${id}`, payload);
      const idx = ST.ingredients.findIndex(i => i.id === id);
      if (idx >= 0) ST.ingredients[idx] = { ...ST.ingredients[idx], ...payload };
    } else {
      const [newIng] = await sbPost('ingredients', [payload]);
      ST.ingredients.push(newIng);
    }
    ST._ingModal = null;
    showAlert('Ingrediens lagret!');
    await renderTab();
  } catch(e) {
    if(modalErr) modalErr.textContent = 'Feil: ' + e.message;
  }
}

async function deleteIngredient(id) {
  if (!confirm('Slette ingrediens? Dette kan påvirke oppskrifter.')) return;
  try {
    await sbDelete(`ingredients?id=eq.${id}`);
    ST.ingredients = ST.ingredients.filter(i => i.id !== id);
    showAlert('Ingrediens slettet');
    await renderTab();
  } catch(e) {
    let errObj = null;
    try { errObj = JSON.parse(e.message); } catch(_) {}
    if (errObj && errObj.code === '23503') {
      // FK conflict — offer merge or force-delete
      const ing = ST.ingredients.find(i => i.id === id);
      const ingName = ing ? ing.name : '';
      const duplicate = ST.ingredients.find(i => i.id !== id && i.name.trim().toLowerCase() === ingName.trim().toLowerCase());

      if (duplicate) {
        const msg = `"${ingName}" er i bruk i innkjøpshistorikken.\n\nDet finnes allerede en annen ingrediens med samme navn.\n\nTrykk OK for å slå dem sammen (all historikk flyttes over til den eksisterende, og duplikatet slettes).\nTrykk Avbryt for å avbryte.`;
        if (confirm(msg)) {
          await mergeAndDeleteIngredient(id, duplicate.id);
        }
      } else {
        const msg = `"${ingName}" er i bruk i innkjøpshistorikken og kan ikke slettes direkte.\n\nTrykk OK for å tvinge sletting (innkjøpshistorikken mister koblingen til ingrediensen, men dataene beholdes).\nTrykk Avbryt for å avbryte.`;
        if (confirm(msg)) {
          await forceDeleteIngredient(id);
        }
      }
    } else {
      showAlert('Feil: ' + (errObj ? errObj.message : e.message), 'error');
    }
  }
}

async function mergeAndDeleteIngredient(deleteId, keepId) {
  try {
    // Reassign purchase_items references to the kept ingredient
    await sbPatch(`purchase_items?ingredient_id=eq.${deleteId}`, { ingredient_id: keepId });
    // Reassign recipe_items references (if any)
    try { await sbPatch(`recipe_items?ingredient_id=eq.${deleteId}`, { ingredient_id: keepId }); } catch(_) {}
    // Now safe to delete the duplicate
    await sbDelete(`ingredients?id=eq.${deleteId}`);
    ST.ingredients = ST.ingredients.filter(i => i.id !== deleteId);
    showAlert('Duplikat slettet — historikk overført til eksisterende ingrediens.');
    await renderTab();
  } catch(e2) {
    let msg = e2.message;
    try { msg = JSON.parse(e2.message).message; } catch(_) {}
    showAlert('Feil under sammenslåing: ' + msg, 'error');
  }
}

async function forceDeleteIngredient(id) {
  try {
    // Null out purchase_items references
    await sbPatch(`purchase_items?ingredient_id=eq.${id}`, { ingredient_id: null });
    // Delete recipe_items references
    try { await sbDelete(`recipe_items?ingredient_id=eq.${id}`); } catch(_) {}
    // Now safe to delete the ingredient
    await sbDelete(`ingredients?id=eq.${id}`);
    ST.ingredients = ST.ingredients.filter(i => i.id !== id);
    showAlert('Ingrediens slettet (innkjøpshistorikk ble frakoblet).');
    await renderTab();
  } catch(e2) {
    let msg = e2.message;
    try { msg = JSON.parse(e2.message).message; } catch(_) {}
    showAlert('Feil under tving-sletting: ' + msg, 'error');
  }
}

function showCatSugg(input) {
  const dropdown = document.getElementById('cp-cat-sugg');
  if (!dropdown) return;
  const q = (input.value || '').toLowerCase();
  // Deduplicate case-insensitively, keep original casing of first occurrence
  const seen = new Map();
  ST.cafeProducts.forEach(cp => {
    if (cp.category) {
      const key = cp.category.toLowerCase();
      if (!seen.has(key)) seen.set(key, cp.category);
    }
  });
  const matches = [...seen.values()]
    .filter(c => c.toLowerCase().includes(q))
    .sort();
  if (matches.length === 0) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = matches.map(c =>
    `<div style="padding:8px 12px;cursor:pointer;font-size:0.95rem"
       onmousedown="document.getElementById('cp-cat').value='${c.replace(/'/g,"\\'")}';document.getElementById('cp-cat-sugg').style.display='none'"
       onmouseover="this.style.background='var(--bg2)'"
       onmouseout="this.style.background=''">${esc(c)}</div>`
  ).join('');
  dropdown.style.display = 'block';
}

async function saveCafeProduct(id) {
  const name          = el('cp-name')?.value?.trim();
  const cat           = el('cp-cat')?.value?.trim() || null;
  const price         = parseFloat(el('cp-price')?.value) || 0;
  const made_to_order        = el('cp-mto')?.value === 'true';
  const auto_canteen_produce = el('cp-autokanteen')?.value === 'true';
  const available_for_external = el('cp-external')?.checked || false;
  const no_recipe_needed       = el('cp-norecipe')?.checked  || false;
  const minStockRaw = el('cp-minstock')?.value?.trim();
  const min_stock = minStockRaw !== '' ? parseFloat(minStockRaw) : null;
  if (!name) { showAlert('Navn er påkrevd', 'error'); return; }

  try {
    if (id) {
      await sbPatch(`cafe_products?id=eq.${id}`, { name, category: cat, selling_price: price, active: true, made_to_order, auto_canteen_produce, min_stock, available_for_external, no_recipe_needed });
      const idx = ST.cafeProducts.findIndex(p => p.id === id);
      if (idx >= 0) ST.cafeProducts[idx] = { ...ST.cafeProducts[idx], name, category: cat, selling_price: price, active: true, made_to_order, auto_canteen_produce, min_stock, available_for_external, no_recipe_needed };
    } else {

async function deleteCafeProduct(id) {
  const prod = ST.cafeProducts.find(p => p.id === id);
  const name = prod?.name || 'dette produktet';
  if (!confirm(`Slette "${name}"?\n\nOppskriften slettes også. Historiske salgs- og svinndata beholdes.`)) return;
  try {
    await sbDelete(`cafe_products?id=eq.${id}`);
    ST.cafeProducts = ST.cafeProducts.filter(p => p.id !== id);
    showAlert(`"${name}" er slettet`);
    await renderTab();
  } catch(e) {
    let isFK = false;
    try { isFK = JSON.parse(e.message)?.code === '23503'; } catch(_) {}
    if (isFK) {
      if (confirm(`"${name}" er koblet til registreringer i databasen (f.eks. oppskrifter, salg eller ordrelinjer).\n\nVil du tvinge sletting og fjerne ALL tilknyttet historikk?`)) {
        await forceDeleteCafeProduct(id, name);
      }
    } else {
      let msg = e.message;
      try { msg = JSON.parse(e.message)?.message || msg; } catch(_) {}
      showAlert(msg, 'error');
    }
  }
}

async function forceDeleteCafeProduct(id, name) {
  try {
    // Clear all references first, then delete the product
    await Promise.all([
      sbDelete(`daily_sales?cafe_product_id=eq.${id}`),
      sbDelete(`waste_log?cafe_product_id=eq.${id}`),
      sbDelete(`production_log?cafe_product_id=eq.${id}`),
      sbDelete(`recipe_items?cafe_product_id=eq.${id}`),
      sbDelete(`recipe_items?component_product_id=eq.${id}`),
      sbDelete(`private_order_items?cafe_product_id=eq.${id}`),
    ]);
    await sbDelete(`cafe_products?id=eq.${id}`);
    ST.cafeProducts = ST.cafeProducts.filter(p => p.id !== id);
    showAlert(`"${name}" er slettet`);
    await renderTab();
  } catch(e) {
    let msg = e.message;
    try { msg = JSON.parse(e.message)?.message || msg; } catch(_) {}
    showAlert('Kunne ikke slette: ' + msg, 'error');
  }
}

// Calculates the total recipe cost for a cafe_product using cached recipe data.
// Works synchronously from ST._recipeCostCache populated at page load.
// Avoids circular references by tracking visited product IDs.
function calcProductCost(productId, _visited = new Set()) {
  if (!productId || _visited.has(productId)) return 0;
  _visited.add(productId);
  const cache = ST._recipeCostCache || {};
  if (cache[productId] !== undefined) return cache[productId];
  // No cached value — return 0 (will be populated after oppskrift tab loads)
  return 0;
}

// Called when oppskrift editor loads to pre-compute all product costs
async function precomputeProductCosts() {
  ST._recipeCostCache = {};
  try {
    const allItems = await sbGet(`recipe_items?select=*,ingredients(*),cafe_products!component_product_id(id)`);
    // First pass: ingredient-only costs
    const byProduct = {};
    allItems.forEach(r => {
      const pid = r.cafe_product_id;
      if (!byProduct[pid]) byProduct[pid] = { ingCost: 0, compIds: [] };
      if (r.ingredient_id && !r.component_product_id) {
        byProduct[pid].ingCost += calcCostPerRecipeUnit(r.ingredients||{}) * r.quantity;
      }
      if (r.component_product_id) {
        byProduct[pid].compIds.push(r.component_product_id);
      }
    });
    // Resolve costs (simple single-level — no deep recursion needed for typical bundles)
    const resolve = (pid, depth = 0) => {
      if (depth > 5) return 0; // safety
      const d = byProduct[pid];
      if (!d) return 0;
      if (ST._recipeCostCache[pid] !== undefined) return ST._recipeCostCache[pid];
      const compCost = d.compIds.reduce((s, cid) => s + resolve(cid, depth + 1), 0);
      ST._recipeCostCache[pid] = d.ingCost + compCost;
      return ST._recipeCostCache[pid];
    };
    Object.keys(byProduct).forEach(pid => resolve(parseInt(pid)));
  } catch(e) {}
}

function stepBord(key, delta) {
  const current = parseFloat(ST._bordItemState[key]) || 0;
  const next = Math.max(0, current + delta);
  ST._bordItemState[key] = String(next);

}

async function finaliseBordOrder(requestId) {
  const rows = [];
  const products = ST.cafeProducts.filter(p => p.active && !p.made_to_order);

  // Standard menu items from stepper
  for (const p of products) {
    const qty = parseFloat(ST._bordItemState['p_' + p.id]) || 0;
    if (qty > 0) {
      const price = p.selling_price || 0;
      rows.push({ product_name: p.name, quantity: qty, unit_price: price, total_price: qty * price, cafe_product_id: p.id });
    }
  }
  // Custom extra items
  for (const item of (ST._bordCustomItems || [])) {
    if (item.name && item.qty > 0) {
      rows.push({ product_name: item.name, quantity: item.qty, unit_price: item.price || 0, total_price: (item.qty) * (item.price || 0), cafe_product_id: null });
    }
  }

  if (rows.length === 0) { showAlert('Legg til minst ett produkt', 'error'); return; }

  try {
    const [r] = await sbGet(`order_requests?id=eq.${requestId}`);

    // Create private order
    const [order] = await sbPost('private_orders', [{
      customer_name:  r.invoice_to || r.contact_name || 'Ukjent',
      invoice_to:     r.invoice_to || null,
      contact_name:   r.contact_name || null,
      email:          r.email || null,
      order_date:     r.delivery_date || today(),
      order_time:     r.delivery_time || null,
      delivery_date:  r.delivery_date || today(),
      delivery_type:  'bord',
      num_people:     r.num_people || null,
      note:           r.note || null,
      status:         'utkast'
    }]);

    // Insert order items
    const itemRows = rows.map(row => ({ ...row, order_id: order.id }));
    await sbPost('private_order_items', itemRows);

    // Mark request as fully confirmed
    await sbPatch(`order_requests?id=eq.${requestId}`, { status: 'confirmed' });
    ST._bordSeating   = null;
    ST._bordItemState = {};
    ST._bordCustomItems = [];

    await refreshBordBadge();
    showAlert('Ordre opprettet! Gå til Faktura-fanen for å sende.');

    // Jump straight to the new order in the Ordre tab (admin only)
    if (ST.role === 'admin') {
      ST._ordreEdit = order;
      ST._ordreFormState = null;
      ST._ordreRows = rows.map((row, idx) => ({ id: Date.now() + idx, ...row }));
      ST.tab = 'ordre';
      ST.subTab.ordre = 'ny';
    }
    renderTab();
  } catch(e) { showAlert('Feil: ' + e.message, 'error'); }
}

async function buildOrdre() {
  // Load distinct past locations for autocomplete (once per session)
  if (!ST._pastLocations) {
    try {
      const rows = await sbGet('private_orders?select=location&not.location.is.null&location=neq.&order=location');
      ST._pastLocations = [...new Set(rows.map(r => r.location).filter(Boolean))].sort((a,b) => a.localeCompare(b,'nb'));
    } catch(e) { ST._pastLocations = []; }
  }

  const subTab = ST.subTab.ordre || 'liste';
  const reqBadge = ST._pendingRequests > 0
    ? ` <span style="background:#e53935;color:white;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;vertical-align:middle;margin-left:3px">${ST._pendingRequests}</span>`
    : '';
  return `
  <div class="sub-nav">

async function buildOrdreListe() {
  let orders = [];
  try { orders = await sbGet('private_orders?select=*,private_order_items(*)&order=order_date.asc'); } catch(e) {}

  // Sort: upcoming (future, unsent) first by date desc, then past/sent by date desc
  const todayStr = today();
  const upcoming = orders.filter(o => o.order_date >= todayStr && o.status === 'utkast')
                         .sort((a,b) => b.order_date.localeCompare(a.order_date));
  const past     = orders.filter(o => !(o.order_date >= todayStr && o.status === 'utkast'))
                         .sort((a,b) => b.order_date.localeCompare(a.order_date));
  const sorted   = [...upcoming, ...past];

  return `
  <div class="card">
    <div class="card-header"><span class="card-title">Faktura grunnlag (${orders.length})</span></div>
    ${sorted.length === 0 ? '<div class="empty">Ingen ordre ennå</div>' : sorted.map(o => {
      const total     = (o.private_order_items||[]).reduce((s,i) => s + Number(i.total_price), 0);
      const isFuture  = o.order_date >= todayStr && o.status === 'utkast';
      const isSent    = o.status === 'sendt' || o.status === 'betalt';
      const rowStyle  = isFuture
        ? 'background:#EBF5FF;border-left:3px solid #4a90d9;padding:10px 12px 10px 9px;'
        : isSent ? 'background:#F6FBF0;border-left:3px solid #43a047;padding:10px 12px 10px 9px;' : 'padding:10px 12px;';
      const statusLabel = o.status==='utkast' ? 'Utkast' : o.status==='sendt' ? 'Sendt ✓' : 'Betalt ✓';
      const actionBtn = isSent
        ? `<button class="btn btn-sm" onclick="printOrdre(${o.id})">🖨️ Skriv ut igjen</button>`
        : `<button class="btn btn-sm btn-primary" onclick="sendAndPrintOrdre(${o.id})">🖨️ Send & skriv ut</button>`;
      return `<div style="display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;${rowStyle}">
        <div style="flex:1;min-width:180px">
          <div style="font-weight:600">${esc(o.customer_name)}</div>
          <div style="font-size:12px;color:var(--text2)">
            📅 ${fmtDate(o.order_date)}${o.order_time ? ' 🕐 ' + esc(o.order_time) : ''}
            ${o.location ? ' · 📍 ' + esc(o.location) : ''}
            ${o.num_people ? ' · 👥 ' + o.num_people + ' pers.' : ''}
          </div>
        </div>
        ${isFuture ? '<span class="badge" style="background:#d0eaff;color:#185FA5">📅 Kommende</span>' : ''}
        <span class="badge badge-${o.status}">${statusLabel}</span>
        <span style="font-weight:700">${fmt(total)}</span>
        <button class="btn btn-sm" onclick="editOrdre(${o.id})">✏️ Rediger</button>
        ${actionBtn}
        <button class="btn btn-sm" onclick="printStaffOrder(${o.id})" title="Personalark">📋 Personalark</button>
        <button class="btn btn-sm btn-danger" onclick="deleteOrdre(${o.id})">🗑️</button>
      </div>`;
    }).join('')}
  </div>`;
}

      : items.length > 0
        ? `<ul style="margin:6px 0 0 0;padding-left:18px;font-size:0.88rem;color:var(--text2)">${items.map(i=>`<li>${esc(i.name)}${i.qty>1?` × ${i.qty}`:''}</li>`).join('')}</ul>`
        : `<p style="font-size:0.88rem;color:#aaa;margin:4px 0 0">Ingen produkter valgt</p>`;
    const actionsHtml = `
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        ${showActions && isTable ? `
        <button class="btn btn-primary btn-sm" onclick="ST.tab='bord';renderTab()">🪑 Håndter i Bord-fanen</button>
        ` : showActions && !isTable ? `
        <button class="btn btn-primary btn-sm" onclick="confirmRequest(${r.id},'${esc(r.email||'')}','${esc(r.contact_name||r.invoice_to||'')}','${esc(r.invoice_to||'')}')">✅ Bekreft, opprett ordre & send e-post</button>
        <button class="btn btn-sm" style="border-color:#e53935;color:#e53935" onclick="dismissRequest(${r.id},'${esc(r.email||'')}','${esc(r.contact_name||r.invoice_to||'')}')">❌ Avslå & send e-post</button>
        ` : ''}
        <button class="btn btn-sm btn-danger" onclick="deleteRequest(${r.id})">🗑️ Slett</button>
      </div>`;
    return `
    <div style="background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">
        <div>
          <div style="font-weight:700;font-size:1rem">${esc(r.invoice_to||'—')}</div>
          ${r.contact_name?`<div style="font-size:0.85rem;color:var(--text2)">v/ ${esc(r.contact_name)}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${statusBadge(r.status)}
          <span style="font-size:0.78rem;color:#aaa">${fmtDate(r.created_at?.slice(0,10)||'')}</span>
        </div>
      </div>
      <div style="margin-top:8px;font-size:0.88rem;display:flex;flex-wrap:wrap;gap:16px">

        ${r.delivery_date?`<span>📅 ${fmtDate(r.delivery_date)}${r.delivery_time?' kl. '+esc(r.delivery_time):''}</span>`:''}

async function confirmRequest(id, email, name, invoiceTo) {
  try {
    await sbPatch(`order_requests?id=eq.${id}`, { status: 'confirmed' });
    ST._pendingRequests = Math.max(0, (ST._pendingRequests||1) - 1);
    renderNav();

    // Fetch full request
    const [r] = await sbGet(`order_requests?id=eq.${id}`);
    const items = Array.isArray(r?.items) ? r.items : JSON.parse(r?.items||'[]');

    // Pre-fill the order form so user can review and save
    ST._ordreEdit = null;
    ST._ordreFormState = {
      enhet:          r.invoice_to || '',
      contact:        r.contact_name || '',
      orgNr:          r.org_nr || '',
      invoiceAddress: r.invoice_address || '',
      invoiceRef:     r.invoice_ref || '',
      email:          r.email || '',
      deliveryType:   r.delivery_type || '',
      date:           r.delivery_date || today(),
      dateDisp:       fmtDate(r.delivery_date || today()),
      time:           r.delivery_time || '',
      location:       r.delivery_location || '',
      people:         String(r.num_people || ''),
      allergies:      r.allergies || '',
      note:           r.note || ''
    };
    ST._ordreRows = items.map((i, idx) => {
      const prod = ST.cafeProducts.find(p => p.name === i.name);
      return {
        id: Date.now() + idx,
        product_name: i.name,
        quantity: i.qty || 1,
        unit_price: prod?.selling_price || 0,
        total_price: (i.qty||1) * (prod?.selling_price||0)
      };
    });
    ST.subTab.ordre = 'ny';

    if (email) {
      let itemLines = '';
      let total = 0;
      items.forEach(i => {
        const prod = ST.cafeProducts.find(p => p.name === i.name);
        const lineTotal = (prod?.selling_price || 0) * (i.qty || 1);
        total += lineTotal;
        itemLines += `\n  - ${i.name} × ${i.qty}${prod?.selling_price ? '  (kr ' + fmtN(lineTotal) + ')' : ''}`;
      });

      const deliveryLine = r?.delivery_date
        ? `\nDato: ${fmtDate(r.delivery_date)}${r.delivery_time ? ' kl. ' + r.delivery_time : ''}`
        : '';
      const deliveryType = r?.delivery_type === 'serveres' ? 'Serveres i bygget' : r?.delivery_type === 'hentes' ? 'Hentes i kafeen' : '';
      const locationLine = r?.delivery_location ? `\nLeveringssted: ${r.delivery_location}` : '';
      const totalLine = total > 0 ? `\nTotalt: kr ${fmtN(total)} (inkl. MVA)` : '';
      const allergyLine = r?.allergies ? `\nAllergier/merknader: ${r.allergies}` : '';
      const noteLine = r?.note ? `\nNotat: ${r.note}` : '';

      const subject = encodeURIComponent('Bestillingsforespørsel bekreftet – SMIA Kafé');
      const body = encodeURIComponent(
        `Hei${name ? ' ' + name : ''},\n\n` +
        `Vi bekrefter bestillingsforespørselen fra ${invoiceTo || 'dere'}.\n\n` +
        `── BESTILLINGSDETALJER ──${itemLines}${totalLine}\n` +
        `${deliveryLine}${locationLine}${deliveryType ? '\nLeveringsmåte: ' + deliveryType : ''}` +
        `${allergyLine}${noteLine}\n\n` +
        `VIKTIG: AVBESTILLING MÅ SKJE SENEST 48 TIMER FØR LEVERINGSTIDSPUNKTET.\n\n` +
        `Merk: Prisene i denne bekreftelsen er veiledende og kan endres med forbehold til spesialkost og eventuelle tilpasninger.\n\n` +
        `Ta gjerne kontakt med oss dersom du har spørsmål.\n\n` +

async function convertRequestToOrder(requestId) {
  try {
    const [r] = await sbGet(`order_requests?id=eq.${requestId}`);
    if (!r) return;
    const items = Array.isArray(r.items) ? r.items : JSON.parse(r.items||'[]');
    ST._ordreEdit = null;
    ST._ordreFormState = {
      enhet:    r.invoice_to || '',
      contact:  r.contact_name || '',
      date:     today(),
      dateDisp: fmtDate(today()),
      time:     '',
      location: '',
      people:   String(r.num_people || ''),
      note:     r.note || ''
    };
    ST._ordreRows = items.map((i,idx) => {
      const prod = ST.cafeProducts.find(p => p.name === i.name);
      return {
        id: Date.now() + idx,
        product_name: i.name,
        quantity: i.qty || 1,
        unit_price: prod?.selling_price || 0,
        total_price: (i.qty||1) * (prod?.selling_price||0)
      };
    });
    ST.subTab.ordre = 'ny';
    renderTab();
  } catch(e) { showAlert('Feil: ' + e.message, 'error'); }
}

    invoiceAddress: el('ordre-invaddr')?.value     ?? '',
    invoiceRef:     el('ordre-invref')?.value      ?? '',
    email:          el('ordre-email')?.value       ?? '',
    deliveryType:   el('ordre-delivtype')?.value   ?? '',
    date:           el('ordre-date')?.value        || today(),
    dateDisp:       el('ordre-date-display')?.value || '',
    time:           el('ordre-time')?.value        ?? '',
    location:       el('ordre-location')?.value    ?? '',
    people:         el('ordre-people')?.value      ?? '',

function addOrdreRow() {
  saveOrdreFormState();
  if (!ST._ordreRows) ST._ordreRows = [];
  ST._ordreRows.push({ id: Date.now(), product_name: '', quantity: 1, unit_price: 0, total_price: 0 });
  renderTab();
}

function removeOrdreRow(id) {
  saveOrdreFormState();
  ST._ordreRows = (ST._ordreRows||[]).filter(r => r.id !== id);
  renderTab();
}

function updateOrdreRow(id, field, val) {
  const row = (ST._ordreRows||[]).find(r => r.id === id);
  if (row) row[field] = val;
}

function showOrdreProductSugg(rowId, input) {
  const dropdown = document.getElementById('or-sugg-' + rowId);
  if (!dropdown) return;
  const q = (input.value || '').toLowerCase();
  const matches = ST.cafeProducts
    .filter(p => !q || p.name.toLowerCase().includes(q))
    .sort((a,b) => a.name.localeCompare(b.name, 'nb'));
  if (matches.length === 0) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = matches.map(p =>
    `<div style="padding:7px 12px;cursor:pointer;font-size:0.92rem;display:flex;justify-content:space-between;align-items:center"
       onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''"
       onmousedown="(function(){
         const inp=document.getElementById('or-prod-${rowId}');
         if(inp){inp.value='${p.name.replace(/'/g,"\\'")}';inp.dispatchEvent(new Event('change'));}
         document.getElementById('or-sugg-${rowId}').style.display='none';
       })()">
      <span>${esc(p.name)}</span>
      <span style="font-size:0.78rem;color:var(--text2)">${fmt(p.selling_price)}</span>
    </div>`
  ).join('');
  dropdown.style.display = 'block';
}

function calcOrdreRow(id) {
  const row = (ST._ordreRows||[]).find(r => r.id === id);
  if (!row) return;
  const qty = parseFloat(String(row.quantity ?? row.qty ?? '').replace(',', '.')) || 0;
  const up  = parseFloat(String(row.unit_price ?? row.unitPrice ?? '').replace(',', '.')) || 0;
  row.total_price = qty * up;
  const tEl = el('or-total-' + id);
  if (tEl) tEl.textContent = fmt(row.total_price);
  // Update grand total
  const grandTotal = (ST._ordreRows||[]).reduce((s,r) => s + (r.total_price||0), 0);
  const gtEl = el('ordre-grand-total');
  if (gtEl) gtEl.textContent = fmt(grandTotal);
}

function autofillPrice(id, productName) {
  const p = ST.cafeProducts.find(p => p.name.toLowerCase() === productName.toLowerCase());
  if (!p) return;
  const row = (ST._ordreRows||[]).find(r => r.id === id);
  if (row) { row.unit_price = p.selling_price; calcOrdreRow(id); }

  // Auto-append kaffekanne note if not already present
  if (productName.toLowerCase().includes('kanne')) {
    const kanneNote = '* Inkludert vann, varmt vann og te';
    const noteEl = el('ordre-note');
    if (noteEl && !noteEl.value.includes(kanneNote)) {
      noteEl.value = noteEl.value.trim() ? noteEl.value.trim() + '\n' + kanneNote : kanneNote;
      if (ST._ordreFormState) ST._ordreFormState.note = noteEl.value;
    }
  }
  // update the input
  const rowEl = el('or-' + id);
  if (rowEl) {
    const inputs = rowEl.querySelectorAll('input[type="number"]');
    if (inputs[1]) inputs[1].value = p.selling_price;
  }
}

async function saveOrdre(id) {
  const enhet          = el('ordre-enhet')?.value?.trim()    || '';
  const contact        = el('ordre-contact')?.value?.trim()  || '';
  const customer       = enhet + (contact ? ' v/ ' + contact : '');
  const org_nr         = el('ordre-orgnr')?.value?.trim()    || null;
  const invoice_address = el('ordre-invaddr')?.value?.trim() || null;
  const invoice_ref    = el('ordre-invref')?.value?.trim()   || null;
  const email          = el('ordre-email')?.value?.trim()    || null;
  const delivery_type  = el('ordre-delivtype')?.value        || null;
  const date           = el('ordre-date')?.value             || today();
  const order_time     = el('ordre-time')?.value?.trim()     || null;
  const location       = el('ordre-location')?.value?.trim() || null;
  const num_people     = parseInt(el('ordre-people')?.value) || null;
  const allergies      = el('ordre-allergies')?.value?.trim() || null;
  const note           = el('ordre-note')?.value?.trim()     || null;

  const rows = (ST._ordreRows||[]).map(r => ({
    product_name: r.product_name || '',
    quantity: parseFloat(r.quantity)||0,
    unit_price: parseFloat(r.unit_price)||0,
    total_price: (parseFloat(r.quantity)||0)*(parseFloat(r.unit_price)||0),
    cafe_product_id: ST.cafeProducts.find(p=>p.name.toLowerCase()===(r.product_name||'').toLowerCase())?.id || null
  })).filter(r => r.product_name && r.quantity > 0);

  if (rows.length === 0) { showAlert('Legg til minst én produktlinje', 'error'); return; }

  const payload = {
    customer_name: customer || '(ikke angitt)',
    invoice_to:    enhet    || null,
    contact_name:  contact  || null,
    org_nr, invoice_address, invoice_ref, email, delivery_type,
    order_date: date, order_time, location, num_people, allergies, note
  };

  try {
    if (id) {
      await sbPatch(`private_orders?id=eq.${id}`, payload);
      await sbDelete(`private_order_items?order_id=eq.${id}`);
      await sbPost('private_order_items', rows.map(r => ({ ...r, order_id: id })));
    } else {
      const [order] = await sbPost('private_orders', [payload]);
      await sbPost('private_order_items', rows.map(r => ({ ...r, order_id: order.id })));
    }
    ST._ordreEdit = null;
    ST._ordreRows = null;
    ST._ordreFormState = null;
    ST.subTab.ordre = 'liste';
    showAlert('Ordre lagret!');
    await renderTab();
  } catch(e) {
    showAlert('Feil: ' + e.message, 'error');
  }
}

function getMvaRate(timeStr) {
  // Returns 0.25 during opening hours (08:30-14:30), 0.15 outside
  if (!timeStr) return 0.25;
  const [h, m] = timeStr.split(':').map(Number);
  const mins = h * 60 + m;
  return (mins >= 8 * 60 + 30 && mins <= 14 * 60 + 30) ? 0.25 : 0.15;
}

      ${delivLabel            ? `<strong>Leveringsmåte:</strong> ${delivLabel}<br>` : ''}
