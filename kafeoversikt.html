<!DOCTYPE html>
<!--
=============================================================
  SMIA CAFÉ OVERSIKT — SQL SETUP (run in Supabase SQL editor)
=============================================================

-- ingredients: master list of all purchasable items
create table ingredients (
  id bigint primary key generated always as identity,
  name text not null,
  unit text not null,
  category text not null, -- 'supermarked', 'kantine', 'ekstern'
  cost_per_unit numeric default 0,
  created_at timestamptz default now()
);

-- cafe_products: the products Smia sells to customers
create table cafe_products (
  id bigint primary key generated always as identity,
  name text not null,
  category text,
  selling_price numeric default 0,
  active boolean default true,
  created_at timestamptz default now()
);

-- recipe_items: links cafe_products to ingredients
create table recipe_items (
  id bigint primary key generated always as identity,
  cafe_product_id bigint references cafe_products(id) on delete cascade,
  ingredient_id bigint references ingredients(id) on delete cascade,
  quantity numeric not null
);

-- daily_sales: imported from POS Excel
create table daily_sales (
  id bigint primary key generated always as identity,
  sale_date date not null,
  product_name text not null,
  units_sold integer not null,
  cafe_product_id bigint references cafe_products(id),
  created_at timestamptz default now()
);

-- waste_log: end-of-day waste entries
create table waste_log (
  id bigint primary key generated always as identity,
  log_date date not null,
  cafe_product_id bigint references cafe_products(id),
  product_name text not null,
  quantity numeric not null,
  waste_type text not null check (waste_type in ('kassert', '2good2go')),
  created_at timestamptz default now()
);

-- purchase_receipts: header record for each receipt
create table purchase_receipts (
  id bigint primary key generated always as identity,
  receipt_date date not null,
  supplier_type text not null check (supplier_type in ('supermarked', 'kantine', 'ekstern')),
  supplier_name text,
  total_amount numeric default 0,
  source text default 'manual',
  bestillinger_order_id bigint,
  created_at timestamptz default now()
);

-- purchase_items: line items on each receipt
create table purchase_items (
  id bigint primary key generated always as identity,
  receipt_id bigint references purchase_receipts(id) on delete cascade,
  ingredient_id bigint references ingredients(id),
  item_name text not null,
  quantity numeric not null,
  unit text not null,
  unit_price numeric not null,
  total_price numeric not null
);

-- private_orders: proforma orders for private customers
create table private_orders (
  id bigint primary key generated always as identity,
  customer_name text not null,
  invoice_to text,
  contact_name text,
  org_nr text,
  invoice_address text,
  invoice_ref text,
  email text,
  delivery_type text,
  order_date date not null,
  delivery_date date,
  allergies text,
  note text,
  status text default 'utkast' check (status in ('utkast', 'sendt', 'betalt')),
  created_at timestamptz default now()
);
-- Run these if the table already exists:
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS invoice_to text;
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS contact_name text;
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS org_nr text;
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS invoice_address text;
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS invoice_ref text;
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS email text;
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS delivery_type text;
-- ALTER TABLE private_orders ADD COLUMN IF NOT EXISTS allergies text;

-- private_order_items: line items on private orders
create table private_order_items (
  id bigint primary key generated always as identity,
  order_id bigint references private_orders(id) on delete cascade,
  cafe_product_id bigint references cafe_products(id),
  product_name text not null,
  quantity numeric not null,
  unit_price numeric not null,
  total_price numeric not null
);

-- RLS: enable public access
alter table ingredients enable row level security;
alter table cafe_products enable row level security;
alter table recipe_items enable row level security;
alter table daily_sales enable row level security;
alter table waste_log enable row level security;
alter table purchase_receipts enable row level security;
alter table purchase_items enable row level security;
alter table private_orders enable row level security;
alter table private_order_items enable row level security;

create policy "Public access" on ingredients for all using (true) with check (true);
create policy "Public access" on cafe_products for all using (true) with check (true);
create policy "Public access" on recipe_items for all using (true) with check (true);
create policy "Public access" on daily_sales for all using (true) with check (true);
create policy "Public access" on waste_log for all using (true) with check (true);
create policy "Public access" on purchase_receipts for all using (true) with check (true);
create policy "Public access" on purchase_items for all using (true) with check (true);
create policy "Public access" on private_orders for all using (true) with check (true);
create policy "Public access" on private_order_items for all using (true) with check (true);

=============================================================
-->

<script>
// =============================================================
//  CONFIG
// =============================================================
const SUPABASE_URL  = 'https://kvtugiflpxehytpplkqw.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2dHVnaWZscHhlaHl0cHBsa3F3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjUxMDEsImV4cCI6MjA5MTMwMTEwMX0.7eoiM80p8CSJdwTCcFFUHAjx5LD5R_yQ0p3Ckfm6zPs';

// Pre-computed SHA-256 hashes (lowercase hex)
const HASH_STAFF = 'c8c0b68b66895b8ff901f6eef02a6ab128a60fa5111041f5ad4c566797c152d4';
const HASH_ADMIN = '032db610b100d8352675f993735234479b396363fbc0f64eaa39d14dea08675d';

// =============================================================

const ST = {

// =============================================================
//  AUTH
// =============================================================
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  const h = await sha256hex(pw);
  const err = document.getElementById('login-error');
  if (h === HASH_ADMIN) {
    sessionStorage.setItem('smia_role', 'admin');
    startApp('admin');
  } else if (h === HASH_STAFF) {
    sessionStorage.setItem('smia_role', 'staff');
    startApp('staff');
  } else {
    err.style.display = '';
    err.textContent = 'Feil passord. Prøv igjen.';
    document.getElementById('pw-input').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('smia_role');
  location.reload();
}

// =============================================================
//  SUPABASE API
// =============================================================
async function sbFetch(path, options = {}) {
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': options.prefer || 'return=representation',
    ...(options.headers || {})
  };
  const res = await fetch(url, { method: options.method || 'GET', headers, body: options.body ? JSON.stringify(options.body) : undefined });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt || res.statusText);
  }
  if (res.status === 204) return [];
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('json')) return res.json();
  return [];
}

const sbGet    = (path) => sbFetch(path);
const sbPost   = (table, body) => sbFetch(table, { method: 'POST', body });
const sbPatch  = (path, body) => sbFetch(path, { method: 'PATCH', body });
const sbDelete = (path) => sbFetch(path, { method: 'DELETE', prefer: 'return=minimal' });

// =============================================================
//  UTILS
// =============================================================
const fmt = n => 'kr\u00a0' + Number(n||0).toLocaleString('nb-NO', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtN = n => Number(n||0).toLocaleString('nb-NO', {minimumFractionDigits:0, maximumFractionDigits:2});
const fmtDate    = s => s ? s.slice(0,10).split('-').reverse().join('.') : '';
const parseNbDate = s => {
  if (!s) return today();
  const p = s.trim().split('.');
  if (p.length === 3 && p[2].length === 4) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return s.slice(0,10); // already YYYY-MM-DD
};
const today = () => new Date().toISOString().slice(0,10);

// Renders a dd.mm.yyyy text display + hidden type=date picker (cross-browser safe)
// id: the hidden input id; isoVal: yyyy-mm-dd; onchangeCode: JS string run after change
function mkDatePicker(id, isoVal, onchangeCode, extraStyle = '') {
  const dispId = id + '-display';
  return `<span style="position:relative;display:inline-flex;align-items:center">
    <input type="text" id="${dispId}" value="${esc(fmtDate(isoVal))}" placeholder="DD.MM.ÅÅÅÅ"
      style="width:130px;cursor:pointer;${extraStyle}" readonly
      onclick="document.getElementById('${id}').showPicker()">
    <input type="date" id="${id}" value="${esc(isoVal||'')}"
      style="position:absolute;opacity:0;width:0;height:0;pointer-events:none"
      onchange="document.getElementById('${dispId}').value=fmtDate(this.value);${onchangeCode}">
  </span>`;
}
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ndays = n => { const d = new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };

function showAlert(msg, type = 'success') {
  const el = document.getElementById('alert-area');
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${esc(msg)}</div>`;
  // Errors stay longer so they don't vanish before the user reads them
  setTimeout(() => { if(el) el.innerHTML = ''; }, type === 'error' ? 10000 : 4000);
}

function el(id) { return document.getElementById(id); }

async function startApp(role) {
  ST.role = role;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('role-badge').textContent = role === 'admin' ? 'Admin' : 'Ansatt';

  // Load core data
  try {
    ST.cafeProducts    = await sbGet('cafe_products?select=*&order=name');
    ST.ingredients     = await sbGet('ingredients?select=*&order=name');
    ST.kantineProducts = await sbGet('products?select=*&order=name');
    ST.aliases         = await sbGet('product_aliases?select=*&order=pos_name');
  } catch(e) {
    console.warn('Could not load core data:', e.message);
    ST.cafeProducts    = [];
    ST.ingredients     = [];
    ST.kantineProducts = [];
  }

  const tabs = getTabs(role);
  ST.tab = tabs[0].id;
  renderNav();
  await renderTab();
  // Load kantine badge count, lager status, pending requests and bord badge in background
  refreshKantineUnsynced();
  refreshLagerStatus();
  refreshPendingRequests();
  refreshBordBadge();
  refreshFakturaBadge();
}

function getTabs(role) {
  if (role === 'admin') {
    return [
      { id: 'innkjop',   label: '🛒 Innkjøp' },
      { id: 'avfall',    label: '📋 Daglig' },
      { id: 'salg',      label: '📊 Salg' },
      { id: 'oppskrift', label: '📋 Oppskrifter' },
      { id: 'ordre',     label: '📄 Faktura' },
      { id: 'bord',      label: '🪑 Bord' },
      { id: 'innsikt',   label: '💡 Innsikt' },
      { id: 'lager',     label: '📦 Lager' },
    ];
  }
  return [
    { id: 'innkjop', label: '🛒 Innkjøp' },
    { id: 'avfall',  label: '📋 Daglig' },
    { id: 'bord',    label: '🪑 Bord' },
    { id: 'lager',   label: '📦 Lager' },
  ];
}

function renderNav() {
  const tabs = getTabs(ST.role);
  el('main-nav').innerHTML = tabs.map(t => {
    let label = t.label;
    if (t.id === 'innkjop' && ST._kantineUnsynced > 0) {
      label += ` <span style="background:#e6a817;color:white;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;vertical-align:middle;margin-left:2px">${ST._kantineUnsynced}</span>`;
    }
    if (t.id === 'lager' && ST._lagerLow > 0) {
      label += ` <span style="background:#e53935;color:white;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;vertical-align:middle;margin-left:2px">${ST._lagerLow}</span>`;
    }
    if (t.id === 'ordre' && ST._pendingRequests > 0) {
      label += ` <span style="background:#e53935;color:white;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;vertical-align:middle;margin-left:2px">${ST._pendingRequests}</span>`;
    }
    if (t.id === 'bord' && ST._bordBadge > 0) {
      label += ` <span style="background:#e53935;color:white;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;vertical-align:middle;margin-left:2px">${ST._bordBadge}</span>`;
    }
    if (t.id === 'ordre' && ST._fakturaBadge > 0) {
      label += ` <span style="background:#1565c0;color:white;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;vertical-align:middle;margin-left:2px;white-space:nowrap" title="Fakturaer klare til å sendes">${ST._fakturaBadge}</span>`;
    }
    return `<button class="${ST.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${label}</button>`;
  }).join('');
}

async function refreshKantineUnsynced() {
  try {
    const [delivered, synced] = await Promise.all([
      sbGet('orders?status=eq.delivered&select=id'),
      sbGet('purchase_receipts?source=eq.bestillinger_sync&select=bestillinger_order_id')
    ]);
    const syncedIds = new Set(synced.map(r => r.bestillinger_order_id));
    ST._kantineUnsynced = delivered.filter(o => !syncedIds.has(o.id)).length;
    renderNav();
  } catch(e) {}
}

async function switchTab(id) {
  ST.tab = id;
  renderNav();
  await renderTab();
}

async function renderTab() {
  const c = el('tab-content');
  c.innerHTML = '<div class="empty">Laster...</div>';
  try {
    switch(ST.tab) {
      case 'avfall':   c.innerHTML = await buildAvfall(); break;
      case 'innkjop':  c.innerHTML = await buildInnkjop(); break;
      case 'salg':     c.innerHTML = await buildSalg(); break;
      case 'oppskrift':c.innerHTML = await buildOppskrift(); break;
      case 'ordre':    c.innerHTML = await buildOrdre(); break;
      case 'bord':     c.innerHTML = await buildBord(); break;
      case 'innsikt':  c.innerHTML = await buildInnsikt(); break;
      case 'lager':    c.innerHTML = await buildLager(); break;
      default:         c.innerHTML = '<div class="empty">Ukjent fane</div>';
    }
    bindTabEvents();
    if (ST.tab === 'innsikt') initCharts();
  } catch(e) {
    c.innerHTML = `<div class="alert alert-error">Feil: ${esc(e.message)}</div>`;
    console.error(e);
  }
}

// =============================================================
//  TAB: DAGLIG RAPPORT (produksjon + avfall + avstemming)
// =============================================================
ST._wasteState = {};

function updateWasteState(key, val) {
  ST._wasteState[key] = val;
}

function stepWaste(key, delta) {
  const current = parseFloat(ST._wasteState[key]) || 0;
  const next = Math.max(0, Math.round((current + delta) * 10) / 10);
  ST._wasteState[key] = String(next);
  const inp = document.getElementById('wi-' + key);
  if (inp) { inp.value = next; updateAvstemming(); }
}

function stepper(key, color, borderCol, bgCol, step = 1) {
  const val = ST._wasteState[key] || '0';
  return `<div style="display:flex;align-items:center;gap:2px;justify-content:center">
    <button onmousedown="stepWaste('${key}',-${step})" style="width:26px;height:26px;border:1px solid ${borderCol};background:${bgCol};border-radius:5px;font-size:15px;cursor:pointer;line-height:1;flex-shrink:0">−</button>
    <input type="number" min="0" step="${step}" value="${esc(String(val))}"
      id="wi-${key}" style="text-align:center;border-color:${borderCol};width:${step<1?46:38}px;padding:3px 2px;font-size:0.9rem"
      onchange="updateWasteState('${key}',this.value);updateAvstemming()">
    <button onmousedown="stepWaste('${key}',${step})" style="width:26px;height:26px;border:1px solid ${borderCol};background:${bgCol};border-radius:5px;font-size:15px;cursor:pointer;line-height:1;flex-shrink:0">+</button>
  </div>`;
}

function updateAvstemming() {
  const products = ST.cafeProducts.filter(p => p.active);
  products.forEach(p => {
    const prod  = parseFloat(ST._wasteState['wp_' + p.id]) || 0;
    const sold  = parseFloat(ST._todaySales?.[p.id] || ST._todaySales?.[p.name] || 0);
    const svinn = parseFloat(ST._wasteState['wk_' + p.id]) || 0;
    const g2g   = parseFloat(ST._wasteState['wg_' + p.id]) || 0;
    const mat   = parseFloat(ST._wasteState['wm_' + p.id]) || 0;
    const uforklart = prod - sold - svinn - g2g - mat;
    const el = document.getElementById('avst-' + p.id);
    if (!el) return;
    if (prod === 0 && sold === 0 && svinn === 0 && g2g === 0 && mat === 0) {
      el.textContent = '—';
      el.style.color = 'var(--text2)';
    } else {
      el.textContent = uforklart === 0 ? '✓ 0' : (uforklart > 0 ? '+' : '') + fmtN(uforklart);
      el.style.color = uforklart === 0 ? '#3B6D11' : uforklart > 0 ? '#856404' : '#A32D2D';
      el.style.fontWeight = uforklart !== 0 ? '700' : '600';
    }
  });
}

async function buildAvfall() {
  const logDate = ST._wasteState['_date'] || today();

  // ── 1. Fetch saved-dates + POS-dates for calendar (cached) ──────────────
  let savedDates = [], posDates = [];
  if (ST._savedDatesCache != null) {
    savedDates = ST._savedDatesCache;
  } else {
    try {
      const [wD, pD] = await Promise.all([
        sbGet('waste_log?select=log_date&order=log_date.desc&limit=1000'),
        sbGet('production_log?select=log_date&order=log_date.desc&limit=1000')
      ]);
      const dateSet = new Set([...wD.map(r => r.log_date), ...pD.map(r => r.log_date)]);
      savedDates = [...dateSet].sort().reverse();
      ST._savedDatesCache = savedDates;
    } catch(e) { ST._savedDatesCache = null; }
  }
  // Compute calMonth here so POS fetch can be scoped to just this month
  const calMonth = ST._wasteHistMonth || logDate.slice(0,7);
  const [cy, cm] = calMonth.split('-').map(Number);

  if (ST._posDatesMonthCache?.[calMonth] != null) {
    posDates = ST._posDatesMonthCache[calMonth];
  } else {
    try {
      const mStart = `${calMonth}-01`;
      const mLastDay = new Date(cy, cm, 0).getDate();
      const mEnd = `${calMonth}-${String(mLastDay).padStart(2,'0')}`;
      const psD = await sbGet(`daily_sales?select=sale_date&sale_date=gte.${mStart}&sale_date=lte.${mEnd}&order=sale_date`);
      const psSet = new Set(psD.map(r => r.sale_date));
      posDates = [...psSet];
      if (!ST._posDatesMonthCache) ST._posDatesMonthCache = {};
      ST._posDatesMonthCache[calMonth] = posDates;
    } catch(e) {}
  }

  // ── 2. Build calendar ────────────────────────────────────────────────────
  const savedDateSet = new Set(savedDates);
  const allPosSet    = new Set(posDates);
  const posDateSet   = new Set(posDates.filter(d => !savedDateSet.has(d)));
  const prevCM = cm === 1  ? `${cy-1}-12`                         : `${cy}-${String(cm-1).padStart(2,'0')}`;
  const nextCM = cm === 12 ? `${cy+1}-01`                         : `${cy}-${String(cm+1).padStart(2,'0')}`;
  const mNames = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
  const daysInCM = new Date(cy, cm, 0).getDate();
  let startDow = new Date(cy, cm-1, 1).getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const totalCells = Math.ceil((startDow + daysInCM) / 7) * 7;
  let calRows = ''; let calDay = 1;
  for (let cell = 0; cell < totalCells; cell++) {
    if (cell % 7 === 0) calRows += '<tr>';
    if (cell < startDow || calDay > daysInCM) {
      calRows += '<td style="padding:4px"></td>';
    } else {
      const ds = `${cy}-${String(cm).padStart(2,'0')}-${String(calDay).padStart(2,'0')}`;
      const hasData    = savedDateSet.has(ds);
      const isPOS      = !hasData && posDateSet.has(ds);
      const missingPOS = hasData && !allPosSet.has(ds);
      const isSel   = logDate === ds;
      const isToday = ds === today();
      // Background always reflects data status — selection/today shown via border ring only
      const bg  = hasData ? '#e8f5e9' : isPOS ? '#ede7f6' : 'transparent';
      const col = hasData ? '#1b5e20' : isPOS ? '#6a1b9a' : isToday ? '#1565c0' : '#bbb';
      const border = isSel ? '3px solid #2e7d32'        // selected → green ring
                   : isToday ? '3px solid #1565c0'       // today    → blue ring
                   : '2px solid transparent';
      // Every day is clickable (so staff can enter data for any date)
      calRows += `<td onclick="ST._wasteState={_date:'${ds}'};ST._scrollToRapport=true;renderTab()"
        style="text-align:center;padding:5px 2px;border-radius:7px;cursor:pointer;
               background:${bg};color:${col};font-weight:${hasData||isToday||isPOS||isSel?'700':'400'};
               border:${border};box-sizing:border-box"
        title="${hasData ? fmtDate(ds)+(missingPOS ? ': Rapport lagret – POS ikke lastet opp' : ': Rapport lagret') : isPOS ? fmtDate(ds)+': POS-data, mangler daglig rapport' : fmtDate(ds)}">
        <div style="font-size:0.9rem">${calDay}</div>
        ${hasData ? `<div style="font-size:0.62rem;margin-top:1px;opacity:0.85">✓</div>${missingPOS ? `<div style="font-size:0.52rem;background:#ede7f6;color:#6a1b9a;border-radius:2px;padding:0 2px;margin-top:1px;font-weight:700;line-height:1.4">POS</div>` : ''}`
                  : isPOS ? `<div style="font-size:0.62rem;margin-top:1px;opacity:0.9">POS</div>`
                  : '<div style="font-size:0.62rem">&nbsp;</div>'}
      </td>`;
      calDay++;
    }
    if (cell % 7 === 6) calRows += '</tr>';
  }
  const calendarHtml = `
  <div class="card" style="margin-bottom:1rem">
    <div class="card-header" style="margin-bottom:8px">
      <span class="card-title">📅 Velg dato</span>
      <div class="spacer"></div>
      <button onclick="ST._wasteState={_date:'${today()}'};ST._scrollToRapport=true;renderTab()"
        style="font-size:0.8rem;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer">
        I dag
      </button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <button onclick="ST._wasteHistMonth='${prevCM}';renderTab()"
        style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:1rem">‹</button>
      <span style="font-weight:600;flex:1;text-align:center">${mNames[cm-1]} ${cy}</span>
      <button onclick="ST._wasteHistMonth='${nextCM}';renderTab()"
        style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:1rem">›</button>
    </div>
    <table style="width:100%;border-collapse:separate;border-spacing:2px">
      <thead><tr>${['Ma','Ti','On','To','Fr','Lø','Sø'].map(d=>`<th style="font-size:0.72rem;text-align:center;color:var(--text2);padding:2px;font-weight:600">${d}</th>`).join('')}</tr></thead>
      <tbody>${calRows}</tbody>
    </table>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:0.72rem;flex-wrap:wrap;color:var(--text2)">
      <span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#e8f5e9;border:1px solid #a5d6a7;vertical-align:middle"></span> ✓ Rapport lagret</span>
      <span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#ede7f6;border:1px solid #ce93d8;vertical-align:middle"></span> POS – mangler rapport</span>
      <span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:transparent;border:3px solid #2e7d32;vertical-align:middle"></span> Valgt dato</span>
      <span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:transparent;border:3px solid #1565c0;vertical-align:middle"></span> I dag</span>
    </div>
    <div style="margin-top:10px;font-size:0.85rem;color:var(--text2);text-align:center">
      Klikk på en dag for å fylle inn eller se rapport ↓
    </div>
  </div>`;

  // ── 3. Fetch usage counts (for product sort order) ───────────────────────
  const usageCounts = {};
  try {
    const since = new Date(Date.now() - 60*24*60*60*1000).toISOString().slice(0,10);
    const [usageRows, bordRows] = await Promise.all([
      sbGet(`daily_sales?sale_date=gte.${since}&select=cafe_product_id`),
      sbGet(`private_orders?order_date=gte.${since}&select=private_order_items(cafe_product_id)`)
    ]);
    usageRows.forEach(r => {
      if (r.cafe_product_id) usageCounts[r.cafe_product_id] = (usageCounts[r.cafe_product_id]||0) + 1;
    });
    bordRows.forEach(o => {
      (o.private_order_items||[]).forEach(i => {
        if (i.cafe_product_id) usageCounts[i.cafe_product_id] = (usageCounts[i.cafe_product_id]||0) + 1;
      });
    });
  } catch(e) {}

  const products = ST.cafeProducts
    .filter(p => !p.made_to_order)
    .sort((a, b) => (usageCounts[b.id]||0) - (usageCounts[a.id]||0));

  // ── 4. Fetch POS sales + bord bestilling items for selected date ───────────
  ST._todaySales = {};
  let _posSalesCount = 0, _bordSalesTotal = 0, _bordOrderCount = 0;
  try {
    const sales = await sbGet(`daily_sales?sale_date=eq.${logDate}`);
    _posSalesCount = sales.length;
    sales.forEach(s => {
      if (s.cafe_product_id) ST._todaySales[s.cafe_product_id] = (ST._todaySales[s.cafe_product_id] || 0) + s.units_sold;
      ST._todaySales[s.product_name] = (ST._todaySales[s.product_name] || 0) + s.units_sold;
    });
  } catch(e) {}  
  // Also include items from private orders (bord bestillinger) delivered on this date
  try {
    const bordOrders = await sbGet(`private_orders?delivery_date=eq.${logDate}&select=*,private_order_items(*)`);
    _bordOrderCount = bordOrders.length;
    bordOrders.forEach(order => {
      (order.private_order_items || []).forEach(item => {
        const qty = Number(item.quantity) || 0;
        if (qty <= 0) return;
        if (item.cafe_product_id) ST._todaySales[item.cafe_product_id] = (ST._todaySales[item.cafe_product_id] || 0) + qty;
        if (item.product_name) ST._todaySales[item.product_name] = (ST._todaySales[item.product_name] || 0) + qty;
        _bordSalesTotal += qty;
      });
    });
  } catch(e) {}

  // ── 5. Pre-fill form from saved rapport for selected date ────────────────
  if (!ST._wasteState['_loaded_' + logDate]) {
    try {
      const [wlog, plog] = await Promise.all([
        sbGet(`waste_log?log_date=eq.${logDate}`),
        sbGet(`production_log?log_date=eq.${logDate}`)
      ]);
      wlog.forEach(r => {
        if (r.waste_type === 'kassert')     ST._wasteState['wk_' + r.cafe_product_id] = String(r.quantity);
        if (r.waste_type === '2good2go')    ST._wasteState['wg_' + r.cafe_product_id] = String(r.quantity);
        if (r.waste_type === 'personalmat') ST._wasteState['wm_' + r.cafe_product_id] = String(r.quantity);
      });
      plog.forEach(r => { ST._wasteState['wp_' + r.cafe_product_id] = String(r.quantity_produced); });
      ST._wasteState['_loaded_'   + logDate] = true;
      ST._wasteState['_has_data_' + logDate] = wlog.length > 0 || plog.length > 0;
    } catch(e) {}
  }

  // ── 6. Build rapport form ─────────────────────────────────────────────────
  const noSalesNote = _posSalesCount === 0
    ? `<div style="font-size:0.8rem;color:#856404;background:#fff9ee;border:1px solid #e6d5a0;border-radius:6px;padding:6px 10px;margin-bottom:6px">
        ⚠️ Ingen POS-salgsdata for denne datoen — «Solgt»-kolonnen viser kun bordbookinger.
       </div>` : '';
  const bordNote = _bordSalesTotal > 0
    ? `<div style="font-size:0.8rem;color:#1565c0;background:#e3f2fd;border:1px solid #90caf9;border-radius:6px;padding:6px 10px;margin-bottom:6px">
        🪑  enhet fra  bordbooking er inkludert i «Solgt»-kolonnen.
       </div>` : '';

  const rows = products.length === 0
    ? '<div class="empty">Ingen produkter. Legg til produkter under Oppskrifter.</div>'
    : products.map(p => {
        const sold = ST._todaySales?.[p.id] || ST._todaySales?.[p.name] || 0;
        const prod = parseFloat(ST._wasteState['wp_' + p.id]) || 0;
        const svinn = parseFloat(ST._wasteState['wk_' + p.id]) || 0;
        const g2g   = parseFloat(ST._wasteState['wg_' + p.id]) || 0;
        const mat   = parseFloat(ST._wasteState['wm_' + p.id]) || 0;
        const uforklart = prod - sold - svinn - g2g - mat;
        const uColor = uforklart === 0 ? (prod===0&&sold===0?'var(--text2)':'#3B6D11') : uforklart > 0 ? '#856404' : '#A32D2D';
        const uText  = (prod===0&&sold===0&&svinn===0&&g2g===0&&mat===0) ? '—'
                     : uforklart === 0 ? '✓ 0'
                     : (uforklart > 0 ? '+' : '') + fmtN(uforklart);
        const unused = (usageCounts[p.id]||0) === 0;
        const autoKantine = p.auto_canteen_produce;
        const halfStep = p.name.toLowerCase().includes('kaffekanne') ? 0.5 : 1;
        return `
        <tr style="border-bottom:1px solid var(--bg3)${unused ? ';opacity:0.4' : ''}${autoKantine ? ';background:#f0f6ff' : ''}">
          <td style="font-weight:500;padding:6px 4px">${autoKantine ? '🏢 ' : ''}${esc(p.name)}</td>
          <td style="padding:4px 2px">${stepper('wp_'+p.id,'#4a90d9','#a8c8f0','#e8f0fb',halfStep)}</td>
          <td style="text-align:center;padding:4px;font-weight:500;color:var(--text2)">${fmtN(sold)}</td>
          <td style="padding:4px 2px">${stepper('wk_'+p.id,'','#e8c0c0','#fcebeb',halfStep)}</td>
          <td style="padding:4px 2px">${stepper('wg_'+p.id,'','#b8dba0','#eaf3de',halfStep)}</td>
          <td style="padding:4px 2px">${stepper('wm_'+p.id,'','#f0d0a0','#fdf3e3',halfStep)}</td>

async function saveDagligRapport() {
  const logDate = ST._wasteState['_date'] || today();
  const products = ST.cafeProducts.filter(p => p.active);

  const wasteRows = [];
  const prodRows  = [];

  for (const p of products) {
    const prod  = parseFloat(ST._wasteState['wp_' + p.id]) || 0;
    const svinn = parseFloat(ST._wasteState['wk_' + p.id]) || 0;
    const g2g   = parseFloat(ST._wasteState['wg_' + p.id]) || 0;
    const mat   = parseFloat(ST._wasteState['wm_' + p.id]) || 0;
    if (prod  > 0) prodRows.push({ log_date: logDate, cafe_product_id: p.id, product_name: p.name, quantity_produced: prod });
    if (svinn > 0) wasteRows.push({ log_date: logDate, cafe_product_id: p.id, product_name: p.name, quantity: svinn, waste_type: 'kassert' });
    if (g2g   > 0) wasteRows.push({ log_date: logDate, cafe_product_id: p.id, product_name: p.name, quantity: g2g,   waste_type: '2good2go' });
    if (mat   > 0) wasteRows.push({ log_date: logDate, cafe_product_id: p.id, product_name: p.name, quantity: mat,   waste_type: 'personalmat' });
  }

  if (wasteRows.length === 0 && prodRows.length === 0) {
    showAlert('Ingen data å lagre — fyll inn minst ett felt', 'error'); return;
  }

  try {
    // Delete ALL entries for this date (regardless of product) to prevent stale rows
    await Promise.all([
      sbDelete(`waste_log?log_date=eq.${logDate}`),
      sbDelete(`production_log?log_date=eq.${logDate}`)
    ]);
    // Then insert new rows in parallel
    await Promise.all([
      wasteRows.length > 0 ? sbPost('waste_log', wasteRows) : Promise.resolve(),
      prodRows.length  > 0 ? sbPost('production_log', prodRows) : Promise.resolve()
    ]);

    // Mark as loaded and saved so badge updates immediately
    ST._wasteState['_loaded_'   + logDate] = true;
    ST._wasteState['_has_data_' + logDate] = true;
    if (!ST._savedDates) ST._savedDates = new Set();
    ST._savedDates.add(logDate);
    ST._savedDatesCache = null; // invalidate date cache
    ST._posDatesMonthCache = null; // invalidate per-month POS date cache
    showAlert('Daglig rapport lagret!');
    await renderTab();
  } catch(e) {
    showAlert('Feil ved lagring: ' + e.message, 'error');
  }
}

async function buildInnkjop() {
  // Ensure suggestion cache is loaded whenever the purchase tab is open
  if (!ST._pastPurchaseItems) {
    try {
      const receipts = await sbGet('purchase_receipts?supplier_type=in.(supermarked,ekstern)&select=receipt_date,purchase_items(item_name,unit,unit_price)&order=receipt_date.desc&limit=200');
      const seen = {};
      receipts.forEach(r => {
        (r.purchase_items||[]).forEach(pi => {
          const key = pi.item_name.toLowerCase().trim();
          if (!seen[key] || pi.unit_price > 0) seen[key] = { name: pi.item_name, unit: pi.unit, unit_price: pi.unit_price };
        });
      });
      ST._pastPurchaseItems = Object.values(seen).sort((a,b) => a.name.localeCompare(b.name, 'nb'));
    } catch(e) {
      ST._pastPurchaseItems = [];
    }
  }

  const subTab = ST.subTab.innkjop || 'supermarked';
  const tabs = ST.role === 'admin'
    ? ['supermarked','kantine','ekstern','historikk','prishistorikk']
    : ['supermarked','historikk'];
  const kantineBadge = ST._kantineUnsynced > 0 ? ` <span style="background:#e6a817;color:white;border-radius:10px;padding:1px 7px;font-size:0.72rem;font-weight:700;vertical-align:middle">${ST._kantineUnsynced}</span>` : '';
  const tabLabels = { supermarked: '🛒 Supermarked', kantine: `🏢 Kantine${kantineBadge}`, ekstern: '🏪 Ekstern', historikk: '📋 Historikk', prishistorikk: '📈 Prishistorikk' };

  const subNavHtml = tabs.length > 1 ? `<div class="sub-nav">
    ${tabs.map(t => `<button class="${subTab===t?'active':''}" onclick="ST.subTab.innkjop='${t}';renderTab()">${tabLabels[t]}</button>`).join('')}
  </div>` : '';

  let content = '';
  if (subTab === 'supermarked' || subTab === 'ekstern') {
    content = buildInnkjopForm(subTab);
  } else if (subTab === 'kantine') {
    content = await buildKantineSync();
  } else if (subTab === 'historikk') {
    content = await buildInnkjopHistorikk();
  } else if (subTab === 'prishistorikk') {
    content = await buildPrishistorikk();
  }

  return `${subNavHtml}${content}`;
}

function addPurchaseRow() {
  if (!ST._purchaseRows) ST._purchaseRows = [];
  ST._purchaseRows.push({ id: Date.now(), name:'', qty:'', unit:'stk', unitPrice:'', total:0 });
  renderTab();
}

function removePurchaseRow(id) {
  ST._purchaseRows = (ST._purchaseRows||[]).filter(r => r.id !== id);
  renderTab();
}

function updatePurchaseRow(id, field, val) {
  const row = (ST._purchaseRows||[]).find(r => r.id === id);
  if (row) row[field] = (field === 'unitPrice' || field === 'qty') ? val.replace(',', '.') : val;
}

function refreshPurchaseTotal() {
  const grandTotal = (ST._purchaseRows||[]).reduce((s,r) => s + (r.total||0), 0);
  const el = document.getElementById('purchase-grand-total');
  if (el) el.textContent = fmt(grandTotal);
}

function calcPurchaseRow(id) {
  const row = (ST._purchaseRows||[]).find(r => r.id === id);
  if (!row) return;
  const qty = parseFloat(String(row.qty).replace(',', '.')) || 0;
  const up  = parseFloat(String(row.unitPrice).replace(',', '.')) || 0;
  row.total = qty * up;
  const totalEl = document.getElementById('pr-total-' + id);
  if (totalEl) totalEl.value = row.total > 0 ? fmtN(row.total) : '';
  refreshPurchaseTotal();
}

function calcPurchaseRowFromTotal(id, totalVal) {
  const row = (ST._purchaseRows||[]).find(r => r.id === id);
  if (!row) return;
  const total = parseFloat(String(totalVal).replace(',', '.')) || 0;
  const qty   = parseFloat(String(row.qty).replace(',', '.')) || 0;
  if (qty > 0 && total > 0) {
    const unitPrice = total / qty;
    row.unitPrice = String(unitPrice);
    row.total = total;
    const priceEl = document.getElementById('pr-price-' + id);
    if (priceEl) priceEl.value = fmtN(unitPrice);
  }
  refreshPurchaseTotal();
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      // raw:false gives us strings; defval:'' fills empty cells
      const json = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });

      // Find the first row that looks like a header (has some non-empty cells)
      let headerRowIdx = 0;
      for (let i = 0; i < Math.min(json.length, 10); i++) {
        if (json[i].filter(c => String(c).trim()).length >= 2) { headerRowIdx = i; break; }
      }
      const headers  = json[headerRowIdx].map((h, i) => ({ idx: i, label: String(h||'').trim() }));
      const dataRows = json.slice(headerRowIdx + 1).filter(row => row.some(c => String(c).trim()));

      if (dataRows.length === 0) { showAlert('Fant ingen datarader i filen', 'error'); return; }

      // Auto-detect columns by scanning header labels
      const detect = (...keywords) => {
        const idx = headers.findIndex(h => keywords.some(k => h.label.toLowerCase().includes(k)));
        return idx >= 0 ? idx : '';
      };
      const colMap = {
        name:      detect('varenavn','produktnavn','beskrivelse','item','description','vare','produkt','navn'),
        qty:       detect('antall','kvantum','qty','quantity','mengde','bestillt','levert'),
        unit:      detect('enhet','unit','uom','enh'),
        unitPrice: detect('enhetspris','stykpris','pris/stk','unit price','a-pris','apris','kr/'),
        total:     detect('beløp','totalbeløp','total','sum','amount','netto','pris totalt'),
      };

      ST._importModal = { step: 'preview', headers, dataRows, colMap, supplierType: ST._importModal.supplierType };
      renderTab();
    } catch(err) {
      showAlert('Kunne ikke lese filen: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function updateImportCol(field, val) {
  if (ST._importModal) {
    ST._importModal.colMap[field] = val === '' ? '' : parseInt(val);
    renderTab();
  }
}

function confirmImport() {
  const m = ST._importModal;
  if (!m || !m.dataRows) return;
  const { colMap, dataRows } = m;

  const knownUnits = new Set(['stk','kg','liter','pakke','dl','pose','boks','g','ml','l','pcs','pk']);
  const parseNum = v => parseFloat(String(v||'').replace(/\s/g,'').replace(',','.').replace(/[^0-9.\-]/g,'')) || 0;

  const newRows = [];
  for (const row of dataRows) {
    const name = colMap.name !== '' ? String(row[colMap.name]||'').trim() : '';
    if (!name) continue;

    const qty       = colMap.qty       !== '' ? parseNum(row[colMap.qty])       : 0;
    const rawUnit   = colMap.unit      !== '' ? String(row[colMap.unit]||'').trim().toLowerCase() : '';
    const unit      = knownUnits.has(rawUnit) ? rawUnit : (rawUnit || 'stk');
    const unitPrice = colMap.unitPrice !== '' ? parseNum(row[colMap.unitPrice]) : 0;
    const totalRaw  = colMap.total     !== '' ? parseNum(row[colMap.total])     : 0;

    // Derive total: prefer explicit total column, else qty × unitPrice
    let total = totalRaw > 0 ? totalRaw : (qty > 0 && unitPrice > 0 ? qty * unitPrice : 0);
    // Derive unitPrice from total if missing
    let up = unitPrice > 0 ? unitPrice : (qty > 0 && total > 0 ? total / qty : 0);

    newRows.push({ id: Date.now() + newRows.length, name, qty: qty > 0 ? String(qty) : '', unit, unitPrice: up > 0 ? String(up) : '', total });
  }

  if (newRows.length === 0) { showAlert('Ingen gyldige rader funnet — sjekk kolonnetilordningen', 'error'); return; }

  // Merge on top of any existing rows (or replace if user had nothing)
  const existing = (ST._purchaseRows||[]).filter(r => r.name);
  ST._purchaseRows = existing.length > 0 ? [...existing, ...newRows] : newRows;
  ST._importModal  = null;
  renderTab();
  showAlert(`${newRows.length} varer importert fra fil`);
}

           <button class="btn btn-sm" onclick="ST._importModal.step='upload';renderTab()">← Velg annen fil</button>`

      <button class="btn" onclick="closeImportModal()">Avbryt</button>

//  PURCHASE ROW AUTOCOMPLETE
// =============================================================
function getPurchaseSuggestions() {
  // Merge ingredients list + past purchase items into one deduplicated lookup
  const map = {};
  (ST.ingredients || []).forEach(i => {
    const key = i.name.toLowerCase();
    map[key] = { name: i.name, unit: i.purchase_unit || i.unit || 'stk', price: i.purchase_price || 0 };
  });
  (ST._pastPurchaseItems || []).forEach(p => {
    const key = p.name.toLowerCase();
    if (!map[key]) map[key] = { name: p.name, unit: p.unit || 'stk', price: p.unit_price || 0 };
    else if (p.unit_price > 0) map[key].price = p.unit_price; // keep most recent price
  });
  return Object.values(map).sort((a,b) => a.name.localeCompare(b.name, 'nb'));
}

function showPurchaseSuggestions(rowId, query) {
  updatePurchaseRow(rowId, 'name', query);
  const suggEl = document.getElementById('pr-sugg-' + rowId);
  if (!suggEl) return;
  const q = query.trim().toLowerCase();
  if (q.length === 0) { suggEl.style.display = 'none'; return; }

  const all = getPurchaseSuggestions();
  const starts   = all.filter(s => s.name.toLowerCase().startsWith(q));
  const contains = all.filter(s => !s.name.toLowerCase().startsWith(q) && s.name.toLowerCase().includes(q));
  const matches  = [...starts, ...contains].slice(0, 8);

  if (matches.length === 0) { suggEl.style.display = 'none'; return; }

  // Store matches in state indexed by rowId so onclick can reference safely
  if (!ST._suggCache) ST._suggCache = {};
  ST._suggCache[rowId] = matches;

  suggEl.innerHTML = matches.map((s, idx) => `
    <div onmousedown="applyPurchaseSuggestion(${rowId}, ${idx})"
      style="padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--bg3);font-size:0.88rem;display:flex;justify-content:space-between;align-items:center"
      onmouseenter="this.style.background='var(--bg2)'" onmouseleave="this.style.background=''">
      <span style="font-weight:500">${esc(s.name)}</span>
      <span style="color:var(--text2);font-size:0.8rem">${esc(s.unit)}${s.price > 0 ? ' · ' + fmt(s.price) : ''}</span>
    </div>`).join('');
  suggEl.style.display = 'block';
}

function hidePurchaseSuggestions(rowId) {
  const suggEl = document.getElementById('pr-sugg-' + rowId);
  if (suggEl) suggEl.style.display = 'none';
}

function applyPurchaseSuggestion(rowId, idx) {
  const s = (ST._suggCache || {})[rowId]?.[idx];
  if (!s) return;

  const row = (ST._purchaseRows||[]).find(r => r.id === rowId);
  if (row) { row.name = s.name; row.unit = s.unit; row.unitPrice = String(s.price); }

  const nameEl  = document.getElementById('pr-name-'  + rowId);
  const unitEl  = document.getElementById('pr-unit-'  + rowId);
  const priceEl = document.getElementById('pr-price-' + rowId);
  if (nameEl)  nameEl.value  = s.name;
  if (priceEl) priceEl.value = String(s.price).replace('.', ',');
  if (unitEl)  { for (const o of unitEl.options) { if (o.value === s.unit) { o.selected = true; break; } } }

  hidePurchaseSuggestions(rowId);
  calcPurchaseRow(rowId);
}

async function savePurchase(supplierType) {
  const rows = ST._purchaseRows || [];
  const validRows = rows.filter(r => r.name && (parseFloat(r.qty)||0) > 0 && (parseFloat(r.unitPrice)||0) >= 0);
  if (validRows.length === 0) { showAlert('Fyll inn minst én gyldig rad', 'error'); return; }

  const dateEl = el('purchase-date');
  const receiptDate = dateEl ? dateEl.value : today();
  const supplierNameEl = el('purchase-supplier-name');
  const supplierName = supplierNameEl ? supplierNameEl.value : null;
  const total = validRows.reduce((s,r) => s + (parseFloat(r.qty)||0)*(parseFloat(r.unitPrice)||0), 0);

  try {
    const [receipt] = await sbPost('purchase_receipts', [{
      receipt_date: receiptDate,
      supplier_type: supplierType,
      supplier_name: supplierName || supplierType,
      total_amount: total,
      source: 'manual',
      created_by: ST.role
    }]);

    // Match or create ingredients
    const ingMap = {};
    ST.ingredients.forEach(i => ingMap[i.name.toLowerCase()] = i);

    const itemsToInsert = [];
    const updatedPrices = [];
    for (const r of validRows) {
      const qty = parseFloat(r.qty);
      const up  = parseFloat(r.unitPrice);
      let ing = ingMap[r.name.toLowerCase()];
      if (!ing) {
        // New ingredient — create it
        const [newIng] = await sbPost('ingredients', [{
          name: r.name, unit: r.unit, category: supplierType,
          purchase_unit: r.unit, recipe_unit: r.unit,
          purchase_price: up, units_per_purchase: 1, cost_per_unit: up
        }]);
        ing = newIng;
        ST.ingredients.push(newIng);
        ingMap[r.name.toLowerCase()] = newIng;
      } else if (ing.purchase_price !== up || ing.cost_per_unit !== up) {
        // Existing ingredient — update purchase price and recalculate cost per recipe unit
        const upp = parseFloat(ing.units_per_purchase) || 1;
        const newCpp = upp > 0 ? up / upp : up;
        await sbPatch(`ingredients?id=eq.${ing.id}`, { purchase_price: up, cost_per_unit: newCpp });
        const oldPrice = ing.purchase_price || ing.cost_per_unit || 0;
        if (oldPrice !== up) updatedPrices.push(`${ing.name}: ${fmt(oldPrice)} → ${fmt(up)}`);
        ing.purchase_price = up;
        ing.cost_per_unit  = newCpp;
      }
      itemsToInsert.push({
        receipt_id: receipt.id,
        ingredient_id: ing.id,
        item_name: r.name,
        quantity: qty,
        unit: r.unit,
        unit_price: up,
        total_price: qty * up
      });
    }

    await sbPost('purchase_items', itemsToInsert);
    ST._purchaseRows = null;
    ST._purchaseDate = null;
    ST._purchaseSupplierName = null;
    ST._pastPurchaseItems = null; // clear cache so dropdown refreshes next time
    if (updatedPrices.length > 0) {
      showAlert('Kvittering lagret! Priser oppdatert: ' + updatedPrices.join(', '));
    } else {
      showAlert('Kvittering lagret!');
    }
    await renderTab();
  } catch(e) {
    showAlert('Feil ved lagring: ' + e.message, 'error');
  }
}

async function buildKantineSync() {
  let deliveredOrders = [];
  try {
    deliveredOrders = await sbGet('orders?status=in.(delivered,accepted)&order=created_at.desc&limit=30');
  } catch(e) {}

  // Find which are already synced — store receiptId per orderId for undo
  const syncedMap = {};     // orderId → receiptId
  const syncedDateMap = {}; // orderId → receipt_date
  try {
    const synced = await sbGet('purchase_receipts?source=eq.bestillinger_sync&select=id,bestillinger_order_id,receipt_date');
    synced.forEach(r => {
      if (r.bestillinger_order_id) {
        syncedMap[r.bestillinger_order_id]     = r.id;
        syncedDateMap[r.bestillinger_order_id] = r.receipt_date;
      }
    });
  } catch(e) {}

  let kantineProducts = [];
  try { kantineProducts = await sbGet('products?select=*'); } catch(e) {}
  const kpMap = {};
  kantineProducts.forEach(p => kpMap[p.id] = p);

  if (deliveredOrders.length === 0) return `<div class="card"><div class="empty">Ingen leverte bestillinger funnet.</div></div>`;

  // Update badge count and refresh nav
  ST._kantineUnsynced = deliveredOrders.filter(o => !syncedMap[o.id]).length;
  renderNav();

  return `
  <div class="card">
    <div class="card-header"><span class="card-title">🏢 Importer fra kantine</span></div>
    ${deliveredOrders.map(order => {
      const items   = Array.isArray(order.items) ? order.items : [];
      const total   = items.reduce((s,i) => { const p = kpMap[i.pid]; return s + (p ? p.price * i.qty : 0); }, 0);
      const synced  = syncedMap[order.id];
      // Default delivery date: today (not created_at, which is order placement date)
      const defaultDate = today();
      return `<div class="card" style="margin-bottom:0.75rem;${synced ? 'opacity:0.6' : ''}">
        <div class="card-header">
          <span class="card-title">Uke ${esc(order.week)} — ${fmt(total)}</span>
          <div class="spacer"></div>
          ${synced
            ? `<span style="color:#3B6D11;font-size:0.85rem;font-weight:600;margin-right:8px">✓ Importert</span>
               <button class="btn btn-sm btn-danger" onclick="undoKantineImport(${synced})">↩ Angre</button>`
            : `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                 <label style="font-size:0.82rem;color:var(--text2);white-space:nowrap">Leveringsdato:</label>
                 ${mkDatePicker('sync-date-'+order.id, defaultDate, '', 'padding:5px 8px;font-size:0.88rem;background:white')}
                 <button class="btn btn-sm btn-primary" onclick="importKantineOrder(${order.id})">Importer som innkjøp</button>
               </div>`
          }
        </div>
        ${synced
          ? (() => {
              const isoDate = syncedDateMap && syncedDateMap[order.id] ? syncedDateMap[order.id] : '';
              return `<div id="redate-row-${order.id}" data-iso="${isoDate}"
                style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:0.8rem;color:var(--text2);margin-bottom:8px">
                📅 Kvittert dato: <strong>${isoDate ? fmtDate(isoDate) : '—'}</strong>
                <button class="btn btn-sm" style="font-size:0.75rem;padding:2px 8px"
                  onclick="redateKantineReceipt(${synced}, ${order.id})">✏️ Endre dato</button>
              </div>`;
            })()
          : ''}
        <table><thead><tr><th>Produkt</th><th>Antall</th><th>Pris</th></tr></thead><tbody>
          ${items.map(i => { const p = kpMap[i.pid]; return p ? `<tr><td>${esc(p.name)}</td><td>${i.qty} ${esc(p.unit)}</td><td>${fmt(p.price*i.qty)}</td></tr>` : ''; }).join('')}
        </tbody></table>
      </div>`;
    }).join('')}
  </div>`;
}

async function undoKantineImport(receiptId) {
  if (!confirm('Angre importen? Kvitteringen slettes og bestillingen kan importeres på nytt.')) return;
  try {
    await sbDelete(`purchase_receipts?id=eq.${receiptId}`);
    showAlert('Import angret — bestillingen kan importeres på nytt');
    await renderTab();
  } catch(e) {
    showAlert('Feil: ' + e.message, 'error');
  }
}

function redateKantineReceipt(receiptId, orderId) {
  // Replace the date row with an inline date picker
  const rowEl = document.getElementById(`redate-row-${orderId}`);
  if (!rowEl) return;
  const currentIso = rowEl.getAttribute('data-iso') || today();
  rowEl.innerHTML = `
    <span style="font-size:0.8rem;color:var(--text2)">📅 Ny leveringsdato:</span>
    ${mkDatePicker('redate-input-'+orderId, currentIso, `document.getElementById('redate-preview-${orderId}').textContent=this.value?fmtDate(this.value):'';`, 'padding:4px 8px;font-size:0.88rem;background:white')}
    <strong id="redate-preview-${orderId}" style="font-size:0.88rem;min-width:80px">${currentIso ? fmtDate(currentIso) : ''}</strong>
    <button class="btn btn-sm btn-primary" style="font-size:0.75rem;padding:3px 10px"
      onclick="saveRedateKantine(${receiptId}, ${orderId})">Lagre</button>
    <button class="btn btn-sm" style="font-size:0.75rem;padding:3px 10px"
      onclick="renderTab()">Avbryt</button>
  `;
  // Focus the date input so the calendar opens immediately
  setTimeout(() => { const inp = document.getElementById(`redate-input-${orderId}`); if(inp) inp.showPicker?.(); }, 50);
}

async function saveRedateKantine(receiptId, orderId) {
  const input = document.getElementById(`redate-input-${orderId}`);
  if (!input || !input.value) return;
  try {
    await sbPatch(`purchase_receipts?id=eq.${receiptId}`, { receipt_date: input.value });
    showAlert(`Dato oppdatert til ${fmtDate(input.value)}`);
    renderTab();
  } catch(e) {
    showAlert('Feil ved datoendring: ' + e.message, 'error');
  }
}

async function importKantineOrder(orderId) {
  try {
    const [order] = await sbGet(`orders?id=eq.${orderId}&select=*`);
    let kantineProducts = await sbGet('products?select=*');
    const kpMap = {};
    kantineProducts.forEach(p => kpMap[p.id] = p);

    // Use the date chosen in the sync UI (defaults to today — NOT created_at which is order placement date)
    const dateInput = document.getElementById(`sync-date-${orderId}`);
    const receiptDate = (dateInput && dateInput.value) ? dateInput.value : today();

    const items = Array.isArray(order.items) ? order.items : [];
    const total = items.reduce((s,i) => { const p = kpMap[i.pid]; return s + (p ? p.price*i.qty : 0); }, 0);

    const [receipt] = await sbPost('purchase_receipts', [{
      receipt_date: receiptDate,
      supplier_type: 'kantine',
      supplier_name: 'Kantine',
      total_amount: total,
      source: 'bestillinger_sync',
      bestillinger_order_id: orderId
    }]);

    const ingMap = {};
    ST.ingredients.forEach(i => ingMap[i.name.toLowerCase()] = i);

    const itemsToInsert = [];
    for (const item of items) {
      const p = kpMap[item.pid];
      if (!p) continue;
      let ing = ingMap[p.name.toLowerCase()];
      if (!ing) {
        const ingUnit = p.unit || 'stk';
        const [newIng] = await sbPost('ingredients', [{ name: p.name, unit: ingUnit, purchase_unit: ingUnit, recipe_unit: ingUnit, category: 'kantine', cost_per_unit: p.price, purchase_price: p.price, canteen_product_id: p.id }]);
        ing = newIng;
        ST.ingredients.push(newIng);
        ingMap[p.name.toLowerCase()] = newIng;
      }
      itemsToInsert.push({
        receipt_id: receipt.id,
        ingredient_id: ing.id,
        item_name: p.name,
        quantity: item.qty,
        unit: p.unit || 'stk',
        unit_price: p.price,
        total_price: p.price * item.qty
      });
    }

    if (itemsToInsert.length > 0) await sbPost('purchase_items', itemsToInsert);

    // Auto-produce: create production_log entries for products with auto_canteen_produce = true
    try {
      const deliveryDate = receiptDate; // use the staff-selected receipt date, not order created_at
      const ingIds = itemsToInsert.map(i => i.ingredient_id).filter(Boolean);
      if (ingIds.length > 0) {
        const recipeItems = await sbGet(`recipe_items?ingredient_id=in.(${ingIds.join(',')})&select=cafe_product_id,ingredient_id,quantity`);
        if (recipeItems.length > 0) {
          const cpIds = [...new Set(recipeItems.map(r => r.cafe_product_id))];
          const autoProds = ST.cafeProducts.filter(p => cpIds.includes(p.id) && p.auto_canteen_produce);
          const prodLogs = [];
          for (const prod of autoProds) {
            const rel = recipeItems.filter(r => r.cafe_product_id === prod.id);
            for (const ri of rel) {
              const deliveredItem = itemsToInsert.find(i => i.ingredient_id === ri.ingredient_id);
              if (!deliveredItem) continue;
              // Kantine orders are already finished products — quantity ordered = quantity produced
              const produced = deliveredItem.quantity;
              if (produced > 0) {
                prodLogs.push({
                  cafe_product_id: prod.id,
                  product_name: prod.name,
                  quantity_produced: produced,
                  log_date: deliveryDate
                });
              }
            }
          }
          if (prodLogs.length > 0) {
            await sbPost('production_log', prodLogs);
            const names = autoProds.map(p => p.name).join(', ');
            showAlert(`Kantinebestilling importert! Auto-produsert: ${names}`);
          } else {
            showAlert('Kantinebestilling importert som innkjøp!');
          }
        } else {
          showAlert('Kantinebestilling importert som innkjøp!');
        }
      } else {
        showAlert('Kantinebestilling importert som innkjøp!');
      }
    } catch(e) {
      console.warn('Auto-produce feil:', e);
      showAlert('Kantinebestilling importert som innkjøp!');
    }
    await renderTab();
  } catch(e) {
    showAlert('Feil: ' + e.message, 'error');
  }
}

async function buildInnkjopHistorikk() {

  if (filterType !== 'alle') query += `&supplier_type=eq.${filterType}`;

  let receipts = [];

  const expanded = ST._histExpanded || new Set();

  const rows = receipts.map(r => {
    const isOpen = expanded.has(r.id);
    const items  = r.purchase_items || [];
    const itemsHtml = isOpen ? `
      <tr id="hist-detail-${r.id}">
        <td colspan="6" style="padding:0;background:var(--bg2)">
          <div style="padding:10px 14px">
            <table style="margin:0">

                <th>Vare</th><th>Antall</th><th>Enhet</th>
                <th style="text-align:right">Pris/enh</th>
                <th style="text-align:right">Total</th>
              </tr></thead>
              <tbody>
                ${items.map(i => `<tr>
                  <td>${esc(i.item_name)}</td>
                  <td>${fmtN(i.quantity)}</td>
                  <td>${esc(i.unit)}</td>
                  <td style="text-align:right">${fmt(i.unit_price)}</td>
                  <td style="text-align:right">${fmt(i.total_price)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
            <div style="margin-top:8px;display:flex;gap:8px">
              <button class="btn btn-sm" onclick="openReceiptEdit(${r.id})">✏️ Rediger kvittering</button>
              ${ST.role === 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteReceipt(${r.id})">🗑️ Slett kvittering</button>` : ''}
            </div>
          </div>
        </td>
      </tr>` : '';

    const staffBadge = r.created_by === 'staff'
      ? `<span style="background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;border-radius:4px;padding:1px 6px;font-size:0.72rem;font-weight:600;margin-left:5px">Ansatt</span>`
      : '';
    return `
      <tr style="cursor:pointer" onclick="toggleHistDetail(${r.id})">
        <td>${esc(r.receipt_date)}</td>
        <td>${esc(r.supplier_name || r.supplier_type)}${staffBadge}</td>
        <td><span class="badge badge-${r.supplier_type}">${esc(r.supplier_type)}</span></td>
        <td style="color:var(--text2)">${items.length} varer</td>
        <td style="text-align:right;font-weight:600">${fmt(r.total_amount)}</td>
        <td style="text-align:right;color:var(--text2);font-size:1rem">${isOpen ? '▲' : '▼'}</td>
      </tr>
      ${itemsHtml}`;
  }).join('');

  return `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Innkjøpshistorikk${isStaff ? ' — Supermarked' : ''}</span>
      <div class="spacer"></div>
      ${isStaff ? '' : `<select style="width:auto" onchange="ST._histType=this.value;renderTab()">
        <option value="alle"       ${filterType==='alle'?'selected':''}>Alle leverandører</option>
        <option value="supermarked"${filterType==='supermarked'?'selected':''}>Supermarked</option>
        <option value="kantine"    ${filterType==='kantine'?'selected':''}>Kantine</option>
        <option value="ekstern"    ${filterType==='ekstern'?'selected':''}>Ekstern</option>
      </select>`}
    </div>
    ${receipts.length === 0 ? '<div class="empty">Ingen kvitteringer funnet</div>' : `
    <table>
      <thead><tr><th>Dato</th><th>Leverandør</th><th>Type</th><th>Varer</th><th style="text-align:right">Total</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`}
  </div>

}

function toggleHistDetail(id) {
  if (!ST._histExpanded) ST._histExpanded = new Set();
  if (ST._histExpanded.has(id)) ST._histExpanded.delete(id);
  else ST._histExpanded.add(id);
  renderTab();
}

async function buildPrishistorikk() {
  // Fetch all purchase line items that have a unit_price, joined with receipt date/supplier
  let rows = [];
  try {
    rows = await sbGet('purchase_items?select=item_name,unit,unit_price,purchase_receipts(receipt_date,supplier_name,supplier_type)&unit_price=gt.0&order=item_name');
  } catch(e) {}

  // Group by item_name case-insensitively → array of { date, price, unit, supplier }
  // displayName tracks the most common capitalisation seen for each key
  const grouped = {};
  const displayName = {};
  rows.forEach(r => {
    const raw  = (r.item_name || '').trim();
    if (!raw) return;
    const key  = raw.toLowerCase();
    const date     = r.purchase_receipts?.receipt_date || '';
    const supplier = r.purchase_receipts?.supplier_name || r.purchase_receipts?.supplier_type || '';
    if (!grouped[key]) { grouped[key] = []; displayName[key] = raw; }
    grouped[key].push({ date, price: Number(r.unit_price), unit: r.unit || '', supplier });
  });
  // Sort each item's history by date ascending
  Object.values(grouped).forEach(arr => arr.sort((a,b) => a.date.localeCompare(b.date)));

  const allNames  = Object.keys(grouped).sort((a,b) => displayName[a].localeCompare(displayName[b],'nb'));
  const search    = (ST._priceHistSearch || '').toLowerCase();
  const filtered  = search ? allNames.filter(n => displayName[n].toLowerCase().includes(search)) : allNames;
  const selected  = ST._priceHistItem && grouped[ST._priceHistItem] ? ST._priceHistItem
                  : (filtered[0] || null);

  // Summary list rows (all filtered items, with trend badge)
  const listRows = filtered.map(name => {
    const hist      = grouped[name];
    const first     = hist[0]?.price  || 0;
    const last      = hist[hist.length-1]?.price || 0;
    const diff      = last - first;
    const pct       = first > 0 ? (diff / first * 100) : 0;
    const trend     = diff > 0.001 ? `<span style="color:#A32D2D;font-weight:700">↑ ${fmtN(Math.abs(pct))}%</span>`
                    : diff < -0.001 ? `<span style="color:#3B6D11;font-weight:700">↓ ${fmtN(Math.abs(pct))}%</span>`
                    : `<span style="color:var(--text2)">→ stabil</span>`;
    const isSel     = name === selected;
    return `<tr style="cursor:pointer;background:${isSel?'var(--bg2)':''}" onclick="ST._priceHistItem='${name.replace(/'/g,"\\'")}';renderTab()">
      <td style="font-weight:${isSel?'700':'400'}">${esc(displayName[name])}</td>
      <td style="text-align:right">${fmt(last)}</td>
      <td style="text-align:right">${trend}</td>
      <td style="text-align:right;color:var(--text2)">${hist.length}</td>
    </tr>`;
  }).join('');

  // Detail panel for selected item
  let detailHtml = '';
  if (selected && grouped[selected]) {
    const hist      = grouped[selected];
    const first     = hist[0]?.price  || 0;
    const last      = hist[hist.length-1]?.price || 0;
    const diff      = last - first;
    const pct       = first > 0 ? (diff / first * 100) : 0;
    const diffColor = diff > 0.001 ? '#A32D2D' : diff < -0.001 ? '#3B6D11' : 'var(--text2)';
    const diffArrow = diff > 0.001 ? '↑' : diff < -0.001 ? '↓' : '→';

    ST._chartData = {
      mode: 'prishistorikk',
      labels: hist.map(h => fmtDate(h.date)),
      prices: hist.map(h => h.price),
      itemName: displayName[selected] || selected
    };

    detailHtml = `
    <div class="card" style="margin-top:14px">
      <div class="card-header">
        <span class="card-title">${esc(displayName[selected] || selected)}</span>
        <div class="spacer"></div>
        <span style="font-size:0.82rem;color:var(--text2)">${hist[0]?.unit ? 'per ' + esc(hist[0].unit) : ''}</span>
      </div>
      <div class="stat-grid" style="margin-bottom:16px">
        <div class="stat"><div class="stat-val">${fmt(last)}</div><div class="stat-label">Siste pris</div></div>
        <div class="stat"><div class="stat-val">${fmt(first)}</div><div class="stat-label">Første pris</div></div>
        <div class="stat"><div class="stat-val" style="color:${diffColor}">${diffArrow} ${fmt(Math.abs(diff))}</div><div class="stat-label">Endring (${fmtN(Math.abs(pct))}%)</div></div>
        <div class="stat"><div class="stat-val">${hist.length}</div><div class="stat-label">Registreringer</div></div>
      </div>
      ${hist.length > 1
        ? '<div class="chart-wrap" style="height:200px"><canvas id="chart-pricehistory"></canvas></div>'
        : '<div class="empty" style="margin-bottom:12px">Bare én registrering — trenger minst to for å vise graf</div>'}
      <table style="margin-top:14px">
        <thead><tr>
          <th>Dato</th><th>Leverandør</th>
          <th style="text-align:right">Pris/enhet</th>
          <th style="text-align:right">Endring</th>
        </tr></thead>
        <tbody>
          ${[...hist].reverse().map((h, idx, arr) => {
            const prev  = arr[idx + 1];
            const d     = prev ? h.price - prev.price : null;
            const dp    = (prev && prev.price > 0) ? (d / prev.price * 100) : null;
            const dc    = d === null ? '' : d > 0.001 ? '#A32D2D' : d < -0.001 ? '#3B6D11' : 'var(--text2)';
            const da    = d === null ? '—' : (d > 0.001 ? '↑ ' : d < -0.001 ? '↓ ' : '') + fmt(Math.abs(d||0)) + (dp !== null ? ` (${fmtN(Math.abs(dp))}%)` : '');
            return `<tr>
              <td>${fmtDate(h.date)}</td>
              <td style="color:var(--text2)">${esc(h.supplier || '—')}</td>
              <td style="text-align:right;font-weight:600">${fmt(h.price)}</td>
              <td style="text-align:right;color:${dc}">${da}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  return `
  <div class="card">
    <div class="card-header">
      <span class="card-title">📈 Prishistorikk</span>
      <div class="spacer"></div>
      <span style="font-size:0.82rem;color:var(--text2)">${filtered.length} av ${allNames.length} produkter</span>
    </div>
    <div style="margin-bottom:12px">
      <input type="text" placeholder="🔍 Søk etter vare…" value="${esc(ST._priceHistSearch||'')}"
        oninput="ST._priceHistSearch=this.value;ST._priceHistItem=null;renderTab()"
        style="width:100%;max-width:360px">
    </div>
    ${filtered.length === 0
      ? '<div class="empty">Ingen varer funnet</div>'
      : `<table>
          <thead><tr>
            <th>Vare</th>
            <th style="text-align:right">Siste pris</th>
            <th style="text-align:right">Trend</th>
            <th style="text-align:right">Registr.</th>
          </tr></thead>
          <tbody>${listRows}</tbody>
        </table>`}
  </div>
  ${detailHtml}`;
}

function updateEditReceiptRow(idx, field, val) {
  const row = ST._editReceipt?.rows[idx];
  if (row) row[field] = (field === 'qty' || field === 'unitPrice') ? val.replace(',', '.') : val;
}

function calcEditReceiptRow(idx) {
  const row = ST._editReceipt?.rows[idx];
  if (!row) return;
  const qty = parseFloat(String(row.qty).replace(',', '.')) || 0;
  const up  = parseFloat(String(row.unitPrice).replace(',', '.')) || 0;
  row.total = qty * up;
  const totalEl = document.getElementById('er-total-' + idx);
  if (totalEl) totalEl.value = row.total > 0 ? fmtN(row.total) : '';
}

function calcEditReceiptRowFromTotal(idx, totalVal) {
  const row = ST._editReceipt?.rows[idx];
  if (!row) return;
  const total = parseFloat(String(totalVal).replace(',', '.')) || 0;
  const qty   = parseFloat(String(row.qty).replace(',', '.')) || 0;
  if (qty > 0 && total > 0) {
    const unitPrice = total / qty;
    row.unitPrice = String(unitPrice);
    row.total = total;
    const priceEl = document.getElementById('er-price-' + idx);
    if (priceEl) priceEl.value = fmtN(unitPrice);
  }
}

function addEditReceiptRow() {
  if (!ST._editReceipt) return;
  ST._editReceipt.rows.push({ isNew: true, name: '', qty: '', unit: 'stk', unitPrice: '', total: 0 });
  renderTab();
}

function removeEditReceiptRow(idx) {
  if (!ST._editReceipt) return;
  ST._editReceipt.rows.splice(idx, 1);
  renderTab();
}

function closeReceiptEdit() {
  ST._editReceipt = null;
  renderTab();
}

function showEditReceiptSugg(idx, query) {
  const suggEl = document.getElementById('er-sugg-' + idx);
  if (!suggEl) return;
  const q = (query || '').trim().toLowerCase();
  const all = getPurchaseSuggestions();
  const matches = q.length === 0 ? all.slice(0, 8) :
    [...all.filter(s => s.name.toLowerCase().startsWith(q)),
     ...all.filter(s => !s.name.toLowerCase().startsWith(q) && s.name.toLowerCase().includes(q))
    ].slice(0, 8);
  if (matches.length === 0) { suggEl.style.display = 'none'; return; }
  if (!ST._erSuggCache) ST._erSuggCache = {};
  ST._erSuggCache[idx] = matches;
  suggEl.innerHTML = matches.map((s, si) => `
    <div onmousedown="applyEditReceiptSugg(${idx},${si})"
      style="padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--bg3);font-size:0.88rem;display:flex;justify-content:space-between;align-items:center"
      onmouseenter="this.style.background='var(--bg2)'" onmouseleave="this.style.background=''">
      <span style="font-weight:500">${esc(s.name)}</span>
      <span style="color:var(--text2);font-size:0.8rem">${esc(s.unit)}${s.price > 0 ? ' · ' + fmt(s.price) : ''}</span>
    </div>`).join('');
  suggEl.style.display = 'block';
}

function hideEditReceiptSugg(idx) {
  const d = document.getElementById('er-sugg-' + idx);
  if (d) d.style.display = 'none';
}

function applyEditReceiptSugg(idx, si) {
  const s = (ST._erSuggCache || {})[idx]?.[si];
  if (!s) return;
  updateEditReceiptRow(idx, 'name', s.name);
  updateEditReceiptRow(idx, 'unit', s.unit);
  updateEditReceiptRow(idx, 'unitPrice', String(s.price));
  // Update DOM directly — no full re-render needed
  const nameEl  = document.getElementById('er-name-'  + idx);
  const unitEl  = document.getElementById('er-unit-'  + idx);
  const priceEl = document.getElementById('er-price-' + idx);
  if (nameEl)  nameEl.value  = s.name;
  if (priceEl) priceEl.value = String(s.price).replace('.', ',');
  if (unitEl)  { for (const o of unitEl.options) { if (o.value === s.unit) { o.selected = true; break; } } }
  hideEditReceiptSugg(idx);
  calcEditReceiptRow(idx);
}

async function deleteReceipt(receiptId) {
  if (!confirm('Slette denne kvitteringen og alle varelinjer? Dette kan ikke angres.')) return;
  try {
    await sbDelete(`purchase_items?receipt_id=eq.${receiptId}`);
    await sbDelete(`purchase_receipts?id=eq.${receiptId}`);
    if (ST._histExpanded) ST._histExpanded.delete(receiptId);
    showAlert('Kvittering slettet');
    await renderTab();
  } catch(e) {
    showAlert('Feil: ' + e.message, 'error');
  }
}

async function saveReceiptEdit() {
  const r = ST._editReceipt;
  if (!r) return;
  const errEl = document.getElementById('edit-receipt-error');
  const validRows = r.rows.filter(row => row.name.trim() && (parseFloat(String(row.qty).replace(',','.')) || 0) > 0);
  if (validRows.length === 0) { if (errEl) errEl.textContent = 'Minst én gyldig rad kreves'; return; }

  const newTotal = validRows.reduce((s, row) => {
    return s + (parseFloat(String(row.qty).replace(',','.')) || 0) * (parseFloat(String(row.unitPrice).replace(',','.')) || 0);
  }, 0);

  try {
    // Update receipt header
    await sbPatch(`purchase_receipts?id=eq.${r.id}`, {
      receipt_date: r.receipt_date,
      supplier_name: r.supplier_name,
      total_amount: newTotal
    });

    // Delete all existing items and reinsert (simplest approach for edits)
    await sbDelete(`purchase_items?receipt_id=eq.${r.id}`);

    const ingMap = {};
    ST.ingredients.forEach(i => ingMap[i.name.toLowerCase()] = i);

    const itemsToInsert = [];
    for (const row of validRows) {
      const qty = parseFloat(String(row.qty).replace(',', '.')) || 0;
      const up  = parseFloat(String(row.unitPrice).replace(',', '.')) || 0;
      let ing = ingMap[row.name.toLowerCase().trim()];
      itemsToInsert.push({
        receipt_id: r.id,
        ingredient_id: ing ? ing.id : null,
        item_name: row.name.trim(),
        quantity: qty,
        unit: row.unit,
        unit_price: up,
        total_price: qty * up
      });
    }
    await sbPost('purchase_items', itemsToInsert);

    ST._editReceipt = null;
    ST._pastPurchaseItems = null; // clear cache so new items appear in future suggestions
    ST._histExpanded = new Set();
    showAlert('Kvittering oppdatert!');
    await renderTab();
  } catch(e) {
    if (errEl) errEl.textContent = 'Feil: ' + e.message;
  }
}

function matchPosName(posName) {
  const cpMap = {};
  ST.cafeProducts.forEach(p => cpMap[p.name.toLowerCase()] = p);

  // 1. Exact match
  let p = cpMap[posName.toLowerCase()];
  if (p) return { product: p, via: 'exact' };

  // 2. Strip SMIA prefix
  const stripped = posName.replace(/^SMIA\s+/i, '').trim();
  p = cpMap[stripped.toLowerCase()];
  if (p) return { product: p, via: 'prefix' };

  // 3. Alias lookup
  const alias = ST.aliases.find(a => a.pos_name.toLowerCase() === posName.toLowerCase());
  if (alias) {
    if (alias.action === 'ignore') return { product: null, via: 'ignore' };
    const prod = ST.cafeProducts.find(cp => cp.id === alias.cafe_product_id);
    if (prod) return { product: prod, via: 'alias' };
  }

  return null;
}

function buildSalgPreview() {
  const data = ST._salgPreviewData || [];
  if (!data.length) return '';
  if (!ST._salgPending) ST._salgPending = {};

  const needsMapping = data.filter(r => !r.autoMatch);
  const allResolved  = needsMapping.every(r => ST._salgPending[r.productName] !== undefined);

  const matchLabel = m => {
    if (!m) return '';
    if (m.via === 'exact')  return `<span style="color:#3B6D11;font-size:12px">✓ Eksakt match</span>`;
    if (m.via === 'prefix') return `<span style="color:#3B6D11;font-size:12px">✓ SMIA-prefiks fjernet</span>`;
    if (m.via === 'alias')  return `<span style="color:#3B6D11;font-size:12px">✓ Lagret mapping</span>`;
    if (m.via === 'ignore') return `<span style="color:var(--text2);font-size:12px">— Ignoreres</span>`;
    return '';
  };

  const rows = data.map(r => {
    if (r.autoMatch) {
      const ignored = r.autoMatch.via === 'ignore';
      return `<tr style="background:${ignored?'var(--bg2)':''}">
        <td>${esc(r.productName)}</td>
        <td style="text-align:right">${ignored ? '<span style="color:var(--text2)">—</span>' : r.unitsSold}</td>
        <td>${matchLabel(r.autoMatch)}${r.autoMatch.product ? ` → <strong>${esc(r.autoMatch.product.name)}</strong>` : ''}</td>
      </tr>`;
    }
    // Needs manual mapping
    const pending = ST._salgPending[r.productName];
    const husk    = ST._salgPendingHusk?.[r.productName] || false;
    return `<tr style="background:#fffbf0">
      <td>${esc(r.productName)}<br><span style="font-size:0.75rem;color:var(--text2)">Ikke matchet automatisk</span></td>
      <td style="text-align:right">${r.unitsSold}</td>
      <td>
        <select style="font-size:0.82rem;margin-bottom:4px" onchange="setSalgPending('${r.productName.replace(/'/g,"\\'")}',this.value)">
          <option value="">— Velg kobling —</option>
          <option value="__ignore__" ${pending==='__ignore__'?'selected':''}>🚫 Ignorer (ikke Smia-produkt)</option>
          ${ST.cafeProducts.map(cp => `<option value="${cp.id}" ${pending==cp.id?'selected':''}>${esc(cp.name)}</option>`).join('')}
        </select>
        ${pending && pending !== '__ignore__' ? `
        <label style="font-size:0.78rem;display:flex;align-items:center;gap:4px;cursor:pointer">
          <input type="checkbox" ${husk?'checked':''} onchange="setSalgPendingHusk('${r.productName.replace(/'/g,"\\'")}',this.checked)">
          Husk denne mappingen for fremtidige importer
        </label>` : ''}
      </td>
    </tr>`;
  }).join('');

  const canImport = needsMapping.length === 0 || allResolved;

  return `
  <div style="margin-top:1rem">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
      <span class="card-title">Forhåndsvisning (${data.length} rader)</span>
      ${needsMapping.length > 0 ? `<span class="badge" style="background:#fff3cd;color:#856404">⚠️ ${needsMapping.length} trenger kobling</span>` : `<span class="badge" style="background:#d4edda;color:#155724">✓ Alle matchet</span>`}
      <div class="spacer"></div>
      <span style="font-size:0.85rem;color:var(--text2);display:flex;align-items:center;gap:6px;flex-wrap:wrap">Dato:
        ${mkDatePicker('salg-date2', ST._salgDate||today(), "ST._salgDate=this.value;ST._salgDateFromFile=false;document.getElementById('salg-date-preview2').textContent=fmtDate(this.value);", 'width:150px;margin-left:4px')}
        <strong id="salg-date-preview2">${fmtDate(ST._salgDate||today())}</strong>
        ${ST._salgDateFromFile
          ? `<span style="background:#e8f5e9;color:#2e7d32;border:1px solid #b2dfbc;border-radius:5px;padding:2px 7px;font-size:0.75rem;font-weight:600">📂 Lest fra filnavn</span>`
          : `<span style="background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:5px;padding:2px 7px;font-size:0.75rem;font-weight:600">⚠️ Sjekk dato</span>`}
