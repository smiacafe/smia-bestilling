<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#ffffff;--bg2:#f5f4f0;--bg3:#eeecea;--text:#1a1a18;--text2:#6b6a66;--text3:#a09f9b;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.07); }
  @media (prefers-color-scheme:dark) { :root { --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe9;--text2:#9e9d99;--text3:#6b6a66;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18); } }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg2); color:var(--text); font-size:15px; line-height:1.5; min-height:100vh; }
  #app { max-width:860px; margin:0 auto; padding:1rem; }
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .login-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; width:340px; max-width:100%; box-shadow:var(--shadow); }
  .login-logo { height:60px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
  .login-logo img { height:60px; width:auto; }
  .login-card h2 { font-size:17px; font-weight:600; text-align:center; margin-bottom:4px; }
  .login-card p { font-size:13px; color:var(--text3); text-align:center; margin-bottom:1.5rem; }
  .login-card input { margin-bottom:10px; }
  .login-error { font-size:13px; color:#A32D2D; background:#FCEBEB; border:1px solid #F09595; border-radius:var(--radius-sm); padding:8px 12px; margin-bottom:10px; text-align:center; }
  header { display:flex; align-items:center; gap:12px; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
  header h1 { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
  header p { font-size:12px; color:var(--text3); }
  .logo { height:44px; display:flex; align-items:center; flex-shrink:0; }
  .logo img { height:44px; width:auto; }
  nav { display:flex; gap:4px; margin-bottom:1.5rem; flex-wrap:wrap; background:var(--bg3); border-radius:var(--radius); padding:4px; }
  nav button { flex:1; min-width:80px; padding:8px 12px; border-radius:var(--radius-sm); border:none; background:transparent; cursor:pointer; font-size:13px; font-weight:500; color:var(--text2); transition:all 0.15s; }
  nav button.active { background:var(--bg); color:var(--text); box-shadow:var(--shadow); }
  nav button:hover:not(.active) { color:var(--text); }
  .badge-nav { display:inline-block; background:#EF9F27; color:#412402; font-size:10px; font-weight:700; padding:1px 5px; border-radius:10px; margin-left:4px; vertical-align:middle; }
  .card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; margin-bottom:1rem; box-shadow:var(--shadow); }
  .card-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .card-title { font-size:14px; font-weight:600; }
  .spacer { flex:1; }
  .section-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px; }
  .badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; }
  .badge-draft { background:#F1EFE8; color:#5F5E5A; }
  .badge-pending { background:#FAEEDA; color:#854F0B; }
  .badge-accepted { background:#EAF3DE; color:#3B6D11; }
  .badge-delivered { background:#E6F1FB; color:#185FA5; }
  .btn { padding:8px 14px; border-radius:var(--radius-sm); border:1px solid var(--border2); background:var(--bg); cursor:pointer; font-size:13px; font-weight:500; color:var(--text); transition:all 0.15s; white-space:nowrap; }
  .btn:hover { background:var(--bg2); }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--text); color:var(--bg); border-color:transparent; }
  .btn-primary:hover { opacity:0.82; background:var(--text); }
  .btn-sm { padding:5px 10px; font-size:12px; }
  .btn-danger { color:#A32D2D; border-color:#F09595; }
  .btn-danger:hover { background:#FCEBEB; }
  .btn-blue { color:#185FA5; border-color:#85B7EB; }
  .btn-blue:hover { background:#E6F1FB; }
  .btn-green { color:#3B6D11; border-color:#97C459; }
  .btn-green:hover { background:#EAF3DE; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-weight:600; font-size:11px; color:var(--text2); padding:6px 8px; border-bottom:1px solid var(--border); }
  td { padding:9px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
  tr:last-child td { border-bottom:none; }
  input, select, textarea { background:var(--bg); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:8px 10px; font-size:14px; color:var(--text); width:100%; font-family:inherit; outline:none; }
  input:focus, select:focus, textarea:focus { border-color:#378ADD; box-shadow:0 0 0 3px rgba(55,138,221,0.12); }
  textarea { resize:vertical; min-height:64px; }
  .form-row { margin-bottom:12px; }
  .form-row label { font-size:12px; font-weight:600; color:var(--text2); display:block; margin-bottom:5px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .empty { text-align:center; color:var(--text3); font-size:13px; padding:2.5rem 0; }
  .alert { font-size:13px; padding:10px 14px; border-radius:var(--radius-sm); margin-bottom:1rem; font-weight:500; }
  .alert-success { background:#EAF3DE; color:#3B6D11; border:1px solid #C0DD97; }
  .alert-error { background:#FCEBEB; color:#A32D2D; border:1px solid #F09595; }
  .qty-ctrl { display:flex; align-items:center; gap:6px; }
  .qty-ctrl button { width:28px; height:28px; border-radius:50%; border:1px solid var(--border2); background:var(--bg2); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; color:var(--text); flex-shrink:0; }
  .qty-ctrl button:hover { background:var(--bg3); }
  .qty-ctrl input[type=number] { width:72px; text-align:center; padding:5px 6px; font-size:14px; font-weight:600; }
  .order-note { font-size:12px; color:var(--text2); margin-top:8px; font-style:italic; }
  .item-note { font-size:11px; color:var(--text3); font-style:italic; }
  .inv-line { display:flex; justify-content:space-between; padding:5px 0; font-size:13px; color:var(--text2); }
  .inv-total { display:flex; justify-content:space-between; padding:10px 0; font-size:16px; font-weight:700; border-top:2px solid var(--border2); margin-top:6px; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:flex-start; justify-content:center; padding:40px 12px; z-index:100; overflow-y:auto; }
  .modal { background:var(--bg); border-radius:var(--radius); padding:1.5rem; width:600px; max-width:100%; border:1px solid var(--border2); box-shadow:0 8px 32px rgba(0,0,0,0.18); }
  .modal h3 { font-size:16px; font-weight:700; margin-bottom:1rem; }

  .pickup-check.done { background:#639922; border-color:#639922; }
  .pickup-check.done::after { content:""; display:block; width:8px; height:13px; border:3px solid #fff; border-top:none; border-left:none; transform:rotate(42deg) translate(-1px,-2px); }
  .pickup-name { font-size:16px; font-weight:500; flex:1; }
  .pickup-name.done { text-decoration:line-through; color:var(--text3); }
  .pickup-qty { font-size:14px; color:var(--text2); font-weight:600; white-space:nowrap; }
  .pickup-qty.done { color:var(--text3); text-decoration:line-through; }
  .pickup-day { font-size:12px; color:var(--text3); font-style:italic; }

  .pickup-done-banner { background:#EAF3DE; color:#3B6D11; border:1px solid #C0DD97; border-radius:var(--radius-sm); padding:14px; text-align:center; font-weight:600; font-size:15px; margin-bottom:12px; }

  .prod-note-text { font-size:11px; color:var(--text3); font-style:italic; }

  .cafe-check-pill.waiting { background:#F1EFE8; color:#5F5E5A; }
  .admin-badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:10px; background:#FAEEDA; color:#854F0B; font-weight:600; margin-left:4px; }
  /* Product order row in modal */

  .product-order-row:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .split-row { display:flex; align-items:center; gap:6px; margin-top:6px; }
  .split-row input[type=text] { flex:1; font-size:12px; padding:5px 8px; }
  .split-row input[type=number] { width:80px; font-size:12px; padding:5px 8px; }
  .split-row button { width:24px; height:24px; border-radius:50%; border:1px solid var(--border2); background:var(--bg2); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; color:var(--text3); flex-shrink:0; }
  .split-add-btn { font-size:12px; color:var(--text3); background:transparent; border:none; cursor:pointer; padding:4px 0; text-decoration:underline; }
  /* Drag handle */
  .prod-row { display:flex; align-items:center; gap:8px; padding:10px 8px; border-bottom:1px solid var(--border); transition:background 0.1s; }
  .prod-row:last-child { border-bottom:none; }

  .drag-handle:active { cursor:grabbing; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }

async function sha256(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}

async function sbFetch(method,table,body,params){
  const url=SURL+"/rest/v1/"+table+(params?"?"+params:"");
  const res=await fetch(url,{method,headers:{"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json","Prefer":"return=representation"},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):null;
}

function fmtQty(n){const v=parseFloat(parseFloat(n).toFixed(4));return isNaN(v)?0:v;}
const getProd=id=>S.products.find(p=>p.id===id);

// An order item: {pid, qty, note, splits:[{day,qty}]}
// If splits exist and non-empty, the item is split across days.
// Total qty = sum of splits (or item.qty if no splits).
// Checklist keys: "pid" for non-split, "pid_0","pid_1",... for splits.

function itemCheckKeys(item){
  if(item.splits&&item.splits.length>0){
    return item.splits.map((_,idx)=>item.pid+"_"+idx);
  }
  return [String(item.pid)];
}

function orderTotal(o){
  const rej=o.rejected_items||{};
  return (o.items||[]).reduce((s,i)=>{
    const p=getProd(i.pid);if(!p)return s;
    if(i.splits&&i.splits.length>0){
      return s+i.splits.reduce((ss,sp,idx)=>{
        const key=i.pid+"_"+idx;
        return rej[key]?ss:ss+p.price*Number(sp.qty);
      },0);
    }
    const key=String(i.pid);
    return rej[key]?s:s+p.price*Number(i.qty);
  },0);
}

function weekStr(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const y=new Date(d.getFullYear(),0,1);
  const w=Math.ceil((((d-y)/86400000)+1)/7);
  return d.getFullYear()+"-W"+String(w).padStart(2,"0");
}
function weekLabel(s){if(!s)return "";const[y,w]=s.split("-W");return "Uke "+w+", "+y;}
function statusLabel(s){return {draft:"utkast",pending:"venter",accepted:"godkjent",delivered:"levert"}[s]||s;}

async function loadAll(){
  if(!isAuth()){renderLogin();return;}

  try{
    const[products,orders]=await Promise.all([db.getProducts(),db.getOrders()]);
    S.products=products||[];
    S.orders=(orders||[]).map(o=>({
      ...o,
      items:parseJSON(o.items,[]),
      checklist:normChecklist(parseJSON(o.checklist,{})),

  }
}

function parseJSON(val,fallback){
  if(Array.isArray(val)||val&&typeof val==="object")return val;
  try{return JSON.parse(val);}catch(e){return fallback;}
}
function normChecklist(cl){
  if(!cl)return {};
  if(Array.isArray(cl)){const obj={};cl.forEach(function(k){obj[String(k)]="";});return obj;}
  if(typeof cl==="object")return cl;
  return {};
}

function hasUnchecked(o){
  const cl=o.checklist||{};
  return (o.items||[]).some(function(i){
    return itemCheckKeys(i).some(function(k){return !(k in cl);});
  });
}

function allCheckKeys(o){
  const keys=[];
  (o.items||[]).forEach(function(i){itemCheckKeys(i).forEach(function(k){keys.push(k);});});
  return keys;
}

function logout(){sessionStorage.removeItem(SES);sessionStorage.removeItem(SES_ADMIN);renderLogin();}

function buildOrders(){
  let html='<div class="row" style="margin-bottom:1rem">';
  html+='<p class="section-label" style="margin:0">Ukentlige bestillinger</p>';
  html+='<div class="spacer"></div>';
  html+='<button class="btn btn-primary" onclick="openNew()">+ Ny bestilling</button></div>';
  if(S.orders.length===0)return html+'<div class="empty">Ingen bestillinger ennå.</div>';
  S.orders.forEach(function(o){
    const total=orderTotal(o);
    const cl=o.checklist||[];
    const isAcc=o.status==="accepted"||o.status==="delivered";
    html+='<div class="card">';
    html+='<div class="card-header">';
    html+='<span class="card-title">'+weekLabel(o.week)+'</span>';
    html+='<span class="badge badge-'+o.status+'">'+statusLabel(o.status)+'</span>';
    html+='<div class="spacer"></div>';
    if(isAdmin())html+='<span style="font-size:13px;color:var(--text2);font-weight:600">'+fmt(total)+'</span>';
    html+='<button class="btn btn-sm no-print" onclick="printOrder('+o.id+')">&#x1F5A8; Skriv ut</button>';
    html+='</div>';
    const rej=o.rejected_items||{};
    html+='<table><thead><tr><th>Produkt</th><th>Dag</th><th>Ant.</th><th>Notat</th>';
    if(isAdmin())html+='<th style="text-align:right">Delsum</th><th></th>';
    if(isAcc)html+='<th>Status</th>';
    html+='</tr></thead><tbody>';
    (o.items||[]).forEach(function(i){
      const p=getProd(i.pid);if(!p)return;
      if(i.splits&&i.splits.length>0){
        i.splits.forEach(function(sp,idx){
          const key=i.pid+"_"+idx;
          const picked=key in cl;
          const rejected=!!rej[key];
          html+='<tr'+(rejected?' class="rejected-row"':'')+' >';
          html+='<td style="font-weight:500">'+(idx===0?p.name:'<span style="color:var(--text3)">↳</span>')+'</td>';
          html+='<td class="item-note">'+sp.day+'</td>';
          html+='<td style="white-space:nowrap">'+fmtQty(sp.qty)+'&nbsp;'+p.unit+'</td>';
          html+='<td class="item-note">'+(idx===0&&i.note?i.note:'')+'</td>';
          if(isAdmin())html+='<td style="text-align:right">'+(rejected?'<span style="text-decoration:line-through">'+fmt(p.price*Number(sp.qty))+'</span>':fmt(p.price*Number(sp.qty)))+'</td>'
            +'<td><button class="reject-btn'+(rejected?' undo':'')+'" onclick="toggleRejectItem('+o.id+',\''+key+'\')">'+(rejected?'↩ Gjeninnfør':'✕ Stryk')+'</button></td>';
          if(isAcc){
            const pickDate=picked&&cl[key]?new Date(cl[key]).toLocaleDateString("nb-NO",{day:"numeric",month:"short"}):"";
            const iNoteS=(o.item_notes||{})[key]||"";
            html+='<td><span class="cafe-check-pill '+(picked?"picked":"waiting")+'">'+(picked?"&#x2713; Hentet":"Venter")+'</span>'+(pickDate?' <span style="font-size:10px;color:var(--text3)">'+pickDate+'</span>':'')+(iNoteS?'<div style="font-size:10px;color:var(--text3);font-style:italic;margin-top:2px">'+iNoteS+'</div>':'')+'</td>';
          }
          html+='</tr>';
        });
      } else {
        const key=String(i.pid);
        const picked=key in cl;
        const rejected=!!rej[key];
        html+='<tr'+(rejected?' class="rejected-row"':'')+' >';
        html+='<td style="font-weight:500">'+p.name+'</td>';
        html+='<td></td>';
        html+='<td style="white-space:nowrap">'+fmtQty(i.qty)+'&nbsp;'+p.unit+'</td>';
        html+='<td class="item-note">'+(i.note||'')+'</td>';
        if(isAdmin())html+='<td style="text-align:right">'+(rejected?'<span style="text-decoration:line-through">'+fmt(p.price*Number(i.qty))+'</span>':fmt(p.price*Number(i.qty)))+'</td>'
          +'<td><button class="reject-btn'+(rejected?' undo':'')+'" onclick="toggleRejectItem('+o.id+',\''+key+'\')">'+(rejected?'↩ Gjeninnfør':'✕ Stryk')+'</button></td>';
        if(isAcc){
          const pickDate=picked&&cl[key]?new Date(cl[key]).toLocaleDateString("nb-NO",{day:"numeric",month:"short"}):"";
          const iNoteR=(o.item_notes||{})[key]||"";
          html+='<td><span class="cafe-check-pill '+(picked?"picked":"waiting")+'">'+(picked?"&#x2713; Hentet":"Venter")+'</span>'+(pickDate?' <span style="font-size:10px;color:var(--text3)">'+pickDate+'</span>':'')+(iNoteR?'<div style="font-size:10px;color:var(--text3);font-style:italic;margin-top:2px">'+iNoteR+'</div>':'')+'</td>';
        }
        html+='</tr>';
      }
    });
    html+='</tbody></table>';
    if(o.note)html+='<p class="order-note">Notat: '+o.note+'</p>';
    if(o.canteen_note)html+='<p class="order-note" style="color:var(--text2)">&#x1F4CB; Kantinens notat: '+o.canteen_note+'</p>';
    html+='<div class="row" style="margin-top:12px;gap:6px">';
    if(o.status==="draft")html+='<button class="btn btn-sm btn-primary" onclick="submitOrder('+o.id+')">Send til kantinen</button><button class="btn btn-sm" onclick="openEdit('+o.id+')">Rediger</button>';
    if(o.status==="pending")html+='<span style="font-size:12px;color:var(--text3)">Venter på kantinen</span><button class="btn btn-sm" onclick="openEdit('+o.id+')">Rediger</button>';
    if(o.status==="accepted")html+='<span style="font-size:12px;color:var(--text3)">Godkjent av kantinen</span>'+(isAdmin()?'<button class="btn btn-sm" onclick="requireAdmin(function(){openEdit('+o.id+')})">Rediger</button>':"");
    if(o.status==="delivered")html+='<span style="font-size:12px;color:var(--text3)">&#x2713; Levert</span>'+(isAdmin()?'<button class="btn btn-sm" onclick="requireAdmin(function(){openEdit('+o.id+')})">Rediger</button>':"");
    html+='<div class="spacer"></div>';
    if(o.status==="draft"||o.status==="pending")html+='<button class="btn btn-sm btn-danger" onclick="deleteOrder('+o.id+')">Slett</button>';

    html+='</div></div>';
  });
  return html;
}

      (o.items||[]).forEach(function(i){

          i.splits.forEach(function(sp,idx){

            const isDone=key in cl;

              '<div class="pickup-day">'+sp.day+(i.note?' \u2014 '+i.note:'')+'</div></div>'+
              '<span class="pickup-qty'+(isDone?" done":"")+'">'+fmtQty(sp.qty)+'&nbsp;'+p.unit+'</span>'+
            '</div>';
            html+='<input type="text" placeholder="Notat for denne varen..." value="'+inSplit+'" style="font-size:11px;padding:4px 8px;margin-top:6px;width:100%;color:var(--text2)" onchange="saveItemNote('+o.id+',\''+key+'\',this.value)">';
            html+='</div>';

            '<div class="pickup-check'+(isDone?" done":"")+'"></div>'+
            '<div style="flex:1"><div class="pickup-name'+(isDone?" done":"")+'">'+p.name+'</div>'+
            (i.note?'<div class="pickup-day">'+i.note+'</div>':'')+
            '</div>'+
            '<span class="pickup-qty'+(isDone?" done":"")+'">'+fmtQty(i.qty)+'&nbsp;'+p.unit+'</span>'+
          '</div>';
          html+='<input type="text" placeholder="Notat for denne varen..." value="'+inNote+'" style="font-size:11px;padding:4px 8px;margin-top:6px;width:100%;color:var(--text2)" onchange="saveItemNote('+o.id+',\''+key+'\',this.value)">';
          html+='</div>';
        }
      });
      if(o.note)html+='<p class="order-note">Notat: '+o.note+'</p>';
      html+='<div class="row" style="margin-top:12px">';
      if(cl.length>0)html+='<button class="btn btn-sm" onclick="resetPickup('+o.id+')" style="color:var(--text3)">Nullstill sjekkliste</button>';
      html+='<span style="font-size:12px;color:var(--text3)">Hak av alle varer for å bekrefte levering</span>';
      html+='</div></div>';
    });
  }
  if(pending.length===0&&active.length===0)html+='<div class="empty">Ingen ventende eller aktive bestillinger.<br><small>Trykk Oppdater hvis du venter på noe.</small></div>';
  if(history.length>0){
    html+='<p class="section-label" style="margin-top:1.5rem">Historikk</p>';
    html+='<div class="card"><table><thead><tr><th>Bestilling</th><th>Uke</th><th></th></tr></thead><tbody>';
    history.slice(0,20).forEach(function(o){
      html+='<tr><td>#'+o.id+'</td><td>'+weekLabel(o.week)+'</td><td style="text-align:right"><button class="btn btn-sm" onclick="viewHistoryOrder('+o.id+')">Vis</button></td></tr>';
    });
    html+='</tbody></table></div>';
  }
  return html;
}

function buildInvoice(){
  const now=new Date();
  const ym=S.invoiceMonth||(now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const[y,m]=ym.split("-").map(Number);
  const mo=S.orders.filter(function(o){
    const[wy,wn]=o.week.split("-W").map(Number);
    const d=new Date(wy,0,1+(wn-1)*7);
    return d.getFullYear()===y&&d.getMonth()===m-1&&(o.status==="delivered"||o.status==="accepted");
  });
  const total=mo.reduce(function(s,o){return s+orderTotal(o);},0);
  const mName=new Date(y,m-1,1).toLocaleString("nb",{month:"long",year:"numeric"});
  const ai={};
  mo.forEach(function(o){
    const rej=o.rejected_items||{};
    (o.items||[]).forEach(function(i){
      const p=getProd(i.pid);if(!p)return;
      if(i.splits&&i.splits.length>0){
        i.splits.forEach(function(sp,idx){
          if(rej[i.pid+"_"+idx])return;
          if(!ai[i.pid])ai[i.pid]={name:p.name,unit:p.unit,price:p.price,qty:0};
          ai[i.pid].qty+=Number(sp.qty);
        });
      } else {
        if(rej[String(i.pid)])return;
        if(!ai[i.pid])ai[i.pid]={name:p.name,unit:p.unit,price:p.price,qty:0};
        ai[i.pid].qty+=Number(i.qty);
      }
    });
  });
  let html='<div class="row" style="margin-bottom:1rem"><p class="section-label" style="margin:0">M\xe5nedlig faktura</p><div class="spacer"></div>';
  html+='<input type="month" value="'+ym+'" onchange="S.invoiceMonth=this.value;render()" style="width:auto;font-size:13px"></div>';
  if(mo.length>0){
    html+='<div class="stat-grid"><div class="stat"><div class="stat-val">'+mo.length+'</div><div class="stat-label">Bestillinger</div></div>';
    html+='<div class="stat"><div class="stat-val">'+mo.filter(function(o){return o.status==="delivered";}).length+'</div><div class="stat-label">Levert</div></div>';
    html+='<div class="stat"><div class="stat-val">'+fmt(total)+'</div><div class="stat-label">Totalt \xe5 betale</div></div></div>';
  }
  html+='<div class="card">';
  html+='<div style="border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px">';
  html+='<div class="row"><span style="font-size:20px;font-weight:700">Faktura grunnlag</span><div class="spacer"></div><span style="color:var(--text2);font-size:13px">'+mName+'</span></div>';
  html+='<p style="font-size:12px;color:var(--text3);margin-top:4px">Bestillinger: '+( mo.map(function(o){return "#"+o.id;}).join(", ")||"ingen")+'</p></div>';
  if(mo.length===0){html+='<div class="empty">Ingen leverte eller godkjente bestillinger denne m\xe5neden.</div>';}
  else{
    html+='<p class="section-label">Oppsummering per produkt</p>';
    Object.values(ai).forEach(function(item){
      html+='<div class="inv-line"><span>'+item.name+' &times; '+fmtQty(item.qty)+'&nbsp;'+item.unit+'</span><span>'+fmt(item.price*item.qty)+'</span></div>';
    });
    html+='<div class="inv-total"><span>Totalt \xe5 betale (m/mva 15%)</span><span>'+fmt(total)+'</span></div>';
    html+='<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)"><p class="section-label">Fordeling per bestilling</p>';
    mo.forEach(function(o){
      html+='<p style="font-size:12px;font-weight:600;color:var(--text2);margin:10px 0 4px">Bestilling #'+o.id+' \u2014 '+weekLabel(o.week)+'</p>';
      (o.items||[]).forEach(function(i){
        const p=getProd(i.pid);if(!p)return;
        html+='<div class="inv-line" style="font-size:12px"><span>'+p.name+' &times; '+fmtQty(i.qty)+(i.note?" ("+i.note+")":'')+'</span><span>'+fmt(p.price*Number(i.qty))+'</span></div>';
      });
    });
    html+='</div>';
    html+='<div style="margin-top:1rem"><button class="btn btn-primary" onclick="printInvoice(\''+ym+'\')">&#x1F5A8; Skriv ut / Eksporter faktura</button></div>';
  }
  html+='</div>';
  return html;
}

function buildInsights(){
  const delivered=S.orders.filter(function(o){return o.status==="delivered"||o.status==="accepted";});
  if(delivered.length===0)return '<div class="empty" style="padding:3rem 0">Ingen leverte bestillinger å vise ennå.</div>';
  const byProduct={};
  delivered.forEach(function(o){(o.items||[]).forEach(function(i){
    const p=getProd(i.pid);if(!p)return;
    if(!byProduct[i.pid])byProduct[i.pid]={name:p.name,qty:0,cost:0,unit:p.unit};
    byProduct[i.pid].qty+=Number(i.qty);
    byProduct[i.pid].cost+=Number(i.qty)*p.price;
  });});
  const products=Object.values(byProduct).sort(function(a,b){return b.cost-a.cost;});
  const totalCost=products.reduce(function(s,p){return s+p.cost;},0);
  const byMonth={};
  delivered.forEach(function(o){
    const[wy,wn]=o.week.split("-W").map(Number);
    const d=new Date(wy,0,1+(wn-1)*7);
    const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    if(!byMonth[key])byMonth[key]=0;
    byMonth[key]+=orderTotal(o);
  });
  const months=Object.keys(byMonth).sort();
  const monthLabels=months.map(function(m){const[y,mo]=m.split("-");return new Date(y,mo-1,1).toLocaleString("nb",{month:"short",year:"2-digit"});});
  const monthValues=months.map(function(m){return byMonth[m];});
  const maxMonthVal=Math.max.apply(null,monthValues.concat([1]));
  const top5=products.slice(0,5);
  const other=products.slice(5).reduce(function(s,p){return s+p.cost;},0);
  const pieData=other>0?top5.concat([{name:"Andre",cost:other}]):top5;
  const pieColors=["#1D9E75","#BA7517","#185FA5","#D85A30","#7F77DD","#888780"];
  let angle=-Math.PI/2;
  const cx=110,cy=110,r=90;
  let slices="",legend="";
  pieData.forEach(function(d,i){
    const pct=d.cost/totalCost;
    const a=pct*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=a;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    const large=a>Math.PI?1:0;
    slices+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+large+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+pieColors[i]+'" stroke="white" stroke-width="2"/>';
    legend+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:12px"><div style="width:12px;height:12px;border-radius:3px;background:'+pieColors[i]+';flex-shrink:0"></div><span style="flex:1;color:var(--text2)">'+d.name+'</span><span style="font-weight:600">'+Math.round(pct*100)+'%</span></div>';
  });
  const barH=120;
  const barW=Math.max(28,Math.min(48,Math.floor(320/Math.max(months.length,1))-6));
  let bars="";
  monthValues.forEach(function(v,i){
    const h=Math.round((v/maxMonthVal)*barH);
    bars+='<div style="display:flex;flex-direction:column;align-items:center;gap:4px">';
    bars+='<span style="font-size:10px;color:var(--text2);font-weight:600">'+(v>=1000?(v/1000).toFixed(1)+"k":Math.round(v))+'</span>';
    bars+='<div style="width:'+barW+'px;height:'+h+'px;background:#1D9E75;border-radius:3px 3px 0 0;min-height:2px"></div>';
    bars+='<span style="font-size:10px;color:var(--text3);text-align:center;max-width:'+(barW+8)+'px;word-break:break-word">'+monthLabels[i]+'</span></div>';
  });
  let html='<p class="section-label">Oversikt \u2014 alle leverte bestillinger</p>';
  html+='<div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem">';
  html+='<div class="stat"><div class="stat-val">'+delivered.length+'</div><div class="stat-label">Bestillinger</div></div>';
  html+='<div class="stat"><div class="stat-val">'+fmt(totalCost)+'</div><div class="stat-label">Totalt brukt</div></div>';
  html+='<div class="stat"><div class="stat-val">'+fmt(totalCost/Math.max(delivered.length,1))+'</div><div class="stat-label">Snitt per uke</div></div></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">';
  html+='<div class="card"><p class="section-label">Kostnad per produkt</p><div style="display:flex;align-items:center;gap:12px"><svg width="220" height="220" viewBox="0 0 220 220">'+slices+'</svg><div style="flex:1">'+legend+'</div></div></div>';
  html+='<div class="card"><p class="section-label">M\xe5nedlig forbruk</p><div style="display:flex;align-items:flex-end;gap:6px;height:'+(barH+60)+'px;padding-top:24px;overflow-x:auto">'+bars+'</div></div>';
  html+='</div>';
  html+='<div class="card"><p class="section-label">Topp produkter</p><table><thead><tr><th>#</th><th>Produkt</th><th style="text-align:right">Totalt antall</th><th style="text-align:right">Totalt kostnad</th><th style="text-align:right">Andel</th></tr></thead><tbody>';
  products.forEach(function(p,i){
    html+='<tr><td style="color:var(--text3);font-size:12px">'+(i+1)+'</td><td style="font-weight:500">'+p.name+'</td><td style="text-align:right">'+fmtQty(p.qty)+'&nbsp;'+p.unit+'</td><td style="text-align:right;font-weight:600">'+fmt(p.cost)+'</td>';
    html+='<td style="text-align:right"><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><div style="width:60px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="width:'+Math.round((p.cost/totalCost)*100)+'%;height:100%;background:#1D9E75;border-radius:3px"></div></div><span style="font-size:12px;color:var(--text2);min-width:32px;text-align:right">'+Math.round((p.cost/totalCost)*100)+'%</span></div></td></tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

    });
    html+='<div class="modal-footer">';
    html+='<button class="btn btn-primary" id="save-btn" onclick="saveOrder(false)">'+(isEdit?"Lagre og send på nytt":"Send til kantinen")+'</button>';
    html+='<button class="btn" onclick="saveOrder(true)">Lagre som utkast</button>';
    html+='<div class="spacer"></div>';
    html+='<button class="btn" onclick="closeModal()">Avbryt</button>';
    html+='</div></div></div>';
    return html;
  }
  if(S.modal==="product"){
    const p=S.editProduct;
    let html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">';
    html+='<h3>'+(p.id?"Rediger produkt":"Legg til produkt")+'</h3>';
    html+='<div class="form-row"><label>Produktnavn</label><input type="text" id="p-name" value="'+p.name+'"></div>';
    if(isAdmin()){
      html+='<div class="grid2"><div class="form-row"><label>Enhet (f.eks. kg, liter, boks)</label><input type="text" id="p-unit" value="'+p.unit+'"></div>';
      html+='<div class="form-row"><label>Pris per enhet (kr)</label><input type="number" id="p-price" value="'+p.price+'" min="0" step="0.01"></div></div>';
    } else {
      html+='<div class="form-row"><label>Enhet (f.eks. kg, liter, boks)</label><input type="text" id="p-unit" value="'+p.unit+'"></div>';
    }
    html+='<div class="form-row"><label>Internt notat (valgfritt)</label><input type="text" id="p-note" value="'+(p.note||'')+'" placeholder="f.eks. kjølt levering"></div>';
    html+='<div class="modal-footer"><button class="btn btn-primary" onclick="saveProd()">Lagre produkt</button><div class="spacer"></div>';
    if(p.id)html+='<button class="btn btn-danger btn-sm" onclick="requireAdmin(function(){deleteProd('+p.id+')})">Slett</button>';
    html+='<button class="btn" onclick="closeModal()">Avbryt</button></div></div></div>';
    return html;
  }
  if(S.modal==="adminPrompt"){
    return '<div class="modal-bg"><div class="modal" style="width:360px"><h3>Admin-bekreftelse</h3><p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Skriv inn admin-passordet for å fortsette.</p><div class="form-row"><input type="password" id="admin-pw" placeholder="Admin-passord" onkeydown="if(event.key===\'Enter\')checkAdmin()"></div><div id="admin-err" style="font-size:12px;color:#A32D2D;margin-bottom:8px;display:none">Feil passord.</div><div class="modal-footer"><button class="btn btn-primary" onclick="checkAdmin()">Bekreft</button><div class="spacer"></div><button class="btn" onclick="S.adminPending=null;closeModal()">Avbryt</button></div></div></div>';
  }
  if(S.modal==="historyOrder"){
    const o=S.historyOrder;if(!o)return "";
    let html='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">';
    html+='<h3>Bestilling #'+o.id+' \u2014 '+weekLabel(o.week)+'</h3>';
    html+='<span class="badge badge-delivered" style="margin-bottom:12px;display:inline-block">levert</span>';
    html+='<table style="margin-top:8px"><thead><tr><th>Produkt</th><th>Dag</th><th>Ant.</th><th>Notat</th></tr></thead><tbody>';
    (o.items||[]).forEach(function(i){
      const p=getProd(i.pid);if(!p)return;
      if(i.splits&&i.splits.length>0){
        i.splits.forEach(function(sp,idx){
          html+='<tr><td style="font-weight:500">'+(idx===0?p.name:'↳')+'</td><td class="item-note">'+sp.day+'</td><td>'+fmtQty(sp.qty)+'&nbsp;'+p.unit+'</td><td class="item-note">'+(idx===0&&i.note?i.note:'')+'</td></tr>';
        });
      } else {
        html+='<tr><td style="font-weight:500">'+p.name+'</td><td></td><td>'+fmtQty(i.qty)+'&nbsp;'+p.unit+'</td><td class="item-note">'+(i.note||'')+'</td></tr>';
      }
    });
    html+='</tbody></table>';
    if(o.note)html+='<p class="order-note" style="margin-top:10px">Notat: '+o.note+'</p>';
    html+='<div class="modal-footer"><button class="btn btn-primary" onclick="printOrder('+o.id+')">&#x1F5A8; Skriv ut</button><div class="spacer"></div><button class="btn" onclick="closeModal()">Lukk</button></div>';
    html+='</div></div>';
    return html;
  }
  return "";
}

function buildSplitRow(pid,idx,day,qty,unit){
  return '<div class="split-row" id="splitrow-'+pid+'-'+idx+'">'
    +'<input type="text" id="split-day-'+pid+'-'+idx+'" value="'+day+'" placeholder="Dag (f.eks. Mandag)" style="flex:1;font-size:12px;padding:5px 8px">'
    +'<input type="number" id="split-qty-'+pid+'-'+idx+'" value="'+qty+'" min="0" step="0.5" style="width:80px;font-size:12px;padding:5px 8px" placeholder="Ant.">'
    +'<span style="font-size:12px;color:var(--text3)">'+unit+'</span>'
    +'<button type="button" onclick="removeSplit('+pid+','+idx+')" title="Fjern">&times;</button>'
    +'</div>';
}

function addSplit(pid){
  const container=document.getElementById("splits-"+pid);if(!container)return;
  const idx=container.children.length;
  const p=getProd(pid);
  const unit=p?p.unit:"";
  container.insertAdjacentHTML("beforeend",buildSplitRow(pid,idx,"",0,unit));
}

function removeSplit(pid,idx){
  const row=document.getElementById("splitrow-"+pid+"-"+idx);
  if(row)row.remove();
  // Re-index remaining rows
  const container=document.getElementById("splits-"+pid);if(!container)return;
  Array.from(container.children).forEach(function(row,i){
    row.id="splitrow-"+pid+"-"+i;
    const dayEl=row.querySelector('input[type=text]');if(dayEl)dayEl.id="split-day-"+pid+"-"+i;
    const qtyEl=row.querySelector('input[type=number]');if(qtyEl)qtyEl.id="split-qty-"+pid+"-"+i;
    const btn=row.querySelector('button');if(btn)btn.setAttribute("onclick","removeSplit("+pid+","+i+")");
  });
}

function go(v){

      if(S.view==="canteen"&&!S.modal){
        db.getOrders().then(function(orders){

          S.orders=orders.map(function(o){return {...o,items:parseJSON(o.items,[]),checklist:normChecklist(parseJSON(o.checklist,{})),delivered_at:o.delivered_at||null,canteen_note:o.canteen_note||null,item_notes:parseJSON(o.item_notes,{})};});

    },30000);
  }
}

function adjQty(pid,delta){
  let item=S.draft.items.find(function(i){return i.pid===pid;});
  if(!item){item={pid:pid,qty:0,note:"",splits:[]};S.draft.items.push(item);}
  const newVal=Math.max(0,Number(item.qty)+delta);
  item.qty=newVal;
  const el=document.getElementById("qty-"+pid);if(el)el.value=newVal;
}
function syncQty(pid,val){
  let item=S.draft.items.find(function(i){return i.pid===pid;});
  if(!item){item={pid:pid,qty:0,note:"",splits:[]};S.draft.items.push(item);}
  item.qty=val===""?0:(parseFloat(val)||0);
}

async function saveOrder(asDraft){
  const w=document.getElementById("m-week");
  const n=document.getElementById("m-note");
  S.draft.week=w?w.value:S.draft.week;
  S.draft.note=n?n.value:"";
  // Collect all quantities, notes, splits from inputs
  S.products.forEach(function(p){
    const qEl=document.getElementById("qty-"+p.id);
    const nEl=document.getElementById("note-"+p.id);
    if(!qEl)return;
    const qty=parseFloat(qEl.value)||0;
    const note=nEl?nEl.value.trim():"";
    // Collect splits
    const splitsContainer=document.getElementById("splits-"+p.id);
    const splits=[];
    if(splitsContainer){
      Array.from(splitsContainer.children).forEach(function(row,idx){
        const dayEl=document.getElementById("split-day-"+p.id+"-"+idx);
        const sqEl=document.getElementById("split-qty-"+p.id+"-"+idx);
        if(!dayEl||!sqEl)return;
        const day=dayEl.value.trim();
        const sq=parseFloat(sqEl.value)||0;
        if(day||sq>0)splits.push({day:day,qty:sq});
      });
    }
    let item=S.draft.items.find(function(i){return i.pid===p.id;});
    // Only count splits that have actual content
    const validSplits=splits.filter(function(sp){return sp.qty>0||sp.day.length>0;});
    // If there are splits, total qty = direct qty (unsplit base) + sum of splits
    // This way adding a split row for extra days ADDS to the base, not replaces it
    const splitsTotal=validSplits.reduce(function(s,sp){return s+sp.qty;},0);
    const finalQty=validSplits.length>0?(qty+splitsTotal):qty;
    if(finalQty>0){
      if(!item){item={pid:p.id,qty:0,note:"",splits:[]};S.draft.items.push(item);}
      item.qty=finalQty;item.note=note;item.splits=validSplits;
    } else if(item){item.qty=0;item.note=note;item.splits=[];}
  });
  const items=S.draft.items.filter(function(i){return Number(i.qty)>0;});
  if(!items.length){showAlert("Legg til minst ett produkt.","error");return;}
  const btn=document.getElementById("save-btn");
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Lagrer...';}
  try{
    const origOrder=S.draft.id?S.orders.find(function(x){return x.id===S.draft.id;}):null;
    const origStatus=origOrder?origOrder.status:null;
    const keepStatus=isAdmin()&&origStatus&&origStatus!=="draft"&&origStatus!=="pending";
    const newStatus=keepStatus?origStatus:(asDraft?"draft":"pending");
    // If admin adds new items to delivered order, reopen it
    const prevItems=origOrder?origOrder.items||[]:[];
    const hasNewItems=items.some(function(i){return !prevItems.find(function(oi){return oi.pid===i.pid;});});
    const finalStatus=(keepStatus&&newStatus==="delivered"&&hasNewItems)?"accepted":newStatus;
    // Preserve checklist entries for existing items
    const prevCL=origOrder?origOrder.checklist||{}:{};
    const checklist={};
    Object.keys(prevCL).forEach(function(k){
      const pid=parseInt(k);
      if(items.find(function(i){return i.pid===pid;})){
        checklist[k]=prevCL[k];
      }
    });
    const payload={week:S.draft.week,status:finalStatus,note:S.draft.note,items:items,checklist:checklist};
    if(S.draft.id)await db.updateOrder(S.draft.id,payload);else await db.addOrder(payload);
    await loadAll();S.modal=null;showAlert(asDraft?"Lagret som utkast.":"Bestilling sendt til kantinen!");
  }catch(e){showAlert("Feil: "+e.message,"error");if(btn){btn.disabled=false;btn.textContent="Prøv igjen";}}
}

    render();
  }catch(e){showAlert("Feil: "+e.message,"error");}

async function togglePickup(orderId,key){
  const o=S.orders.find(function(x){return x.id===orderId;});if(!o)return;
  const cl=Object.assign({},o.checklist||{});
  const today=new Date().toISOString().slice(0,10);
  if(key in cl){delete cl[key];}else{cl[key]=today;}
  const allKeys=allCheckKeys(o);
  const allDone=allKeys.length>0&&allKeys.every(function(k){return k in cl;});
  const update=allDone?{checklist:cl,status:"delivered"}:{checklist:cl};
  try{
    await db.updateOrder(orderId,update);
    await loadAll();
    if(allDone)showAlert("Alle varer hentet \u2014 bestilling markert som levert!");
  }catch(e){showAlert("Feil: "+e.message,"error");}
}

async function saveItemNote(orderId,key,value){
  const o=S.orders.find(function(x){return x.id===orderId;});if(!o)return;

  if(value.trim()){notes[key]=value.trim();}else{delete notes[key];}

    await db.updateOrder(orderId,{item_notes:notes});

    o.item_notes=notes;

}

// Drag and drop
let dragSrcIdx=null;
function dragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed="move";e.currentTarget.classList.add("dragging");}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect="move";e.currentTarget.classList.add("drag-over");}
function dragLeave(e){e.currentTarget.classList.remove("drag-over");}
async function dragDrop(e,targetIdx){
  e.preventDefault();e.currentTarget.classList.remove("drag-over");
  if(dragSrcIdx===null||dragSrcIdx===targetIdx)return;
  const reordered=S.products.slice();
  const[moved]=reordered.splice(dragSrcIdx,1);
  reordered.splice(targetIdx,0,moved);
  reordered.forEach(function(p,i){p.sort_order=i;});
  S.products=reordered;render();
  try{await Promise.all(reordered.map(function(p){return db.updateProduct(p.id,{sort_order:p.sort_order});}));}
  catch(e){showAlert("Feil ved lagring av rekkefølge: "+e.message,"error");}
  dragSrcIdx=null;
}

function printInvoice(ym){
  const[y,m]=ym.split("-").map(Number);
  const mo=S.orders.filter(function(o){const[wy,wn]=o.week.split("-W").map(Number);const d=new Date(wy,0,1+(wn-1)*7);return d.getFullYear()===y&&d.getMonth()===m-1&&(o.status==="delivered"||o.status==="accepted");});
